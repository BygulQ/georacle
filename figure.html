<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>卦象詳情｜卦象之書｜沙占起來</title>
<style>
:root{--bg:#EAE8E3;--panel:#F7F6F2;--paper:#FDFBF7;--white:#fff;--ink:#5A534D;--muted:#827A73;--soft:#99928A;--line:#D0C9C0;--line2:#E6E3DC;--rose:#B4766E;--rose2:#9E6961;--gold:#C5A87C;--shadow:0 8px 26px #00000012;--fire:#B4766E;--air:#C5A87C;--water:#7C8F99;--earth:#8A9A86}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",Segoe UI,sans-serif;line-height:1.75}.wrap{max-width:1420px;margin:auto;padding:28px 28px 84px}.app{background:var(--panel);border:1px solid var(--line);border-radius:30px;overflow:hidden;box-shadow:0 12px 34px #00000012}.topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:16px 24px;background:#fdfbf7ea;border-bottom:1px solid var(--line2)}.brand{font-weight:1000;letter-spacing:.18em;color:var(--rose2)}.nav{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.pill{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;font-weight:900;font-size:13px;color:var(--muted);text-decoration:none}.pill.primary{background:var(--rose);border-color:var(--rose);color:#fff}main{padding:38px}.detailHero{display:grid;grid-template-columns:340px minmax(0,1fr);gap:28px;align-items:stretch;margin-bottom:24px}.glyphPanel,.mainPanel,.section,.advanced{background:#fff;border:1px solid var(--line2);border-radius:30px;box-shadow:var(--shadow)}.glyphPanel{display:grid;place-items:center;padding:32px;min-height:420px}.fig{width:82px;min-height:132px;background:#fff;border:1px solid var(--line2);border-radius:18px;padding:8px 6px;display:flex;flex-direction:column;align-items:center;justify-content:center}.detailFig{transform:scale(1.65)}.dots{display:flex;flex-direction:column;gap:8px;margin:4px 0}.line{height:12px;display:flex;align-items:center;justify-content:center;gap:13px}.dot{width:10px;height:10px;transform:rotate(45deg);border-radius:2px;background:currentColor}.fire{color:var(--rose)}.air{color:var(--gold)}.water{color:var(--water)}.earth{color:var(--earth)}.mainPanel{padding:30px 34px}.eyebrow{font-size:13px;font-weight:1000;letter-spacing:.22em;color:var(--rose2)}.mainPanel h1{margin:6px 0 16px;font-size:46px;letter-spacing:.16em;line-height:1.15}.latin{color:#8f744d;font-weight:1000;letter-spacing:.16em;text-transform:uppercase}.infoGrid{display:grid;grid-template-columns:120px 1fr;gap:9px 14px;margin:18px 0 20px}.infoGrid b{color:var(--soft);letter-spacing:.08em}.coreBox{background:var(--paper);border:1px solid var(--line2);border-radius:22px;padding:16px 18px;color:var(--rose2);font-weight:900}.judge{margin-top:16px;color:var(--muted);font-weight:760}.section{padding:26px 28px;margin-top:20px}.section h2,.advanced summary{margin:0;font-size:26px;letter-spacing:.14em}.readGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-top:18px}.readItem{background:var(--paper);border:1px solid var(--line2);border-radius:22px;padding:18px}.readItem.full{grid-column:1/-1}.readItem h3,.advBlock h3{margin:0 0 8px;color:var(--rose2);letter-spacing:.08em}.readItem p,.advBlock p{margin:0;color:var(--muted);font-weight:760}table{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--line2);border-radius:18px;overflow:hidden;background:#fff}th,td{padding:11px 13px;border-bottom:1px solid var(--line2);text-align:left;vertical-align:top}tr:last-child td{border-bottom:0}th{background:#fff8e8;color:#8f744d}.advanced{margin-top:20px;overflow:hidden}.advanced summary{cursor:pointer;padding:22px 28px;font-weight:1000;background:#fffdf8}.advancedBody{padding:24px 28px 30px;display:grid;gap:18px}.advBlock{background:var(--paper);border:1px solid var(--line2);border-radius:22px;padding:18px}.methodNote{margin-top:12px;padding:12px 14px;border:1px solid #dfd5c7;border-radius:16px;background:#fff;color:var(--muted);font-size:13px;font-weight:800}.empty{padding:24px;background:#fff;border:1px solid var(--line2);border-radius:24px;color:var(--muted);font-weight:900;text-align:center}@media(max-width:900px){.detailHero{grid-template-columns:1fr}.glyphPanel{min-height:300px}.readGrid{grid-template-columns:1fr}.mainPanel h1{font-size:36px}.infoGrid{grid-template-columns:1fr}main{padding:24px}.wrap{padding:18px}}
</style>
</head>
<body>
<div class="wrap"><div class="app"><div class="topbar"><div class="brand">卦象之書</div><div class="nav"><a class="pill" href="./figures.html">← 返回卦象卡片</a><a class="pill primary" href="./index.html">返回主盤</a></div></div><main id="app"><div class="empty">讀取卦象資料中。</div></main></div></div>
<script>
const CLS=['fire','air','water','earth'];
const DIRECTION_BY_ID={'puer':'東方','laetitia':'東方','fortuna-minor':'東方','populus':'東方','caput-draconis':'西方','conjunctio':'西方','acquisitio':'西方','rubeus':'西方','via':'北方','cauda-draconis':'北方','amissio':'北方','albus':'北方','puella':'南方','carcer':'南方','fortuna-major':'南方','tristitia':'南方'};
const DEF={elementOrder:['fire','air','water','earth'],systems:{abjad:{baseValues:{fire:1,air:2,water:3,earth:4}},abdah:{baseValues:{fire:1,air:2,water:4,earth:8}},bazdah:{baseValues:{fire:2,air:7,water:4,earth:8}}}};
function normalizeFigureData(data,id){const dir=DIRECTION_BY_ID[id]||data.direction||data.astro?.方位;if(dir){data.direction=dir;data.astro={...(data.astro||{}),'方位':dir};const b=(data.advanced||[]).find(x=>x.title==='時間與方位'&&Array.isArray(x.table));if(b){let found=false;b.table=b.table.map(r=>{if(r[0]==='地理方位'){found=true;return['地理方位',dir]}return r});if(!found)b.table.unshift(['地理方位',dir])}}return data}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function dotHTML(code){return '<div class="dots">'+String(code).split('').map((d,i)=>'<div class="line '+CLS[i]+'">'+(d==='1'?'<span class="dot"></span>':'<span class="dot"></span><span class="dot"></span>')+'</div>').join('')+'</div>'}
function tableHTML(rows){return '<table><tr><th>項目</th><th>對應</th></tr>'+rows.map(r=>'<tr><td>'+esc(r[0])+'</td><td>'+esc(r[1])+'</td></tr>').join('')+'</table>'}
function objTable(obj){return tableHTML(Object.entries(obj||{}))}
function numberValue(v){if(v==null)return'';if(typeof v==='object'&&v.value!=null)return v.value;return v}
function calc(code,cfg=DEF){const d=String(code||'').split('').map(Number);if(d.length!==4)return{};const o=cfg.elementOrder||DEF.elementOrder,s=cfg.systems||DEF.systems,b=n=>s[n]?.baseValues||DEF.systems[n].baseValues,open=n=>o.reduce((a,e,i)=>a+(d[i]===1?Number(b(n)[e]||0):0),0),weighted=n=>o.reduce((a,e,i)=>a+Number(b(n)[e]||0)*(d[i]===2?2:1),0);return{abjadOpen:open('abjad'),abjadWeighted:weighted('abjad'),abdah:open('abdah'),bazdah:open('bazdah'),physical:d.reduce((a,x)=>a+x,0)}}
function numbersHTML(data,cfg){const v=calc(data.dotCode,cfg),rows=[],tri=numberValue(data.numbers?.triangular);if(tri!=='')rows.push(['累加三角數值',tri]);rows.push(['Abjad｜時間／應期（只算單點）',v.abjadOpen],['Abjad｜空間／尺寸（雙點×2）',v.abjadWeighted],['Abdaḥ｜只算單點',v.abdah],['Bazdaḥ｜只算單點',v.bazdah],['幾何本質點數',v.physical]);return '<div class="readItem full"><h3>卦象數值</h3>'+tableHTML(rows)+'<div class="methodNote">Abjad 基數固定為 1、2、3、4，但依問題領域切換取點法；Abdah 與 Bazdah 永遠忽略關閉雙點。內部編碼不公開顯示。</div></div>'}
function adv(block){return '<div class="advBlock"><h3>'+esc(block.title)+'</h3>'+(block.table?tableHTML(block.table):'<p>'+esc(block.text||'')+'</p>')+'</div>'}
function dotText(code){const names=['火','風','水','土'];return String(code).split('').map((d,i)=>names[i]+(d==='1'?'單':'雙')).join('、')}
function render(data,cfg){document.title=data.zhName+'卦｜'+data.latinName+'｜卦象之書｜沙占起來';document.getElementById('app').innerHTML=`<div class="detailHero"><aside class="glyphPanel"><div class="fig detailFig">${dotHTML(data.dotCode)}</div></aside><section class="mainPanel"><div class="eyebrow">Figure Detail</div><h1>${esc(data.zhName)}卦</h1><div class="latin">${esc(data.latinName)}</div><div class="infoGrid"><b>中文名</b><span>${esc(data.zhName)}</span><b>拉丁名</b><span>${esc(data.latinName)}</span><b>阿拉伯名</b><span>${esc(data.arabicName)}</span><b>主盤點陣</b><span>${dotText(data.dotCode)}</span><b>所屬元素</b><span>${esc(data.element)}</span><b>核心象徵</b><span>${esc(data.coreSymbol)}</span></div><div class="coreBox">${esc(data.basic?.one||data.coreSymbol)}</div><p class="judge">${esc(data.judgement)}</p></section></div><section class="section"><h2>基礎閱讀</h2><div class="readGrid"><div class="readItem"><h3>一句話核心義</h3><p>${esc(data.basic?.one)}</p></div><div class="readItem"><h3>主要含義</h3><p>${esc(data.basic?.meaning)}</p></div><div class="readItem"><h3>有利場景</h3><p>${esc(data.basic?.favorable)}</p></div><div class="readItem"><h3>不利場景</h3><p>${esc(data.basic?.unfavorable)}</p></div><div class="readItem"><h3>陰影面</h3><p>${esc(data.basic?.shadow)}</p></div><div class="readItem"><h3>讀盤工具用法</h3><p>${esc(data.basic?.tool)}</p></div><div class="readItem full"><h3>星曜／黃道／元素／吉凶／方位</h3>${objTable(data.astro)}</div>${numbersHTML(data,cfg)}<div class="readItem full"><h3>強宮／弱宮</h3>${objTable(data.houses)}</div></div></section><details class="advanced"><summary>進階閱讀</summary><div class="advancedBody">${(data.advanced||[]).map(adv).join('')}</div></details>`}
async function main(){const id=new URLSearchParams(location.search).get('id')||'puer';try{const[r,nr]=await Promise.all([fetch('./data/figures/'+id+'.json'),fetch('./data/figures/numeric-systems.json')]);if(!r.ok)throw new Error('not found');const cfg=nr.ok?await nr.json():DEF;render(normalizeFigureData(await r.json(),id),cfg)}catch(e){document.getElementById('app').innerHTML='<div class="empty">找不到卦象資料。<br><br><a class="pill" href="./figures.html">返回卦象之書</a></div>'}}main();
</script>
</body>
</html>
