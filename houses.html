<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>宮位之書｜Taskin al-Mudun｜沙占起來</title>
  <style>
    :root{
      --bg:#EAE8E3; --paper:#FDFBF7; --panel:#F8F3EA; --ink:#4f473f; --muted:#827A73;
      --line:#D0C9C0; --line2:#E6E3DC; --rose:#B4766E; --rose2:#9E6961;
      --gold:#C5A87C; --gold2:#9f7f49; --sand:#eadcc0; --night:#2f2a27;
      --inner:#b88652; --suburb:#a87866; --admin:#6f8792; --outer:#857055;
      --shadow:0 12px 34px #00000016; --shadow2:0 22px 70px #00000024;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;background:radial-gradient(circle at 50% -15%,#fff7e8 0,#eee8dd 48%,#d9d2c4 100%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",Segoe UI,sans-serif;line-height:1.75}
    a{color:inherit;text-decoration:none} button{font:inherit}
    .wrap{max-width:1500px;margin:0 auto;padding:26px 26px 78px}
    .app{background:#f7f3eb;border:1px solid var(--line);border-radius:34px;overflow:hidden;box-shadow:0 18px 52px #4a332117}
    .topbar{position:sticky;top:0;z-index:80;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:16px 24px;background:#fdfbf7ed;border-bottom:1px solid var(--line2);backdrop-filter:blur(10px)}
    .brand{font-weight:1000;letter-spacing:.18em;color:var(--rose2);white-space:nowrap}.nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .pill,button.pill{border:1px solid var(--line);background:white;border-radius:999px;padding:8px 13px;font-weight:950;font-size:13px;color:var(--muted);cursor:pointer;box-shadow:0 2px 8px #00000008;transition:.18s}.pill.primary{background:var(--rose);border-color:var(--rose);color:white}.pill:hover{transform:translateY(-1px);border-color:var(--gold)}

    .mode{padding:42px}.mapMode{display:block}.streetMode{display:none}body[data-mode="street"] .mapMode{display:none}body[data-mode="street"] .streetMode{display:block}
    .pageIntro{display:grid;grid-template-columns:1fr auto;align-items:end;gap:28px;border-bottom:1px solid var(--line2);padding-bottom:24px;margin-bottom:26px}.overline{display:inline-flex;align-items:center;gap:10px;border:1px solid #d7c6a5;background:#fff8e8;color:#8f744d;border-radius:999px;padding:7px 13px;font-size:12px;font-weight:1000;letter-spacing:.2em;text-transform:uppercase}.pageIntro h1{margin:18px 0 0;font-size:54px;line-height:1.08;letter-spacing:.2em}.pageIntro p{max-width:880px;margin:16px 0 0;color:#6c6157;font-weight:850;font-size:17px;letter-spacing:.04em}.introCard{max-width:260px;background:#fffdf7;border:1px solid var(--line);border-radius:24px;padding:16px 18px;color:#7a6a56;font-weight:900;box-shadow:var(--shadow)}

    .mapOnlyLayout{display:grid;grid-template-columns:minmax(0,1fr) 290px;gap:18px;align-items:stretch}.mapStage{position:relative;border-radius:30px;border:1px solid #ccb58c;background:#241c16;box-shadow:var(--shadow2);overflow:hidden;min-height:680px}.mapStage img{display:block;width:100%;height:100%;min-height:680px;object-fit:cover;filter:saturate(.9) contrast(.96) brightness(.72)}.mapStage:before{content:"";position:absolute;inset:0;z-index:2;background:radial-gradient(circle at 52% 46%,transparent 0 32%,#150f0a2b 70%,#100c0882 100%),linear-gradient(90deg,#150f0a85,transparent 24% 76%,#150f0a76);pointer-events:none}.mapStage:after{content:"";position:absolute;inset:18px;border:1px solid #f0d9a961;border-radius:22px;z-index:4;pointer-events:none}
    .mapHotspots{position:absolute;inset:0;z-index:5}.cityHotspot{position:absolute;left:calc(var(--x) * 1%);top:calc(var(--y) * 1%);transform:translate(-50%,-50%);width:50px;height:50px;border-radius:999px;border:2px solid #f5dba1cc;background:#23180fcf;color:#fff8e8;display:grid;place-items:center;font-weight:1000;font-size:18px;cursor:pointer;box-shadow:0 0 0 6px #21160c33,0 12px 32px #00000040;transition:transform .16s, box-shadow .16s, background .16s, opacity .16s;touch-action:manipulation}.cityHotspot.inner{border-color:#f2cc8b}.cityHotspot.suburb{border-color:#e7b2a4}.cityHotspot.admin{border-color:#b8d3dc}.cityHotspot.outer{border-color:#d6bf82}.cityHotspot:hover,.cityHotspot:focus,.cityHotspot.active{z-index:10;transform:translate(-50%,-50%) scale(1.16);background:#b88742;color:white;box-shadow:0 0 0 9px #e7be6f33,0 0 42px #f0d28b91,0 15px 36px #00000055;outline:none}.cityHotspot em{position:absolute;left:50%;top:calc(100% + 8px);transform:translateX(-50%) translateY(-4px);opacity:0;pointer-events:none;white-space:nowrap;background:#fffaf0;color:#5b4731;border:1px solid #d7c6a5;border-radius:999px;padding:5px 9px;font-style:normal;font-size:12px;font-weight:1000;box-shadow:0 10px 22px #00000025}.cityHotspot:hover em,.cityHotspot:focus em,.cityHotspot.active em{opacity:1;transform:translateX(-50%) translateY(0)}
    .mapCaption{position:absolute;left:26px;bottom:22px;z-index:6;color:#fff8e8;text-shadow:0 2px 12px #000;font-weight:950;letter-spacing:.08em}.mapCaption b{display:block;font-size:26px;letter-spacing:.14em}.mapCaption span{display:block;color:#eadcc0;font-size:14px;line-height:1.8;margin-top:4px}
    .mapSide{display:flex;flex-direction:column;gap:14px}.previewPanel,.legendPanel{background:#fffdf7;border:1px solid var(--line);border-radius:28px;padding:20px;box-shadow:var(--shadow)}.previewPanel{min-height:280px;display:flex;flex-direction:column}.previewPanel .kicker,.streetPanel .kicker{display:inline-flex;width:max-content;max-width:100%;border:1px solid #d8c6a5;background:#fff8e8;border-radius:999px;padding:5px 10px;color:#8f744d;font-size:12px;font-weight:1000;letter-spacing:.12em}.previewPanel h2{font-size:28px;line-height:1.25;margin:18px 0 8px;letter-spacing:.08em}.previewPanel p{margin:0;color:#76664f;font-weight:850}.previewPanel .hint{margin-top:auto;color:#9a9186;font-size:13px;font-weight:850}.legendItem{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--line2);color:#6f655a;font-weight:900}.legendItem:last-child{border-bottom:0}.legendDot{width:12px;height:12px;border-radius:999px;background:var(--gold)}.legendDot.inner{background:var(--inner)}.legendDot.suburb{background:var(--suburb)}.legendDot.admin{background:var(--admin)}.legendDot.outer{background:var(--outer)}

    .streetHeader{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:20px}.streetHeader h1{margin:8px 0 0;font-size:42px;letter-spacing:.13em;line-height:1.2}.streetHeader p{margin:6px 0 0;color:#7a6a56;font-weight:900}.streetLayout{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(390px,.95fr);gap:22px;align-items:stretch}.streetVista{position:relative;min-height:620px;border:1px solid #d0bc95;border-radius:34px;overflow:hidden;box-shadow:var(--shadow2);background:#1d1713}.streetVista:before{content:"";position:absolute;inset:0;background-image:linear-gradient(180deg,#2b1f1742,#1a110888),var(--street-img);background-size:cover;background-position:center;filter:saturate(.92) contrast(1.02) brightness(.96);transform:scale(1.02);opacity:.96;transition:background-image .25s ease, opacity .25s ease}.streetVista:after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 34%,#f0d28b33,transparent 33%),linear-gradient(0deg,#0e0a07d6 0,#0000 45%),repeating-linear-gradient(90deg,#ffffff08 0 1px,transparent 1px 90px);pointer-events:none}.streetVista.inner{--glow:#d7a85f;--focus:45% 50%}.streetVista.suburb{--glow:#c58676;--focus:46% 62%}.streetVista.admin{--glow:#8eaeb9;--focus:67% 42%}.streetVista.outer{--glow:#d0b875;--focus:72% 22%}.arch{position:absolute;left:50%;bottom:-105px;width:58%;height:72%;transform:translateX(-50%);border:18px solid color-mix(in srgb,var(--glow) 58%,#fff2cc);border-bottom:0;border-radius:50% 50% 0 0/62% 62% 0 0;opacity:.6;box-shadow:0 0 70px color-mix(in srgb,var(--glow) 55%,transparent),inset 0 0 38px #00000050;z-index:2}.streetPlaque{position:absolute;left:28px;right:28px;bottom:28px;z-index:4;background:#fffaf0e8;border:1px solid #ead7ac;border-radius:26px;padding:22px 24px;backdrop-filter:blur(8px);box-shadow:0 18px 44px #00000038}.streetPlaque small{display:block;color:#9a7d51;font-weight:1000;letter-spacing:.18em;text-transform:uppercase}.streetPlaque b{display:block;margin-top:6px;color:#4f3e2c;font-size:34px;letter-spacing:.12em;line-height:1.15}.sceneTags{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.sceneTags span,.badge{display:inline-flex;border:1px solid #d8c6a5;background:#fff8e8;border-radius:999px;padding:5px 9px;color:#7d684a;font-size:12px;font-weight:1000}.streetNumber{position:absolute;right:34px;top:30px;z-index:4;width:88px;height:88px;border-radius:28px;background:#fff8e8e6;border:1px solid #e6cf9e;display:grid;place-items:center;color:#7f5d2b;font-size:42px;font-weight:1000;box-shadow:0 18px 44px #00000035}.streetPanel{background:#fffdf7;border:1px solid var(--line);border-radius:34px;padding:28px;box-shadow:var(--shadow2);display:flex;flex-direction:column;gap:13px}.streetPanel h2{font-size:34px;margin:10px 0 0;letter-spacing:.1em;line-height:1.25}.streetRole{font-size:18px;color:#9E6961;font-weight:1000;line-height:1.6}.panelMeta{display:flex;gap:7px;flex-wrap:wrap}.infoBox{background:#fffaf0;border:1px solid #e0d1b4;border-radius:20px;padding:14px 15px}.infoBox b{display:block;color:#5e4f3b;letter-spacing:.08em;margin-bottom:4px}.infoBox p{margin:0;color:#76664f;font-weight:820;line-height:1.78}.streetActions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.streetNote{margin-top:auto;color:#9a9186;font-weight:820;font-size:13px;line-height:1.7;border-top:1px solid var(--line2);padding-top:13px}
    footer{padding:26px 38px 42px;color:#9a9186;font-weight:850;text-align:center;border-top:1px solid var(--line2)}
    @media(max-width:1180px){.mapOnlyLayout,.streetLayout{grid-template-columns:1fr}.mapStage,.mapStage img{min-height:560px}.streetVista{min-height:520px}.pageIntro{grid-template-columns:1fr}.introCard{max-width:none}.mapSide{display:grid;grid-template-columns:1fr 1fr}.previewPanel{min-height:auto}}
    @media(max-width:760px){.wrap{padding:14px}.app{border-radius:26px}.topbar{align-items:flex-start;padding:14px}.brand{letter-spacing:.08em}.mode{padding:24px}.pageIntro h1{font-size:34px;letter-spacing:.14em}.pageIntro p{font-size:14px}.mapStage,.mapStage img{min-height:470px}.cityHotspot{width:38px;height:38px;font-size:14px}.cityHotspot em{display:none}.mapCaption b{font-size:18px}.mapSide{display:block}.previewPanel,.legendPanel{margin-top:12px}.streetHeader{display:block}.streetHeader h1{font-size:30px}.streetLayout{display:block}.streetVista{min-height:440px}.streetPanel{margin-top:16px;padding:20px;border-radius:26px}.streetPanel h2{font-size:27px}.streetNumber{width:64px;height:64px;font-size:30px;border-radius:20px}.streetPlaque{left:16px;right:16px;bottom:16px}.streetPlaque b{font-size:25px}.pill{font-size:12px;padding:7px 10px}}
    @media(max-width:500px){.wrap{padding:0}.app{border-radius:0;border-left:0;border-right:0}.nav{gap:6px}.mode{padding:18px 14px}.mapStage,.mapStage img{min-height:400px}.mapCaption{left:16px;bottom:14px}.cityHotspot{width:34px;height:34px;font-size:12px}.streetVista{min-height:390px}.arch{width:78%}.streetPlaque b{font-size:22px}}
  </style>
</head>
<body data-mode="map" data-housebook-version="2.0.0">
  <div class="wrap">
    <div class="app">
      <div class="topbar">
        <div class="brand">宮位之書</div>
        <div class="nav">
          <a class="pill" href="./dictionary.html">字典首頁</a>
          <a class="pill" href="./figures.html">卦象之書</a>
          <a class="pill" href="./placements.html">落宮之書</a>
          <a class="pill primary" href="./index.html">返回主盤</a>
        </div>
      </div>

      <main class="mode mapMode" id="mapMode">
        <header class="pageIntro">
          <div>
            <span class="overline">Taskin al-Mudun・城市配置</span>
            <h1>宮位之書</h1>
            <p>十六宮化為十六個城市地點。選擇一處街坊，進入該宮位場域。</p>
          </div>
          <div class="introCard">選一座門、一條街、一處市場或一個宮廷據點。</div>
        </header>
        <section class="mapOnlyLayout" aria-label="十六宮互動城市總圖">
          <div class="mapStage">
            <img id="mapImage" src="" alt="古伊斯蘭沙盤城市俯視圖">
            <div id="mapHotspots" class="mapHotspots" aria-label="十六宮互動熱區"></div>
            <div class="mapCaption"><b>Medina as House Book</b><span>十六個城市地點</span></div>
          </div>
          <aside class="mapSide">
            <section id="mapPreview" class="previewPanel" aria-live="polite"></section>
            <section class="legendPanel" aria-label="城市分區圖例">
              <div class="legendItem"><i class="legendDot inner"></i>1–4 內部核心</div>
              <div class="legendItem"><i class="legendDot suburb"></i>5–8 周邊市郊</div>
              <div class="legendItem"><i class="legendDot admin"></i>9–12 軍事行政</div>
              <div class="legendItem"><i class="legendDot outer"></i>13–16 外部補給</div>
            </section>
          </aside>
        </section>
      </main>

      <main class="mode streetMode" id="streetMode" aria-live="polite">
        <header class="streetHeader">
          <div>
            <span class="overline">Street View・宮位街景</span>
            <h1 id="streetTitle">宮位街景</h1>
            <p id="streetSubtitle">閱讀該宮的城市身份、傳統宮位義與定位提示。</p>
          </div>
          <button class="pill primary" type="button" id="backToMap">← 返回城市地圖</button>
        </header>
        <section class="streetLayout">
          <div id="streetVista" class="streetVista inner">
            <div class="arch"></div>
            <div id="streetNumber" class="streetNumber">1</div>
            <div class="streetPlaque">
              <small id="streetKicker">House Street</small>
              <b id="streetPlace">居民大門</b>
              <div id="streetTags" class="sceneTags"></div>
            </div>
          </div>
          <aside id="streetPanel" class="streetPanel"></aside>
        </section>
      </main>

      <footer>沙盤城市配置・Taskin al-Mudun</footer>
    </div>
  </div>

  <script>
const HOUSES = [{"id": 1,"name": "第一宮","short": "第一宮","zone": "內部核心區","zoneId": "inner","cityRole": "城內居民／正東方城門","structure": "城門・居民・城牆局部","direction": "正東方城門","traditional": "問卜者本人、當下狀態、生命、靈魂、意圖與事物開端。","city": "代表城內居民（أهل البلد），也是城市的大門；部分文獻亦將其視為城牆的一段。","locating": "尋物或尋人時，若落第一宮，可先看入口、門邊、住民活動核心、東側通道與最接近求問者的位置。","tags": ["城門","居民","防禦"]},{"id": 2,"name": "第二宮","short": "第二宮","zone": "內部核心區","zoneId": "inner","cityRole": "貨幣兌換市場","structure": "金融・交易","direction": "城內商業核心","traditional": "金錢、資源、所有物、買賣、收入與得失。","city": "代表貨幣兌換市場（سوق الصرف）與金融交易中心，是城市中財物流通的樞紐。","locating": "落第二宮時，指向錢櫃、交易場所、帳簿、店鋪、收納財物處，或與金錢交換相關的人事物。","tags": ["市場","金融","尋物"]},{"id": 3,"name": "第三宮","short": "第三宮","zone": "內部核心區","zoneId": "inner","cityRole": "普通市集與消息街坊","structure": "街坊・買賣・消息流通","direction": "城內日常商業街區","traditional": "消息、兄弟姊妹、親戚、鄰居、短途旅行、信件與夢境。","city": "代表城內普通市集與鄰里商販街坊，是消息、短途往來、日常買賣與街邊交流的流通處。","locating": "落第三宮時，往普通市集、小商鋪、鄰里街巷、日用品攤位、香料與玫瑰水小販、跑腿送信與消息流通處尋找。","tags": ["市場","街坊","消息","短途往來"]},{"id": 4,"name": "第四宮","short": "第四宮","zone": "內部核心區","zoneId": "inner","cityRole": "城市中心／正北方城門","structure": "中心・內城牆・北門","direction": "正北方城門","traditional": "家庭、父親、房地產、根基、隱藏之物與事物結局。","city": "代表城市中心（وسط المدينة），並對應正北方的城門；也是內城牆結構的重要點。","locating": "落第四宮時，往房屋、地基、中心區、北門、地下或隱藏處尋找，常指向事件的根部。","tags": ["城門","城牆","中心"]},{"id": 5,"name": "第五宮","short": "第五宮","zone": "周邊市郊區","zoneId": "suburb","cityRole": "布料與紡織商市場","structure": "市場・守衛部隊","direction": "城牆邊緣生活區","traditional": "戀愛、子女、歡樂、宴會、禮物、衣物與懷孕。","city": "代表布料與紡織商市場（سوق القماش والبزازين），同時屬於城市守衛部隊的配置點之一。","locating": "落第五宮時，可往布料、衣物、紡織、娛樂場所、孩童或歡樂聚會之處尋找。","tags": ["市場","布料","守衛"]},{"id": 6,"name": "第六宮","short": "第六宮","zone": "周邊市郊區","zoneId": "suburb","cityRole": "浴場、金庫、少數宗教街區、廚師街","structure": "特殊生活區・消耗區","direction": "市郊生活邊界","traditional": "疾病、僕人、下屬、小動物、消耗、恐懼與憂慮。","city": "代表羅馬浴場、金庫、猶太人與基督教徒等少數宗教街區，以及廚師街。","locating": "若失物落第六宮，可往浴場、廚房、食物處理區、金庫、服務人員或少數族群街區附近尋找。","tags": ["浴場","金庫","少數街區","尋物"]},{"id": 7,"name": "第七宮","short": "第七宮","zone": "周邊市郊區","zoneId": "suburb","cityRole": "婦女布料與服飾市場／正西方城門","structure": "市場・西門・內城牆","direction": "正西方城門","traditional": "伴侶、合夥人、公開敵人、婚姻、爭執與尋物對象。","city": "代表婦女的布料與服飾市場，並對應正西方的城門；也是內城牆的一部分。","locating": "落第七宮時，往對方所在處、衣物飾品、女性市場、西門、合夥者或公開關係場域判斷。","tags": ["城門","城牆","市場","服飾"]},{"id": 8,"name": "第八宮","short": "第八宮","zone": "周邊市郊區","zoneId": "suburb","cityRole": "墓地、荒涼處、城外荒野","structure": "墓地・荒野・邊界","direction": "城牆之外","traditional": "死亡、恐懼、遺產、危險、痛苦、憂慮與毒藥。","city": "代表城中最荒涼的地方、墓地（المقابر），以及城牆之外的荒野。","locating": "落第八宮時，指向荒廢、陰暗、危險、埋藏、墓地、廢棄角落或城外無人處。","tags": ["墓地","荒野","隱蔽"]},{"id": 9,"name": "第九宮","short": "第九宮","zone": "軍事行政區","zoneId": "admin","cityRole": "法官所在地、大清真寺、宗教學校與高等知識區","structure": "宗教・律法・高等知識・守衛部隊","direction": "宗教行政軸線","traditional": "長途旅行、宗教、哲學、學問、信仰、星象、曆法與夢兆。","city": "代表城市的宗教、律法與高等知識中心，包括法官所在地、大清真寺、宗教學校、講學庭院與典籍研究空間。","locating": "若落第九宮，往清真寺、宗教學校、講學庭院、法官、書卷、曆法文書、遠行道路或高等知識空間尋找。","tags": ["宗教","律法","學校","高等知識"]},{"id": 10,"name": "第十宮","short": "第十宮","zone": "軍事行政區","zoneId": "admin","cityRole": "統治者與官員居所／正南方城門","structure": "權力・外圍護城牆・南門","direction": "正南方城門","traditional": "事業、權威、名聲、政府、母親、職位與外在成就。","city": "代表統治者與各類官員的居所，並對應正南方的城門；也是環繞城市的外圍護城牆。","locating": "落第十宮時，往官署、上級、顯眼位置、南門、官方機構、權力中心與高處判斷。","tags": ["城門","城牆","行政","權力"]},{"id": 11,"name": "第十一宮","short": "第十一宮","zone": "軍事行政區","zoneId": "admin","cityRole": "宰相、宮廷侍衛、地方行政首長宅邸","structure": "最高行政部・支援者","direction": "行政住宅區","traditional": "朋友、希望、願望、幸運、支持者、貴人與喜悅場所。","city": "代表宰相、宮廷侍衛與地方行政首長的宅邸（بيت الوزارة والنياب للسلطنه），即城市的最高行政部。","locating": "落第十一宮時，往貴人、官僚支援、行政宅邸、朋友所在處或能提供協助的人事物判斷。","tags": ["行政","貴人","官邸"]},{"id": 12,"name": "第十二宮","short": "第十二宮","zone": "軍事行政區","zoneId": "admin","cityRole": "廢墟、垃圾場、隱蔽處、教堂","structure": "隱蔽・廢棄・暗角","direction": "城市陰影區","traditional": "隱藏敵人、監獄、秘密、悲傷、孤立與大型動物。","city": "代表城市陰暗或被遺棄的角落，包括廢墟、垃圾場、隱蔽處以及教堂。","locating": "落第十二宮時，往廢棄處、垃圾堆、陰暗房間、監禁處、隱蔽角落、教堂或被忽視的位置尋找。","tags": ["廢墟","隱蔽","教堂"]},{"id": 13,"name": "第十三宮 右證人","short": "右證人","zone": "外部補給區","zoneId": "outer","cityRole": "偏北方的東城門／城牆防禦據點",     const STREET_IMAGE_DATA = {
      1: './assets/houses/house-01-street-web.png',
      2: './assets/houses/house-02-street-web.png',
      3: './assets/houses/house-03-street-web.png',
      4: './assets/houses/house-04-street-web.png',
      5: './assets/houses/house-05-street-web.png',
      6: './assets/houses/house-06-street-web.png',
      7: './assets/houses/house-07-street-web.png',
      8: './assets/houses/house-08-street-web.png',
      9: './assets/houses/house-09-street-web.png',
      10: './assets/houses/house-10-street-web.png',
      11: './assets/houses/house-11-street-web.png',
      12: './assets/houses/house-12-street-web.png',
      13: './assets/houses/house-13-street-web.png',
      14: './assets/houses/house-14-street-web.png',
      15: './assets/houses/house-15-street-web.png',
      16: './assets/houses/house-16-street-web.png',
    };

    const $ = (sel) => document.querySelector(sel);
    const escapeHTML = (s) => String(s).replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
    function displayText(value){
      let s = String(value ?? '');
      s = s.replace(/\s*[（(][^（）()]*[\u0590-\u08FF\u0900-\u0D7F][^（）()]*[）)]/g, '');
      s = s.replace(/[\u0590-\u08FF\u0900-\u0D7F]+/g, '');
      return s.replace(/（\s*）|\(\s*\)/g,'').replace(/\s{2,}/g,' ').trim();
    }
    let activeHouseId = 1;

    function houseById(id){ return HOUSES.find(h => h.id === Number(id)) || HOUSES[0]; }
    function posById(id){ return HOTSPOT_POS[id] || {x:50,y:50,label:'城市地點'}; }

    function previewHTML(h){
      const p = posById(h.id);
      return `<span class="kicker">第 ${h.id} 宮・${escapeHTML(displayText(h.zone))}</span>
        <h2>${escapeHTML(displayText(p.label))}</h2>
        <p>${escapeHTML(displayText(h.name))}｜${escapeHTML(displayText(h.cityRole))}</p>
        <div class="streetActions">
          <button class="pill primary" type="button" onclick="openStreet(${h.id})">進入街景</button>
          <a class="pill" href="./house.html?id=house-${String(h.id).padStart(2,'0')}">查看詳解</a>
        </div>
        <div class="hint">街景保留城市定位；完整古籍資料請進入宮位詳解。</div>`;
    }

    function streetPanelHTML(h){
      return `<span class="kicker">第 ${h.id} 宮・${escapeHTML(displayText(h.zone))}</span>
        <h2>${escapeHTML(displayText(h.name))}</h2>
        <div class="streetRole">${escapeHTML(displayText(h.cityRole))}</div>
        <div class="panelMeta">
          <span class="badge">${escapeHTML(displayText(h.structure))}</span>
          <span class="badge">${escapeHTML(displayText(h.direction))}</span>
          ${h.tags.map(t=>`<span class="badge">${escapeHTML(displayText(t))}</span>`).join('')}
        </div>
        <div class="infoBox"><b>傳統宮位義</b><p>${escapeHTML(displayText(h.traditional))}</p></div>
        <div class="infoBox"><b>城市配置義</b><p>${escapeHTML(displayText(h.city))}</p></div>
        <div class="infoBox"><b>尋物／定位提示</b><p>${escapeHTML(displayText(h.locating))}</p></div>
        <div class="streetActions">
          <button class="pill" type="button" onclick="openStreet(${h.id === 1 ? 16 : h.id - 1})">上一宮</button>
          <button class="pill" type="button" onclick="openStreet(${h.id === 16 ? 1 : h.id + 1})">下一宮</button>
          <button class="pill primary" type="button" onclick="returnToMap()">返回城市地圖</button>
          <a class="pill primary" href="./house.html?id=house-${String(h.id).padStart(2,'0')}">查看宮位詳解 →</a>
        </div>
        `;
    }

    function setPreview(id){
      const h = houseById(id); activeHouseId = h.id;
      document.querySelectorAll('.cityHotspot').forEach(btn => btn.classList.toggle('active', Number(btn.dataset.house) === h.id));
      $('#mapPreview').innerHTML = previewHTML(h);
    }

    function renderMapHotspots(){
      const host = $('#mapHotspots');
      host.innerHTML = HOUSES.map(h=>{
        const p = posById(h.id);
        return `<button class="cityHotspot ${escapeHTML(h.zoneId)}" style="--x:${p.x};--y:${p.y}" type="button" data-house="${h.id}" aria-label="${escapeHTML(displayText(h.name))}：${escapeHTML(displayText(p.label))}"><span>${h.id}</span><em>${escapeHTML(displayText(p.label))}</em></button>`;
      }).join('');
      host.querySelectorAll('.cityHotspot').forEach(btn=>{
        btn.addEventListener('mouseenter',()=>setPreview(btn.dataset.house));
        btn.addEventListener('focus',()=>setPreview(btn.dataset.house));
        btn.addEventListener('click',()=>openStreet(btn.dataset.house));
      });
    }

    function openStreet(id){
      const h = houseById(id); const p = posById(h.id);
      activeHouseId = h.id;
      document.body.dataset.mode = 'street';
      $('#streetTitle').textContent = displayText(h.name);
      $('#streetSubtitle').textContent = `${displayText(p.label)}｜${displayText(h.cityRole)}`;
      const vista = $('#streetVista');
      vista.className = `streetVista ${h.zoneId}`;
      vista.style.setProperty('--street-img', `url('${STREET_IMAGE_DATA[h.id] || MAP_IMAGE_DATA}')`);
      $('#streetNumber').textContent = h.id;
      $('#streetKicker').textContent = `House ${h.id} Street`;
      $('#streetPlace').textContent = displayText(p.label);
      $('#streetTags').innerHTML = h.tags.map(t=>`<span>${escapeHTML(displayText(t))}</span>`).join('');
      $('#streetPanel').innerHTML = streetPanelHTML(h);
      history.replaceState(null,'',`#house-${h.id}`);
      window.scrollTo({top:0,behavior:'smooth'});
    }

    function returnToMap(){
      document.body.dataset.mode = 'map';
      setPreview(activeHouseId);
      history.replaceState(null,'','#city-map');
      window.scrollTo({top:0,behavior:'smooth'});
    }

    $('#mapImage').src = MAP_IMAGE_DATA;
    $('#backToMap').addEventListener('click', returnToMap);
    renderMapHotspots();
    setPreview(1);
    const hash = (location.hash || '').replace('#','');
    if(hash.startsWith('house-')) openStreet(Number(hash.replace('house-','')));
  </script>
</body>
</html>
