<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>宮位之書｜沙占起來</title>
  <style>
:root{
      --bg:#EAE8E3; --panel:#F7F6F2; --paper:#FDFBF7; --white:#fff;
      --ink:#5A534D; --muted:#827A73; --soft:#99928A; --line:#D0C9C0; --line2:#E6E3DC;
      --rose:#B4766E; --rose2:#9E6961; --gold:#C5A87C; --blue:#7C8F99; --green:#8A9A86; --orange:#D97757;
      --fire:#D65245; --air:#B8874A; --water:#4F90C8; --earth:#8A9A86;
      --shadow:0 8px 26px #00000012; --shadow2:0 18px 50px #0000001a;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",Segoe UI,sans-serif;line-height:1.75}
    button,input,select{font:inherit}
    a{color:inherit;text-decoration:none}
    .wrap{max-width:1420px;margin:0 auto;padding:28px 28px 84px}
    .app{background:var(--panel);border:1px solid var(--line);border-radius:30px;overflow:hidden;box-shadow:0 12px 34px #00000012}
    .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:16px 24px;background:#fdfbf7ea;border-bottom:1px solid var(--line2);backdrop-filter:blur(10px)}
    .brand{font-weight:1000;letter-spacing:.18em;color:var(--rose2);white-space:nowrap}
    .nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .pill,button.pill{border:1px solid var(--line);background:white;border-radius:999px;padding:8px 12px;font-weight:900;font-size:13px;color:var(--muted);cursor:pointer;box-shadow:0 2px 8px #00000008}
    .pill.primary{background:var(--rose);border-color:var(--rose);color:white}
    .view{display:none}
    .view.active{display:block;animation:fadeIn .18s ease-out both}
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    .homeHero{min-height:calc(100vh - 130px);display:grid;place-items:center;padding:54px 24px;background:radial-gradient(circle at 50% 10%,#fffaf4 0,#f7f6f2 42%,#eae8e3 100%)}
    .homeInner{width:100%;max-width:1220px;text-align:center}
    h1{margin:0;font-size:58px;letter-spacing:.26em;line-height:1.16;color:var(--ink)}
    .homeSub{margin:16px auto 38px;max-width:820px;color:var(--muted);font-size:17px;font-weight:850;letter-spacing:.13em;line-height:1.95}
    .gateGrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:24px;margin-top:28px}
    .gate{position:relative;display:flex;flex-direction:column;align-items:flex-start;gap:16px;min-height:330px;background:white;border:1px solid var(--line2);border-radius:32px;padding:32px;text-align:left;box-shadow:var(--shadow);cursor:pointer;transition:.2s;overflow:hidden}
    .gate:before{content:"";position:absolute;inset:auto -40px -68px auto;width:180px;height:180px;border-radius:50%;background:#b4766e14}
    .gate:hover{transform:translateY(-4px);box-shadow:var(--shadow2);border-color:var(--rose)}
    .gateIcon{width:70px;height:70px;border-radius:22px;background:var(--panel);display:grid;place-items:center;font-size:34px;border:1px solid var(--line2)}
    .gate h2{margin:0;font-size:32px;letter-spacing:.13em}
    .gate small{display:block;color:var(--rose2);font-weight:1000;letter-spacing:.18em;text-transform:uppercase}
    .gate p{margin:0;color:var(--muted);font-weight:760;line-height:1.8}
    .gateAction{margin-top:auto;color:var(--rose2);font-weight:1000;letter-spacing:.12em}
    main{padding:38px}
    .viewHead{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;margin-bottom:18px;border-bottom:1px solid var(--line2);padding-bottom:15px}
    .viewHead h2{margin:0;font-size:38px;letter-spacing:.18em}
    .viewLead{margin:8px 0 0;color:var(--muted);font-weight:760}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:18px 0}
    .searchBox{flex:1;min-width:240px;display:flex;align-items:center;background:white;border:1px solid var(--line);border-radius:18px;padding:4px 8px}
    .searchBox input{width:100%;border:0;background:transparent;outline:0;padding:11px 10px;font-weight:850;color:var(--ink)}
    .chip{border:1px solid var(--line);background:white;color:var(--muted);border-radius:999px;padding:7px 12px;font-size:13px;font-weight:900;cursor:pointer}
    .chip.active{background:var(--ink);border-color:var(--ink);color:white}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
    .figureIndexGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:20px}
    .figureMiniCard{background:white;border:1px solid var(--line2);border-radius:30px;padding:22px 18px;box-shadow:var(--shadow);scroll-margin-top:96px;cursor:pointer;transition:.18s;min-height:292px;display:flex;flex-direction:column;align-items:center;text-align:center;justify-content:space-between}
    .figureMiniCard:hover{transform:translateY(-3px);border-color:var(--rose);box-shadow:var(--shadow2)}
    .figureMiniCard .figBox{width:96px;min-height:126px;margin:0 auto 14px}
    .figureMiniCard h3{margin:0;font-size:27px;letter-spacing:.12em;line-height:1.25}
    .figureMiniCard .latin{font-size:13px;margin-top:4px;line-height:1.35}
    .figureMiniCard .metaLine{justify-content:center;margin-top:10px}
    .figureMiniCard .codeTag{margin-top:12px;color:var(--soft);font-size:13px;font-weight:1000;letter-spacing:.16em}
    .figureCard,.houseCard,.resultCard{background:white;border:1px solid var(--line2);border-radius:28px;padding:18px;box-shadow:var(--shadow);scroll-margin-top:86px}
    .cardTop{display:grid;grid-template-columns:88px 1fr;gap:16px;align-items:center}
    .figBox{background:var(--paper);border:1px solid var(--line2);border-radius:22px;padding:14px;display:grid;place-items:center;min-height:126px}
    .dots{display:flex;flex-direction:column;gap:8px;align-items:center}
    .line{height:14px;display:flex;align-items:center;justify-content:center;gap:14px}
    .dot{width:11px;height:11px;transform:rotate(45deg);border-radius:2px;background:currentColor}
    .fire{color:var(--fire)} .air{color:var(--air)} .water{color:var(--water)} .earth{color:var(--earth)}
    .metaLine{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
    .badge{display:inline-flex;border:1px solid var(--line2);background:var(--panel);border-radius:999px;padding:5px 10px;font-size:13px;font-weight:900;color:var(--muted)}
    .badge.water{background:#eef7ff;color:var(--water)} .badge.fire{background:#fff0ed;color:var(--fire)} .badge.air{background:#f4fdff;color:var(--air)} .badge.earth{background:#fff6e8;color:var(--earth)}
    .figureCard h3,.houseCard h3{margin:0;font-size:26px;letter-spacing:.08em;line-height:1.25}
    .latin{color:var(--green);font-weight:1000;letter-spacing:.08em;text-transform:uppercase;font-size:13px}
    .one{margin:14px 0 0;background:var(--paper);border:1px solid var(--line2);border-radius:18px;padding:12px 14px;font-weight:850;color:var(--rose2)}
    details{margin-top:12px;background:var(--panel);border:1px solid var(--line2);border-radius:18px;padding:0 13px}
    summary{cursor:pointer;font-weight:1000;padding:11px 0;color:var(--ink)}
    details .body{padding:0 0 13px;color:var(--muted);font-weight:720}
    .keywordGroup{display:flex;gap:8px;flex-wrap:wrap;margin:9px 0}
    .keywordGroup b{font-size:13px;color:var(--soft);letter-spacing:.08em}
    .houseGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
    .houseCard .num{width:44px;height:44px;border-radius:15px;display:grid;place-items:center;background:var(--rose);color:white;font-weight:1000;float:left;margin-right:12px}
    .comboPanel{display:grid;grid-template-columns:400px 1fr;gap:24px;align-items:start}
    .comboControls{background:white;border:1px solid var(--line2);border-radius:28px;padding:18px;box-shadow:var(--shadow);position:sticky;top:78px}
    label{display:block;font-size:13px;color:var(--soft);font-weight:1000;letter-spacing:.12em;margin:12px 0 6px}
    select{width:100%;border:1px solid var(--line);background:var(--panel);border-radius:16px;padding:12px 13px;color:var(--ink);font-weight:850}
    .comboFormula{margin-top:14px;padding:12px;border-radius:18px;background:var(--paper);border:1px solid var(--line2);font-weight:900;color:var(--rose2)}
    .empty{padding:24px;background:white;border:1px solid var(--line2);border-radius:24px;color:var(--muted);font-weight:800;text-align:center}
    .hidden{display:none!important}


    /* Entrance transition: Book of Figures — A version / desktop-first */
    .transitionOverlay{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;padding:40px;background:radial-gradient(circle at 50% 18%,#fff7e9cc 0,#5a534d99 48%,#3f3731c8 100%);backdrop-filter:blur(10px);opacity:0;pointer-events:none;overflow:hidden}
    .transitionOverlay.open{display:flex;pointer-events:auto;animation:overlayIn .22s ease-out both}
    .transitionOverlay.closing{animation:overlayOut .32s ease-in both}
    .transitionOverlay:before{content:"";position:absolute;inset:-20%;background:radial-gradient(circle at 28% 30%,#f7e8af66 0 1px,transparent 2px),radial-gradient(circle at 70% 60%,#ffffff55 0 1px,transparent 2px);background-size:34px 34px,46px 46px;opacity:.42;animation:sandDrift 1.35s linear both}
    .transitionStage{position:relative;width:min(1040px,calc(100vw - 80px));height:min(620px,calc(100vh - 90px));display:grid;place-items:center;perspective:1600px;isolation:isolate}
    .transitionBook{position:relative;width:min(940px,100%);height:min(540px,100%);filter:drop-shadow(0 36px 58px #0000004a);transform-style:preserve-3d;animation:bookRise .28s cubic-bezier(.2,.85,.26,1) both}
    .bookAura{position:absolute;inset:10% 7%;border-radius:48px;background:radial-gradient(circle,#f7e8af52 0,#b4766e17 46%,transparent 72%);filter:blur(14px);animation:auraPulse 1.05s ease-out both}
    .bookShadow{position:absolute;left:10%;right:10%;bottom:-24px;height:38px;border-radius:50%;background:#00000038;filter:blur(15px);animation:shadowGrow 1.05s ease-out both}
    .bookPage{position:absolute;top:28px;bottom:28px;width:50%;background:linear-gradient(135deg,#fffdf7 0%,#f7f1e6 54%,#eee3d2 100%);border:1px solid #d7c9b8;box-shadow:inset 0 0 0 1px #ffffffa8,0 18px 40px #00000024;overflow:hidden;backface-visibility:hidden}
    .bookPage:before{content:"";position:absolute;inset:18px;border:1px solid #d0c9c070;border-radius:22px;pointer-events:none}
    .bookPage:after{content:"";position:absolute;top:0;bottom:0;width:54px;opacity:.55;pointer-events:none}
    .bookPage.left{left:0;border-radius:34px 12px 12px 34px;transform-origin:100% 50%;animation:leftPageOpen 1.05s cubic-bezier(.18,.72,.22,1) both}
    .bookPage.right{right:0;border-radius:12px 34px 34px 12px;transform-origin:0 50%;animation:rightPageOpen 1.05s cubic-bezier(.18,.72,.22,1) both}
    .bookPage.left:after{right:0;background:linear-gradient(to left,#9f8c7526,transparent)}
    .bookPage.right:after{left:0;background:linear-gradient(to right,#9f8c7526,transparent)}
    .bookSpine{position:absolute;top:25px;bottom:25px;left:50%;width:20px;transform:translateX(-50%);border-radius:999px;background:linear-gradient(90deg,#9f8c7536,#fff7eacc,#9f8c7536);box-shadow:0 0 16px #00000014;z-index:4;animation:spineGlow 1.05s ease-out both}
    .transitionBook:before{content:"";position:absolute;left:22%;right:22%;top:50%;height:190px;transform:translateY(-10%);z-index:5;border-radius:50%;background:radial-gradient(ellipse at center,#f7e8af70 0%,#ead8ab42 38%,#c5a87c18 58%,transparent 76%);filter:blur(10px);opacity:0;animation:pageGlyphGlow 1.18s ease-out .42s both;pointer-events:none}
    .bookEmission{position:absolute;left:50%;top:59%;z-index:9;width:330px;height:92px;transform:translate(-50%,-50%) rotateX(58deg);border-radius:50%;background:radial-gradient(ellipse at center,#fff7d8d8 0%,#f3e5b5a0 22%,#c5a87c48 48%,transparent 76%);filter:blur(4px);opacity:0;mix-blend-mode:screen;animation:emissionOpen 1.18s ease-out .46s both;pointer-events:none}
    .bookEmission:before{content:"";position:absolute;left:50%;top:50%;width:68%;height:2px;transform:translate(-50%,-50%);border-radius:999px;background:linear-gradient(90deg,transparent,#fff8d8,#c5a87c,transparent);box-shadow:0 0 18px #f3e5b5cc,0 0 38px #c5a87c80;opacity:.92}
    .bookTitleBlock{position:absolute;left:50%;top:39%;width:min(560px,64%);transform:translate(-50%,-50%);text-align:center;z-index:7;animation:titleReveal .62s ease-out .42s both}
    .transitionTitle{font-size:56px;font-weight:1000;letter-spacing:.34em;color:var(--ink);line-height:1.2;text-shadow:0 2px 0 #fff8}
    .transitionSub{margin-top:10px;font-size:13px;color:var(--rose2);font-weight:1000;letter-spacing:.34em;text-transform:uppercase}
    .bookRule{width:210px;height:1px;margin:22px auto 0;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
    .bookSeal{width:64px;height:64px;margin:18px auto 0;border-radius:50%;display:grid;place-items:center;background:#fff9eb;border:1px solid #d8c47d;box-shadow:0 0 0 8px #f7e8af35,0 0 28px #f7e8af85;color:var(--rose2);font-weight:1000;letter-spacing:.08em;animation:sealPop .48s cubic-bezier(.2,1.25,.24,1) .66s both}
    .transitionGlyphs{position:absolute;left:50%;top:58%;z-index:10;width:1px;height:1px;transform-style:preserve-3d;perspective:1600px;pointer-events:none;animation:glyphSourcePulse .42s ease-out .52s both}
    .transitionGlyphs:before{content:"";position:absolute;left:50%;top:50%;width:190px;height:120px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(ellipse at center,#f7e8af95 0%,#e7d2a15e 36%,#c5a87c22 62%,transparent 78%);filter:blur(12px);opacity:0;animation:glyphPortalGlow 1.05s ease-out .48s both}
    .transitionGlyph{position:absolute;left:0;top:0;width:74px;height:74px;margin:-37px 0 0 -37px;background:transparent;border:0;border-radius:0;padding:0;display:grid;place-items:center;color:#C5A87C;opacity:0;transform-origin:center;filter:drop-shadow(0 1px 0 #fff8) drop-shadow(0 0 12px #f3e5b5a0);animation:glyphFlyOut 1.34s cubic-bezier(.12,.78,.16,1) both;animation-delay:calc(.62s + var(--i) * 34ms)}
    .transitionGlyph:after{content:"";position:absolute;left:50%;top:50%;width:58px;height:1.5px;border-radius:999px;background:linear-gradient(90deg,#f3e5b5b0,transparent);transform:translate(-50%,-50%) rotate(var(--trail)) scaleX(0);transform-origin:0 50%;opacity:0;animation:glyphTrail 1.08s ease-out both;animation-delay:calc(.72s + var(--i) * 34ms);pointer-events:none}
    .transitionGlyph .fire,.transitionGlyph .air,.transitionGlyph .water,.transitionGlyph .earth{color:#C5A87C!important}
    .transitionGlyph .dots{gap:4px;opacity:.96}.transitionGlyph .line{height:7px;gap:7px}.transitionGlyph .dot{width:6px;height:6px;border-radius:1.4px;background:currentColor;box-shadow:0 0 0 1px #fff6,0 0 12px #f3e5b577}
    .figureMiniCard.entering{opacity:0;animation:cardRise .46s cubic-bezier(.2,.85,.28,1) both;animation-delay:calc(var(--i) * 34ms)}
    @keyframes overlayIn{from{opacity:0}to{opacity:1}}
    @keyframes overlayOut{from{opacity:1}to{opacity:0}}
    @keyframes sandDrift{from{transform:translate3d(0,18px,0);opacity:0}22%{opacity:.42}to{transform:translate3d(0,-16px,0);opacity:.22}}
    @keyframes bookRise{from{opacity:0;transform:translateY(26px) scale(.94) rotateX(9deg)}to{opacity:1;transform:translateY(0) scale(1) rotateX(0)}}
    @keyframes leftPageOpen{0%{transform:rotateY(-78deg);filter:brightness(.72)}58%{transform:rotateY(6deg);filter:brightness(1.03)}100%{transform:rotateY(0);filter:brightness(1)}}
    @keyframes rightPageOpen{0%{transform:rotateY(78deg);filter:brightness(.72)}58%{transform:rotateY(-6deg);filter:brightness(1.03)}100%{transform:rotateY(0);filter:brightness(1)}}
    @keyframes titleReveal{from{opacity:0;transform:translate(-50%,-46%) scale(.95);filter:blur(4px)}to{opacity:1;transform:translate(-50%,-50%) scale(1);filter:blur(0)}}
    @keyframes sealPop{from{opacity:0;transform:scale(.55) rotate(-12deg)}to{opacity:1;transform:scale(1) rotate(0)}}
    @keyframes glyphSourcePulse{from{opacity:0;transform:translateY(18px) scale(.82)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes glyphPortalGlow{0%{opacity:0;transform:translate(-50%,-38%) scale(.42)}42%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}100%{opacity:.52;transform:translate(-50%,-52%) scale(1)}}
    @keyframes glyphFlyOut{0%{opacity:0;transform:translate3d(0,42px,-220px) scale(.18) rotateZ(0deg) rotateX(34deg);filter:blur(12px) drop-shadow(0 0 0 #f3e5b500)}18%{opacity:.92;transform:translate3d(0,4px,-20px) scale(.62) rotateZ(0deg) rotateX(8deg);filter:blur(2px) drop-shadow(0 0 24px #f3e5b5c0)}54%{opacity:1;transform:translate3d(calc(var(--tx) * .74),calc(var(--ty) * .72),var(--tz)) scale(1.02) rotateZ(calc(var(--rz) * .7)) rotateX(0deg);filter:blur(.1px) drop-shadow(0 0 22px #f3e5b5b0)}78%{opacity:.88;transform:translate3d(var(--tx),var(--ty),calc(var(--tz) + 80px)) scale(1.11) rotateZ(var(--rz));filter:blur(.45px) drop-shadow(0 0 18px #f3e5b590)}100%{opacity:0;transform:translate3d(calc(var(--tx) * 1.2),calc(var(--ty) * 1.16),280px) scale(1.25) rotateZ(var(--rz));filter:blur(5px) drop-shadow(0 0 10px #f3e5b560)}}
    @keyframes glyphTrail{0%,18%{opacity:0;transform:translate(-50%,-50%) rotate(var(--trail)) scaleX(0)}42%{opacity:.55;transform:translate(-50%,-50%) rotate(var(--trail)) scaleX(1)}88%,100%{opacity:0;transform:translate(-50%,-50%) rotate(var(--trail)) scaleX(.35)}}
    @keyframes glyphFlyOutSmall{0%{opacity:0;transform:translate3d(0,24px,-80px) scale(.22) rotateZ(0deg);filter:blur(9px)}24%{opacity:1;transform:translate3d(0,0,8px) scale(.66) rotateZ(0deg);filter:blur(1px)}72%{opacity:.95;transform:translate3d(calc(var(--tx) * .48),calc(var(--ty) * .48),92px) scale(.98) rotateZ(var(--rz));filter:blur(.15px)}100%{opacity:0;transform:translate3d(calc(var(--tx) * .58),calc(var(--ty) * .56),126px) scale(1.08) rotateZ(var(--rz));filter:blur(3px)}}
    @keyframes emissionOpen{0%{opacity:0;transform:translate(-50%,-50%) rotateX(70deg) scale(.28)}32%{opacity:1;transform:translate(-50%,-50%) rotateX(58deg) scale(1.08)}100%{opacity:.55;transform:translate(-50%,-50%) rotateX(58deg) scale(1)}}
    @keyframes pageGlyphGlow{0%{opacity:0;transform:translateY(8%) scale(.72)}38%{opacity:.95;transform:translateY(-2%) scale(1.08)}100%{opacity:.64;transform:translateY(-10%) scale(1)}}
    @keyframes cardRise{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes auraPulse{from{opacity:0;transform:scale(.78)}to{opacity:1;transform:scale(1)}}
    @keyframes shadowGrow{from{opacity:0;transform:scaleX(.42)}to{opacity:1;transform:scaleX(1)}}
    @keyframes spineGlow{from{opacity:0}to{opacity:1}}

    /* Desktop-first refinement: the default layout is the primary desktop experience.
       Tablet and phone rules below only reduce density so the page remains usable. */
    @media (prefers-reduced-motion: reduce){html{scroll-behavior:auto}.view.active,.transitionOverlay.open,.transitionOverlay.closing,.transitionStage,.transitionBook,.bookAura,.bookShadow,.bookPage,.bookSpine,.bookTitleBlock,.bookSeal,.transitionGlyphs,.transitionGlyph,.figureMiniCard.entering{animation:none!important;transition:none!important}.transitionOverlay{display:none!important}}

    @media(max-width:1120px){.transitionStage{width:calc(100vw - 44px);height:min(560px,calc(100vh - 78px))}.transitionTitle{font-size:44px}.transitionGlyphs{top:58%}.transitionGlyph{width:56px;height:56px;margin:-28px 0 0 -28px}.bookTitleBlock{width:min(460px,70%)}.transitionBook:before{left:18%;right:18%;height:160px}}
    @media(max-width:760px){.transitionOverlay{padding:18px}.transitionStage{width:calc(100vw - 28px);height:min(430px,calc(100vh - 60px))}.transitionBook{height:100%}.bookPage{top:18px;bottom:18px}.bookTitleBlock{top:38%}.transitionTitle{font-size:30px;letter-spacing:.22em}.transitionSub{font-size:11px;letter-spacing:.18em}.bookSeal{width:54px;height:54px;margin-top:16px}.transitionGlyphs{top:60%}.transitionGlyph{width:38px;height:38px;margin:-19px 0 0 -19px;animation-name:glyphFlyOutSmall;animation-duration:.86s;animation-delay:calc(.52s + var(--i) * 24ms)}.transitionGlyph .line{height:5px;gap:5px}.transitionGlyph .dot{width:4px;height:4px}.bookRule{width:150px;margin-top:16px}.transitionBook:before{left:14%;right:14%;height:130px}.bookEmission{width:210px;height:70px}.transitionGlyph:after{display:none}}

    @media(max-width:1120px){.wrap{max-width:1000px;padding:22px 18px 72px}.gateGrid{gap:16px}.gate{min-height:300px;padding:26px}.gate h2{font-size:28px}.figureIndexGrid{gap:14px}.figureMiniCard{min-height:260px;padding:18px 14px}.figureMiniCard .figBox{width:84px;min-height:112px}.figureMiniCard h3{font-size:24px}.grid,.houseGrid,.comboPanel{grid-template-columns:1fr}.comboControls{position:static}h1{font-size:46px}}
    @media(max-width:820px){.gateGrid{grid-template-columns:1fr}.homeHero{min-height:auto;padding:58px 22px}.gate{min-height:240px}.figureIndexGrid{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.topbar{align-items:flex-start}.brand{letter-spacing:.08em}main{padding:22px}.viewHead{display:block}.viewHead h2{font-size:30px}.cardTop{grid-template-columns:72px 1fr}.figBox{min-height:96px;padding:8px}.line{height:12px;gap:11px}.dot{width:10px;height:10px}}
    @media(max-width:560px){.wrap{padding:0}.app{border-radius:0;border-left:0;border-right:0}.homeHero{padding:42px 16px}h1{font-size:32px;letter-spacing:.18em}.homeSub{font-size:14px;letter-spacing:.08em}.gate{padding:20px;border-radius:26px}.figureIndexGrid{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.figureMiniCard{min-height:218px;padding:13px;border-radius:24px}.figureMiniCard .figBox{width:72px;min-height:96px;margin-bottom:10px}.figureMiniCard h3{font-size:21px}.figureMiniCard .latin{font-size:11px}.badge{font-size:11px;padding:4px 8px}}


    /* Figure book cards: match the book-opening transition palette */
    .figureMiniCard{
      position:relative;
      background:
        radial-gradient(circle at 50% 0%, #fff8e8 0%, transparent 42%),
        linear-gradient(145deg,#fffdf7 0%,#f8f0dc 48%,#eadcc0 100%);
      border-color:#d7c6a5;
      box-shadow:0 12px 32px #7b5b2d18, inset 0 1px 0 #ffffffb8;
      color:#5A534D;
      overflow:hidden;
    }
    .figureMiniCard:before{
      content:"";
      position:absolute;
      inset:12px;
      border:1px solid #c5a87c38;
      border-radius:24px;
      pointer-events:none;
    }
    .figureMiniCard:after{
      content:"";
      position:absolute;
      left:50%;top:-80px;
      width:180px;height:180px;
      transform:translateX(-50%);
      border-radius:50%;
      background:radial-gradient(circle,#f7e8af52 0%,#c5a87c1c 45%,transparent 72%);
      pointer-events:none;
      opacity:.7;
    }
    .figureMiniCard:hover{
      border-color:#c5a87c;
      box-shadow:0 20px 54px #7b5b2d24, inset 0 1px 0 #ffffffd0;
    }
    .figureMiniCard .figBox{
      position:relative;
      z-index:1;
      background:
        radial-gradient(circle at 50% 18%,#fff6da 0%,#f3e5bf 42%,#e5d1ab 100%);
      border-color:#c5a87c66;
      box-shadow:inset 0 0 22px #ffffffb0, 0 6px 18px #8c6a3920;
      color:#b8955f;
    }
    .figureMiniCard .figBox .fire,
    .figureMiniCard .figBox .air,
    .figureMiniCard .figBox .water,
    .figureMiniCard .figBox .earth{
      color:#b8955f;
    }
    .figureMiniCard .figBox .dot{
      background:currentColor;
      box-shadow:0 0 8px #f7e8af66, 0 1px 0 #fff8;
    }
    .figureMiniCard h3,
    .figureMiniCard .latin,
    .figureMiniCard .codeTag,
    .figureMiniCard .metaLine{
      position:relative;
      z-index:1;
    }
    .figureMiniCard h3{color:#6a5740;text-shadow:0 1px 0 #fff7}
    .figureMiniCard .latin{color:#8f744d}
    .figureMiniCard .codeTag{color:#a98f68}
    .figureMiniCard .badge,
    .figureMiniCard .badge.fire,
    .figureMiniCard .badge.air,
    .figureMiniCard .badge.water,
    .figureMiniCard .badge.earth{
      background:#fff8e8;
      border-color:#d8c6a5;
      color:#8f744d;
      box-shadow:inset 0 1px 0 #ffffffcc;
    }

    /* Minimal figure-book cards: glyph + name only */
    .figureMiniCard{
      min-height:270px;
      justify-content:center;
      gap:22px;
      padding:30px 24px;
    }
    .figureMiniCard .figBox{
      width:126px;
      min-height:158px;
      margin:0;
    }
    .figureMiniCard h3{
      font-size:34px;
      letter-spacing:.18em;
      margin:0;
    }
    .figureMiniCard .figureNameBlock{
      position:relative;
      z-index:1;
      display:grid;
      gap:5px;
      justify-items:center;
    }
    .figureMiniCard .latin{
      margin-top:0;
      font-size:15px;
      letter-spacing:.16em;
      color:#8f744d;
      text-transform:uppercase;
    }

      .figureMiniCard{min-height:246px;padding:24px 18px;gap:18px}

      .figureMiniCard .latin{font-size:13px}

      .figureMiniCard .latin{font-size:10px;letter-spacing:.1em}

<body>
<div class="wrap">
  <div class="app">

      </div>

    <section id="housesView" class="view active">
      <main>
        <div class="viewHead"><div><h2>宮位之書</h2><p class="viewLead">16 宮位場域。本頁已從字典主頁分離成獨立 HTML 空間。</p></div><a class="pill" href="./dictionary.html">← 返回字典首頁</a></div>
        <div class="toolbar"><div class="searchBox"><input id="houseSearch" placeholder="搜尋宮位：第七宮、夫妻、法官、失物…" oninput="renderHouses()"></div></div>
        <div id="houseGrid" class="houseGrid"></div>
      </main>
    </section>
  </div>
</div>
<script>
const HOUSES = [{"id": 1, "name": "第一宮 命宮", "short": "命宮", "keywords": ["求問者", "當下狀態", "生命", "意圖", "開端"], "meaning": "代表問卜者本人、當下狀態、生命、靈魂、意圖與事物開端。", "use": "所有問題都要回頭看第一宮，因為它是求問者在盤中的承載點。"}, {"id": 2, "name": "第二宮 財帛宮", "short": "財帛宮", "keywords": ["金錢", "資源", "所有物", "買賣", "得失"], "meaning": "代表金錢、財富、流動資產、助手、得與失、買賣。", "use": "財務、收入、物品歸屬、失物所有權常從此宮切入。"}, {"id": 3, "name": "第三宮 兄弟宮", "short": "兄弟宮", "keywords": ["消息", "兄弟姊妹", "鄰居", "短途", "夢境"], "meaning": "代表兄弟姊妹、親戚、鄰居、短途旅行、消息、信件與夢境。", "use": "訊息、聯絡、短程移動、夢境碎片可看此宮。"}, {"id": 4, "name": "第四宮 田宅宮", "short": "田宅宮", "keywords": ["家庭", "父親", "房地產", "根基", "結局"], "meaning": "代表父親、家庭、房地產、隱藏之物、事物根基與結局。", "use": "房屋、根本原因、事物基礎與失物藏處常取此宮。"}, {"id": 5, "name": "第五宮 男女宮", "short": "男女宮", "keywords": ["戀愛", "子女", "歡樂", "禮物", "懷孕"], "meaning": "代表子女、愛情、歡樂、宴會、禮物、衣物與懷孕。", "use": "戀愛感、吸引力、愉悅、子女與創作可看此宮。"}, {"id": 6, "name": "第六宮 奴僕宮", "short": "奴僕宮", "keywords": ["疾病", "下屬", "消耗", "恐懼", "小動物"], "meaning": "代表疾病、僕人、下屬、小動物、消耗、恐懼與憂慮。", "use": "健康消耗、工作下層結構、雜務與焦慮常落此宮。"}, {"id": 7, "name": "第七宮 夫妻宮", "short": "夫妻宮", "keywords": ["伴侶", "合夥", "公開敵人", "婚姻", "尋物"], "meaning": "代表伴侶、合夥人、公開敵人、爭執、婚姻、尋物。", "use": "感情對象、合作方、對手、公開互動與拿走者可看此宮。"}, {"id": 8, "name": "第八宮 疾厄宮", "short": "疾厄宮", "keywords": ["死亡", "恐懼", "遺產", "危險", "痛苦"], "meaning": "代表死亡、恐懼、遺產、危險、痛苦、憂慮與毒藥。", "use": "危機、終結、遺產、重度壓力與不可控風險可看此宮。"}, {"id": 9, "name": "第九宮 遷移宮", "short": "遷移宮", "keywords": ["長途", "信仰", "哲學", "學問", "夢兆"], "meaning": "代表長途旅行、宗教、哲學、學問、信仰、星象。", "use": "遠行、宗教、夢兆、學習與更高意義可看此宮。"}, {"id": 10, "name": "第十宮 官祿宮", "short": "官祿宮", "keywords": ["事業", "權威", "名聲", "政府", "母親"], "meaning": "代表母親、國王、權威、職業、地位、榮譽與政府。", "use": "事業、上司、權威、名聲、職位與外在成就常取此宮。"}, {"id": 11, "name": "第十一宮 福德宮", "short": "福德宮", "keywords": ["朋友", "希望", "願望", "貴人", "支持"], "meaning": "代表朋友、希望、願望、幸運、支持者與喜悅的場所。", "use": "願望能否被支持、朋友與貴人是否幫忙，可看此宮。"}, {"id": 12, "name": "第十二宮 相貌宮", "short": "相貌宮", "keywords": ["隱敵", "秘密", "孤立", "監禁", "大型動物"], "meaning": "代表隱藏敵人、監獄、秘密、悲傷、孤立與大型動物。", "use": "隱藏阻力、秘密、孤立、長期困住的背景可看此宮。"}, {"id": 13, "name": "第十三宮 右證人", "short": "右證人", "keywords": ["過去", "求問者背景", "已成因素", "真實背景"], "meaning": "代表過去的影響、求問者的真實背景或已經發生的事。", "use": "用來看求問者一側的證詞與已成背景。"}, {"id": 14, "name": "第十四宮 左證人", "short": "左證人", "keywords": ["未來", "對方", "環境", "阻隔", "牽引"], "meaning": "代表未來的影響、環境、對方或周遭人士的意圖。", "use": "用來看對方、環境與未來牽引的證詞。"}, {"id": 15, "name": "第十五宮 法官", "short": "法官", "keywords": ["核心裁決", "綜合判斷", "定調", "中心"], "meaning": "代表事情的核心裁決、綜合判斷。", "use": "整盤核心裁決點；法官卦會定調事件主軸。"}, {"id": 16, "name": "第十六宮 最終判決", "short": "最終判決", "keywords": ["最終結果", "收束", "結果的結果", "結局"], "meaning": "代表事情的最終結局，由法官與第一宮能量結合而來。", "use": "觀察事情最後如何收束，需與第15宮法官一起看。"}];
function houseCard(h){
  return `<article class="houseCard" id="house-${h.id}"><div class="num">${h.id}</div><h3>${h.name}</h3><div class="metaLine">${h.keywords.map(k=>`<span class="badge">${k}</span>`).join('')}</div><div class="one">${h.meaning}</div><details open><summary>讀盤用途</summary><div class="body">${h.use}</div></details></article>`;
}
function renderHouses(){
  const q=document.getElementById('houseSearch')?.value.trim().toLowerCase()||'';
  const rows=HOUSES.filter(h=>!q||[h.id,h.name,h.short,h.meaning,h.use,...h.keywords].join(' ').toLowerCase().includes(q));
  document.getElementById('houseGrid').innerHTML=rows.length?rows.map(houseCard).join(''):'<div class="empty">找不到符合條件的宮位。</div>';
}
function initialRoute(){
  renderHouses();
  const hash=(location.hash||'').replace('#','');
  if(hash.startsWith('house-')) setTimeout(()=>document.getElementById(hash)?.scrollIntoView({block:'center'}),80);
}
initialRoute();
</script>
</body>
