<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>落宮結果｜沙占起來</title>
<style>
:root{--bg:#EAE8E3;--panel:#F7F6F2;--paper:#FDFBF7;--white:#fff;--ink:#5A534D;--muted:#827A73;--line:#D0C9C0;--line2:#E6E3DC;--rose:#B4766E;--rose2:#9E6961;--gold:#C5A87C;--shadow:0 16px 48px #3d2d1e18}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;line-height:1.75}a{color:inherit;text-decoration:none}.wrap{max-width:1180px;margin:auto;padding:24px}.app{background:var(--panel);border:1px solid var(--line);border-radius:30px;overflow:hidden;min-height:calc(100vh - 48px)}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:center;padding:16px 22px;background:#fdfbf7e8;border-bottom:1px solid var(--line2)}.brand{font-weight:1000;letter-spacing:.18em;color:var(--rose2)}.nav{display:flex;gap:8px;flex-wrap:wrap}.pill{display:inline-flex;border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:900;color:var(--muted)}main{padding:42px}.hero{position:relative;text-align:center;padding:58px 24px;border:1px solid #d9cbb8;border-radius:32px;background:radial-gradient(circle at 50% 0,#fff8e8 0,#fffdf7 52%,#f1ece3 100%);overflow:hidden;box-shadow:var(--shadow)}.hero:before{content:"";position:absolute;inset:0;opacity:.45;background-image:repeating-linear-gradient(45deg,var(--line2) 0,var(--line2) 1px,transparent 1px,transparent 42px),repeating-linear-gradient(-45deg,var(--line2) 0,var(--line2) 1px,transparent 1px,transparent 42px);-webkit-mask-image:radial-gradient(ellipse at 50% 20%,#000,transparent 72%);mask-image:radial-gradient(ellipse at 50% 20%,#000,transparent 72%)}.hero>*{position:relative}.eyebrow{font-size:12px;font-weight:1000;letter-spacing:.25em;color:var(--rose2)}h1{margin:14px 0 0;font-size:clamp(34px,6vw,64px);letter-spacing:.1em}.sub{margin-top:12px;color:var(--muted);font-weight:850}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:22px}.card{background:#fff;border:1px solid var(--line2);border-radius:26px;padding:22px;box-shadow:0 8px 26px #0000000d}.card h2{margin:0 0 10px;font-size:24px}.meta{display:flex;gap:7px;flex-wrap:wrap}.tag{border:1px solid #ded3c4;background:#fffaf0;border-radius:999px;padding:5px 9px;color:#8b7557;font-size:12px;font-weight:900}.lead{margin-top:14px;color:#6f6258;font-weight:820}.notice{margin-top:22px;padding:16px 18px;border:1px solid #d9cbb8;background:#fff8e8;border-radius:20px;color:#7d6849;font-weight:850}.loading{padding:40px;text-align:center;color:var(--muted);font-weight:900}@media(max-width:760px){.wrap{padding:0}.app{border-radius:0;border-left:0;border-right:0;min-height:100vh}.topbar{align-items:flex-start;padding:14px}.grid{grid-template-columns:1fr}main{padding:20px 14px}.hero{padding:44px 18px}.nav{gap:5px}.pill{padding:7px 9px;font-size:12px}}
</style>
</head>
<body><div class="wrap"><div class="app"><header class="topbar"><div class="brand">落宮之書</div><nav class="nav"><a class="pill" href="./placements.html">← 重新搜尋</a><a class="pill" href="./figures.html">卦象之書</a><a class="pill" href="./houses.html">宮位之書</a></nav></header><main id="app"><div class="loading">正在讀取落宮組合……</div></main></div></div>
<script>
const ORDINAL={1:'第一宮',2:'第二宮',3:'第三宮',4:'第四宮',5:'第五宮',6:'第六宮',7:'第七宮',8:'第八宮',9:'第九宮',10:'第十宮',11:'第十一宮',12:'第十二宮'};const SPECIAL={13:'第十三宮 · 右證人',14:'第十四宮 · 左證人',15:'第十五宮 · 法官',16:'第十六宮 · 最終結局'};const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const houseLabel=h=>ORDINAL[h.number]||SPECIAL[h.number]||`第${h.number}宮`;const text=v=>Array.isArray(v)?v.join('、'):String(v??'');
async function load(){try{const q=new URLSearchParams(location.search),fid=q.get('figure'),hid=q.get('house');if(!fid||!hid)throw new Error('缺少卦象或宮位參數');const [fr,hr]=await Promise.all([fetch(`./data/figures/${encodeURIComponent(fid)}.json`,{cache:'no-store'}),fetch(`./data/houses/${encodeURIComponent(hid)}.json`,{cache:'no-store'})]);if(!fr.ok||!hr.ok)throw new Error(`資料讀取失敗 ${fr.status}/${hr.status}`);const [f,h]=await Promise.all([fr.json(),hr.json()]);const hl=houseLabel(h);document.title=`${f.zhName} × ${hl}｜落宮之書`;document.querySelector('#app').innerHTML=`<section class="hero"><div class="eyebrow">PLACEMENT RESULT</div><h1>${esc(f.zhName)} × ${esc(hl)}</h1><div class="sub">${esc(f.latinName||'')} · ${esc(f.dotCode||'')} × ${esc(h.id)}</div></section><section class="grid"><article class="card"><h2>卦象本體</h2><div class="meta"><span class="tag">${esc(f.element||'')}</span><span class="tag">${esc(f.planet||f.astro?.planet||'')}</span><span class="tag">${esc(f.zodiac||f.astro?.zodiac||'')}</span></div><p class="lead">${esc(text(f.coreSymbol||f.judgement?.summary||f.judgement?.oneLine||f.basic?.oneLine||''))}</p></article><article class="card"><h2>宮位場域</h2><div class="meta"><span class="tag">${esc(h.classMeta?.zh||h.houseClass||'')}</span><span class="tag">${esc(h.zone||h.cityLayer?.zone||'')}</span><span class="tag">${esc(h.card?.element?.primary||h.element?.primary||'')}</span></div><p class="lead">${esc(text(h.core?.oneLine||h.identity?.oneLine||h.oneLine||h.core||''))}</p></article></section><div class="notice">此頁已用正式卦象資料與正式宮位資料定位組合；不再使用舊版 HTML 內的硬編碼模板拼句。專屬落宮條目可在下一階段接入 256 組資料庫。</div>`}catch(err){document.querySelector('#app').innerHTML=`<div class="loading">讀取失敗：${esc(err.message)}</div>`}}load();
</script></body></html>
