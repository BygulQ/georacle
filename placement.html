</style></head><body><div class="wrap"><div class="app"><header class="top"><div class="brand">落宮之書</div><nav class="nav"><a class="pill" href="./placements.html">← 重新搜尋</a><a class="pill" href="./figures.html">卦象之書</a><a class="pill" href="./houses.html">宮位之書</a><a class="pill primary" href="./index.html">返回主盤</a></nav></header><main id="app"><div class="loading">正在讀取落宮組合……</div></main></div></div><script>
const ORD={1:'第一宮',2:'第二宮',3:'第三宮',4:'第四宮',5:'第五宮',6:'第六宮',7:'第七宮',8:'第八宮',9:'第九宮',10:'第十宮',11:'第十一宮',12:'第十二宮'},SPC={13:'第十三宮 · 右證人',14:'第十四宮 · 左證人',15:'第十五宮 · 法官',16:'第十六宮 · 最終結局'},ROLE={13:'求問者一側的見證與內在背景。',14:'對方、客體或環境一側的見證。',15:'全盤裁決核心，落宮意義上升為整件事的定調。',16:'結果的結果，落宮意義上升為最終收束。'};
const DEF={elementOrder:['fire','air','water','earth'],systems:{abjad:{baseValues:{fire:1,air:2,water:3,earth:4}},abdah:{baseValues:{fire:1,air:2,water:4,earth:8}},bazdah:{baseValues:{fire:2,air:7,water:4,earth:8}}}};
const $=s=>document.querySelector(s),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),arr=v=>Array.isArray(v)?v:(v==null?[]:[v]),label=h=>ORD[h.number]||SPC[h.number]||`第${h.number}宮`;
function clean(v){return String(v??'').replace(/[\u0590-\u08FF\u0900-\u0D7F]+/g,'').replace(/\s{2,}/g,' ').trim()}function split(v){return String(v??'').split(/[、，,；;。]/).map(x=>x.trim()).filter(Boolean).slice(0,8)}function figSum(f){return clean(f.basic?.one||f.coreSymbol||f.judgement||'')}function houseTheme(h){return clean(h.identity?.coreTheme||h.card?.keywords?.join('、')||h.core||'')}function value(f,k){const v=f?.numbers?.[k];return v&&typeof v==='object'?(v.value??'—'):(v??'—')}
function calc(code,cfg=DEF){const d=String(code||'').split('').map(Number);if(d.length!==4)return{};const o=cfg.elementOrder||DEF.elementOrder,s=cfg.systems||DEF.systems,b=n=>s[n]?.baseValues||DEF.systems[n].baseValues,open=n=>o.reduce((a,e,i)=>a+(d[i]===1?Number(b(n)[e]||0):0),0),weighted=n=>o.reduce((a,e,i)=>a+Number(b(n)[e]||0)*(d[i]===2?2:1),0);return{ao:open('abjad'),aw:weighted('abjad'),ad:open('abdah'),bz:open('bazdah'),pd:d.reduce((a,x)=>a+x,0)}}
function tags(v){const a=arr(v).filter(Boolean);return a.length?`<div class="tags">${a.map(x=>`<span class="tag">${esc(clean(x))}</span>`).join('')}</div>`:'<div class="empty">目前沒有獨立標註</div>'}async function optional(u){const r=await fetch(u,{cache:'no-store'});if(r.status===404)return null;if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json()}
function fallback(f,h){return{summary:`${figSum(f)||f.zhName}進入「${houseTheme(h)||label(h)}」的場域。`,resonance:{level:'基礎合讀',score:50,reason:'目前以卦象本體與宮位場域做基礎合讀。'},expression:{direct:[figSum(f)||f.zhName],favorable:split(f.basic?.favorable),neutral:split(houseTheme(h)),shadow:split(f.basic?.shadow)},synthesis:{figureNature:figSum(f),houseField:houseTheme(h),result:'由卦象方向進入宮位主題，再由主盤角色與裁決結構校正。'},questions:{},notes:['此為基礎合讀。']}}
function matrixPlacement(m,f,h){if(!m?.fp||!m?.hp||!Array.isArray(m.c))return null;const fi=m.fi.indexOf(f.id),hi=m.hi.indexOf(h.id);if(fi<0||hi<0)return null;const c=m.c[fi*16+hi],fp=m.fp[f.id],hp=m.hp[h.id];if(!c||!fp||!hp)return null;const type=m.t[c[0]],score=c[1];let summary,reason;if(type==='同向共振'){summary=`${fp.n}進入${hp.l}，${hp.f}被明顯放大，事情朝「${fp.v}」方向發展。`;reason=`${fp.z}的「${fp.n}」與${hp.l}的「${hp.f}」在方向上互相強化。`}else if(type==='逆向張力'){summary=`${fp.n}進入${hp.l}，對${hp.f}形成明顯拉扯，原本的穩定方式被「${fp.v}」重新改寫。`;reason=`${fp.z}的「${fp.n}」會改寫或拉扯${hp.l}原本要求處理的「${hp.f}」。`}else if(type==='右證人轉化'){summary=`${fp.n}進入右證人位，求問者的真實意圖、內在力量與初步證詞呈現「${fp.v}」方向。`;reason=`第十三宮不是普通事件宮；${fp.z}在此主要改寫尋求者一側的見證。`}else if(type==='左證人轉化'){summary=`${fp.n}進入左證人位，被問者、目標或對手一側的狀態與隱藏意圖呈現「${fp.v}」方向。`;reason=`第十四宮不是普通事件宮；${fp.z}在此主要改寫被尋求者一側的見證。`}else if(type==='裁決定調'){summary=`${fp.n}進入法官位，整盤裁決、綜合衡量與最終定調轉向「${fp.v}」。`;reason=`第十五宮承擔裁決功能；${fp.z}在此把自身方向提升為整件事的總體判斷。`}else if(type==='終局收束'){summary=`${fp.n}進入最終結局位，結果的結果以「${fp.v}」作為最後收束方式。`;reason=`第十六宮處理終局；${fp.z}在此描述事情最後如何結束。`}else{summary=`${fp.n}進入${hp.l}，主要作用在${hp.f}，使此領域呈現「${fp.v}」的變化。`;reason=`${fp.z}把自身的「${fp.n}」帶入${hp.l}，形成此領域特有的轉化。`}const result=hp.n>=13?`${fp.z}在${hp.l}中，以「${fp.v}」方式改寫此裁決角色。`:`${fp.z}不改變${hp.l}主題本身，而是以「${fp.v}」方式處理${hp.k.slice(0,3).join('、')}。`;const questions=Object.fromEntries((hp.q||[]).map((q,i)=>[q.key,{label:q.label,judgement:`在「${q.label}」問題中，先觀察${fp.z}的「${fp.v}」如何作用於${hp.l}；再由主盤證人、法官與最終結果校正。`,tone:i===0&&type==='同向共振'?'good':type==='逆向張力'?'caution':''}]));return{summary,resonance:{level:type,score,reason},expression:{direct:fp.d,favorable:fp.f,neutral:hp.k.slice(0,6),shadow:fp.s},synthesis:{figureNature:fp.n,houseField:hp.f,result},questions,notes:['第一輪 16×16 矩陣核心合讀；不是人工精修定稿。']}}
function source(mode){return mode==='specific'?'專屬落宮條目':mode==='matrix'?'第一輪矩陣':'基礎合讀'}function questionHTML(q){const e=Object.entries(q||{});return e.length?e.map(([k,v])=>`<article class="card"><h3>${esc(v.label||k)}</h3><p>${esc(v.judgement||'')}</p></article>`).join(''):'<div class="empty">此組合尚未建立專屬問題入口。</div>'}
function render({f,h,fi,figures,houses,p,mode,cfg}){const hl=label(h),n=calc(f.dotCode||fi.dotCode,cfg),r=p.resonance||{},e=p.expression||{},s=p.synthesis||{};document.title=`${clean(f.zhName)} × ${hl}｜落宮之書`;$('#app').innerHTML=`<form class="search" id="search"><select id="sf">${figures.map(x=>`<option value="${esc(x.id)}" ${x.id===f.id?'selected':''}>${esc(x.zhName)} · ${esc(x.latinName||'')} · ${esc(x.dotCode||'')}</option>`).join('')}</select><div class="times">×</div><select id="sh">${houses.map(x=>`<option value="${esc(x.id)}" ${x.id===h.id?'selected':''}>${esc(label(x))}</option>`).join('')}</select><button class="go">搜尋</button></form><section class="hero"><div class="eyebrow">PLACEMENT RESULT</div><h1>${esc(clean(f.zhName))} × ${esc(hl)}</h1><div class="sub">${esc(f.latinName||'')} · ${esc(f.dotCode||fi.dotCode||'')} × ${esc(h.id)}</div><p class="summary">${esc(clean(p.summary||''))}</p><span class="badge">${source(mode)}</span></section><section class="section"><h2>核心判讀</h2><div class="grid2"><article class="card"><div class="scorecard"><div class="score-wrap"><div class="score-ring" style="--p:${Math.max(0,Math.min(100,Number(r.score??0)||0))}"></div><div class="score-center"><div class="score-value">${esc(String(r.score??'—'))}</div><div class="score-label">共振值</div></div></div><div class="core-lead"><h3>${esc(r.level||'未評級')}</h3><p>${esc(r.reason||'')}</p><span class="mini">${source(mode)}</span></div></div></article><article class="card"><h3>直接表現</h3>${tags(e.direct)}</article></div></section><section class="section"><h2>表現方向</h2><div class="grid3"><article class="card good"><h3>有利表現</h3>${tags(e.favorable)}</article><article class="card"><h3>中性表現</h3>${tags(e.neutral)}</article><article class="card shadow"><h3>陰影表現</h3>${tags(e.shadow)}</article></div></section><section class="section"><h2>為什麼這樣讀</h2><div class="formula"><div class="box"><b>${esc(f.zhName)}</b><span>${esc(clean(s.figureNature||figSum(f)))}</span></div><div class="op">×</div><div class="box"><b>${esc(hl)}</b><span>${esc(clean(s.houseField||houseTheme(h)))}</span></div><div class="op">=</div><div class="box"><b>落宮表現</b><span>${esc(clean(s.result||p.summary||''))}</span></div></div></section><section class="section"><h2>實務問題入口</h2><div class="grid2">${questionHTML(p.questions)}</div></section><section class="section"><h2>數值層</h2><div class="numbers"><div class="num"><b>${esc(String(value(fi,'triangular')))}</b><span>三角數</span></div><div class="num abjad"><b>Abjad</b><div class="modes"><div class="mode"><strong>${esc(String(n.ao))}</strong><small>時間／應期<br>只算單點</small></div><div class="mode"><strong>${esc(String(n.aw))}</strong><small>空間／尺寸<br>雙點×2</small></div></div></div><div class="num"><b>${esc(String(n.ad))}</b><span>Abdah<br>只算單點</span></div><div class="num"><b>${esc(String(n.bz))}</b><span>Bazdah<br>只算單點</span></div><div class="num"><b>${esc(String(n.pd))}</b><span>實點數</span></div></div><div class="method"><b>運算分流：</b>Abjad 時間／應期只取開放單點；物理空間／尺寸採單點×1、雙點×2。Abdah 與 Bazdah 忽略關閉雙點。內部編碼不公開顯示。</div>${p.numbers?.note?`<div class="note">${esc(clean(p.numbers.note))}</div>`:''}</section>${h.number>=13?`<section class="section"><article class="card special"><h3>裁決結構角色</h3><p>${esc(ROLE[h.number]||'')}</p></article></section>`:''}${arr(p.notes).length?`<section class="section"><article class="card"><h3>判讀註記</h3>${arr(p.notes).map(x=>`<p>${esc(clean(x))}</p>`).join('')}</article></section>`:''}`;$('#search').addEventListener('submit',ev=>{ev.preventDefault();location.href=`./placement.html?figure=${encodeURIComponent($('#sf').value)}&house=${encodeURIComponent($('#sh').value)}`})}
async function load(){try{const q=new URLSearchParams(location.search),fid=q.get('figure'),hid=q.get('house');if(!fid||!hid)throw new Error('缺少卦象或宮位參數');const[ir,hr,fr,hdr,specific,cfg,matrix]=await Promise.all([fetch('./data/figures/index.json',{cache:'no-store'}),fetch('./data/houses/index.json',{cache:'no-store'}),fetch(`./data/figures/${encodeURIComponent(fid)}.json`,{cache:'no-store'}),fetch(`./data/houses/${encodeURIComponent(hid)}.json`,{cache:'no-store'}),optional(`./data/placements/${encodeURIComponent(fid)}/${encodeURIComponent(hid)}.json`),optional('./data/figures/numeric-systems.json'),optional('./data/placements/matrix-runtime.json')]);if(!ir.ok||!hr.ok||!fr.ok||!hdr.ok)throw new Error('資料讀取失敗');const[figures,houses,f,h]=await Promise.all([ir.json(),hr.json(),fr.json(),hdr.json()]);const fi=figures.find(x=>x.id===fid)||{},mx=matrixPlacement(matrix,f,h),p=specific||mx||fallback(f,h),mode=specific?'specific':mx?'matrix':'fallback';render({f,h,fi,figures,houses,p,mode,cfg:cfg||DEF})}catch(e){$('#app').innerHTML=`<div class="loading">讀取失敗：${esc(e.message||e)}</div>`}}load();
