<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>落宮結果｜沙占起來</title>
<style>
:root{--bg:#EAE8E3;--panel:#F7F6F2;--paper:#FDFBF7;--ink:#5A534D;--muted:#827A73;--line:#D0C9C0;--line2:#E6E3DC;--rose:#B4766E;--rose2:#9E6961;--gold:#C5A87C;--good:#6F9477;--bad:#A65F5F}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;line-height:1.75}a{color:inherit;text-decoration:none}button,select{font:inherit}.wrap{max-width:1240px;margin:auto;padding:24px}.app{min-height:calc(100vh - 48px);background:var(--panel);border:1px solid var(--line);border-radius:30px;overflow:hidden}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:center;padding:15px 22px;background:#fdfbf7e8;border-bottom:1px solid var(--line2)}.brand{font-weight:1000;letter-spacing:.18em;color:var(--rose2)}.nav{display:flex;gap:8px;flex-wrap:wrap}.pill{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:900;color:var(--muted)}.pill.primary{background:var(--rose);border-color:var(--rose);color:#fff}main{padding:32px}.searchbar{display:grid;grid-template-columns:1fr 42px 1fr auto;gap:10px;align-items:center;margin-bottom:22px;padding:12px;background:#fff;border:1px solid var(--line2);border-radius:22px}.searchbar select{width:100%;border:1px solid var(--line);background:var(--paper);border-radius:14px;padding:10px 12px;color:var(--ink);font-weight:850}.times{text-align:center;color:var(--gold);font:700 28px Georgia,serif}.go{border:1px solid var(--rose);background:var(--rose);color:#fff;border-radius:14px;padding:10px 16px;font-weight:1000}.hero{position:relative;overflow:hidden;border:1px solid #d9cbb8;border-radius:32px;background:radial-gradient(circle at 50% 0,#fff8e8 0,#fffdf7 55%,#f1ece3 100%);padding:44px 28px;text-align:center}.hero:before{content:"";position:absolute;inset:0;opacity:.45;background-image:repeating-linear-gradient(45deg,var(--line2) 0,var(--line2) 1px,transparent 1px,transparent 42px),repeating-linear-gradient(-45deg,var(--line2) 0,var(--line2) 1px,transparent 1px,transparent 42px)}.hero>*{position:relative}.eyebrow{font-size:12px;font-weight:1000;letter-spacing:.24em;color:var(--rose2)}h1{margin:10px 0 0;font-size:clamp(34px,6vw,64px);letter-spacing:.08em}.sub{margin-top:8px;color:var(--muted);font-weight:850}.summary{max-width:780px;margin:18px auto 0;font-size:18px;font-weight:850;color:#6d5f54}.badge{display:inline-flex;margin-top:16px;border:1px solid #d6c5aa;background:#fff8e8;border-radius:999px;padding:6px 11px;color:#8b714e;font-size:12px;font-weight:1000}.section{margin-top:24px}.section h2{margin:0 0 12px;font-size:28px;letter-spacing:.08em}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.card{background:#fff;border:1px solid var(--line2);border-radius:24px;padding:19px}.card h3{margin:0 0 8px}.card p{margin:0;color:var(--muted);font-weight:760}.tags{display:flex;gap:8px;flex-wrap:wrap}.tag{border:1px solid #dfd4c5;background:#fffaf0;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;color:#806b50}.good{border-top:4px solid var(--good)}.shadow{border-top:4px solid var(--bad)}.formula{display:grid;grid-template-columns:1fr 40px 1fr 40px 1fr;gap:10px}.box{background:#fff;border:1px solid var(--line2);border-radius:22px;padding:18px;min-height:130px}.box b{display:block}.box span{display:block;margin-top:8px;color:var(--muted);font-weight:760}.op{display:grid;place-items:center;color:var(--gold);font:700 30px Georgia,serif}.numbers{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.num{background:#fff;border:1px solid var(--line2);border-radius:20px;padding:15px;text-align:center}.num b{display:block;font-size:24px;color:#775f43}.num span{display:block;margin-top:4px;color:var(--muted);font-size:12px;font-weight:900}.abjad b{font-size:16px}.modes{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:9px}.mode{padding:8px 5px;border:1px solid #e4d8c5;border-radius:13px;background:#fffaf0}.mode strong{display:block;font-size:21px}.mode small{display:block;font-size:10px;line-height:1.35;color:var(--muted);font-weight:900}.method{margin-top:12px;padding:14px 16px;background:#fff;border:1px solid var(--line2);border-radius:18px;color:var(--muted);font-size:13px;font-weight:800}.loading,.empty{padding:50px;text-align:center;color:var(--muted);font-weight:900}.special{background:linear-gradient(135deg,#fffdf7,#f7efdf)}
@media(max-width:760px){.wrap{padding:0}.app{border-radius:0;min-height:100vh}main{padding:18px 14px 42px}.topbar{align-items:flex-start;padding:14px}.nav{gap:5px}.pill{font-size:12px;padding:7px 9px}.searchbar,.grid2,.grid3,.formula{grid-template-columns:1fr}.times,.op{height:32px}.numbers{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap"><div class="app">
<header class="topbar"><div class="brand">落宮之書</div><nav class="nav"><a class="pill" href="./placements.html">← 重新搜尋</a><a class="pill" href="./figures.html">卦象之書</a><a class="pill" href="./houses.html">宮位之書</a><a class="pill primary" href="./index.html">返回主盤</a></nav></header>
<main id="app"><div class="loading">正在讀取落宮組合……</div></main>
</div></div>
<script>
const ORDINAL={1:'第一宮',2:'第二宮',3:'第三宮',4:'第四宮',5:'第五宮',6:'第六宮',7:'第七宮',8:'第八宮',9:'第九宮',10:'第十宮',11:'第十一宮',12:'第十二宮'};
const SPECIAL={13:'第十三宮 · 右證人',14:'第十四宮 · 左證人',15:'第十五宮 · 法官',16:'第十六宮 · 最終結局'};
const ROLE={13:'求問者一側的見證與內在背景。',14:'對方、客體或環境一側的見證。',15:'全盤裁決核心，落宮意義上升為整件事的定調。',16:'結果的結果，落宮意義上升為最終收束。'};
const DEF={elementOrder:['fire','air','water','earth'],systems:{abjad:{baseValues:{fire:1,air:2,water:3,earth:4}},abdah:{baseValues:{fire:1,air:2,water:4,earth:8}},bazdah:{baseValues:{fire:2,air:7,water:4,earth:8}}}};
const $=s=>document.querySelector(s),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),arr=v=>Array.isArray(v)?v:(v==null?[]:[v]),label=h=>ORDINAL[h.number]||SPECIAL[h.number]||`第${h.number}宮`;
function clean(v){return String(v??'').replace(/[\u0590-\u08FF\u0900-\u0D7F]+/g,'').replace(/\s{2,}/g,' ').trim()}
function split(v){return String(v??'').split(/[、，,；;。]/).map(x=>x.trim()).filter(Boolean).slice(0,8)}
function figureSummary(f){return clean(f.basic?.one||f.coreSymbol||f.judgement||'')}
function houseTheme(h){return clean(h.identity?.coreTheme||h.card?.keywords?.join('、')||h.core||'')}
function value(f,k){const v=f?.numbers?.[k];return v&&typeof v==='object'?(v.value??'—'):(v??'—')}
function calc(code,cfg=DEF){const d=String(code||'').split('').map(Number);if(d.length!==4)return{};const o=cfg.elementOrder||DEF.elementOrder,s=cfg.systems||DEF.systems,b=n=>s[n]?.baseValues||DEF.systems[n].baseValues,open=n=>o.reduce((a,e,i)=>a+(d[i]===1?Number(b(n)[e]||0):0),0),weighted=n=>o.reduce((a,e,i)=>a+Number(b(n)[e]||0)*(d[i]===2?2:1),0);return{abjadOpen:open('abjad'),abjadWeighted:weighted('abjad'),abdah:open('abdah'),bazdah:open('bazdah'),physical:d.reduce((a,x)=>a+x,0)}}
function tags(v){const a=arr(v).filter(Boolean);return a.length?`<div class="tags">${a.map(x=>`<span class="tag">${esc(clean(x))}</span>`).join('')}</div>`:'<div class="empty">目前沒有獨立標註</div>'}
function fallback(f,h){return{summary:`${figureSummary(f)||f.zhName}進入「${houseTheme(h)||label(h)}」的場域。`,resonance:{level:'待專屬條目',score:50,reason:'目前以卦象本體與宮位場域做基礎合讀。'},expression:{direct:[figureSummary(f)||f.zhName],favorable:split(f.basic?.favorable),neutral:split(houseTheme(h)),shadow:split(f.basic?.shadow)},synthesis:{figureNature:figureSummary(f),houseField:houseTheme(h),result:'由卦象方向進入宮位主題，再由主盤角色與裁決結構校正。'},questions:{},notes:['此為基礎合讀，不等同專屬落宮條目。']}}
async function optional(u){const r=await fetch(u,{cache:'no-store'});if(r.status===404)return null;if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json()}
function render({f,h,fi,figures,houses,p,specific,cfg}){const hl=label(h),n=calc(f.dotCode||fi.dotCode,cfg),r=p.resonance||{},e=p.expression||{},s=p.synthesis||{};document.title=`${clean(f.zhName)} × ${hl}｜落宮之書`;const qs=Object.entries(p.questions||{}).map(([k,v])=>`<article class="card"><h3>${esc(v.label||k)}</h3><p>${esc(v.judgement||'')}</p></article>`).join('')||'<div class="empty">此組合尚未建立專屬問題入口。</div>';$('#app').innerHTML=`<form class="searchbar" id="search"><select id="sf">${figures.map(x=>`<option value="${esc(x.id)}" ${x.id===f.id?'selected':''}>${esc(x.zhName)} · ${esc(x.latinName||'')} · ${esc(x.dotCode||'')}</option>`).join('')}</select><div class="times">×</div><select id="sh">${houses.map(x=>`<option value="${esc(x.id)}" ${x.id===h.id?'selected':''}>${esc(label(x))}</option>`).join('')}</select><button class="go">搜尋</button></form><section class="hero"><div class="eyebrow">PLACEMENT RESULT</div><h1>${esc(clean(f.zhName))} × ${esc(hl)}</h1><div class="sub">${esc(f.latinName||'')} · ${esc(f.dotCode||fi.dotCode||'')} × ${esc(h.id)}</div><p class="summary">${esc(clean(p.summary||''))}</p><span class="badge">${specific?'專屬落宮條目':'基礎合讀'}</span></section><section class="section"><h2>核心判讀</h2><div class="grid2"><article class="card"><h3>${esc(r.level||'未評級')} · ${esc(String(r.score??'—'))}</h3><p>${esc(r.reason||'')}</p></article><article class="card"><h3>直接表現</h3>${tags(e.direct)}</article></div></section><section class="section"><h2>表現方向</h2><div class="grid3"><article class="card good"><h3>有利表現</h3>${tags(e.favorable)}</article><article class="card"><h3>中性表現</h3>${tags(e.neutral)}</article><article class="card shadow"><h3>陰影表現</h3>${tags(e.shadow)}</article></div></section><section class="section"><h2>為什麼這樣讀</h2><div class="formula"><div class="box"><b>${esc(f.zhName)}</b><span>${esc(clean(s.figureNature||figureSummary(f)))}</span></div><div class="op">×</div><div class="box"><b>${esc(hl)}</b><span>${esc(clean(s.houseField||houseTheme(h)))}</span></div><div class="op">=</div><div class="box"><b>落宮表現</b><span>${esc(clean(s.result||p.summary||''))}</span></div></div></section><section class="section"><h2>實務問題入口</h2><div class="grid2">${qs}</div></section><section class="section"><h2>數值層</h2><div class="numbers"><div class="num"><b>${esc(String(value(fi,'triangular')))}</b><span>三角數</span></div><div class="num abjad"><b>Abjad</b><div class="modes"><div class="mode"><strong>${esc(String(n.abjadOpen))}</strong><small>時間／應期<br>只算單點</small></div><div class="mode"><strong>${esc(String(n.abjadWeighted))}</strong><small>空間／尺寸<br>雙點×2</small></div></div></div><div class="num"><b>${esc(String(n.abdah))}</b><span>Abdah<br>只算單點</span></div><div class="num"><b>${esc(String(n.bazdah))}</b><span>Bazdah<br>只算單點</span></div><div class="num"><b>${esc(String(n.physical))}</b><span>實點數</span></div></div><div class="method"><b>運算分流：</b>Abjad 基數固定為 1、2、3、4；時間／應期只取開放單點，物理空間／尺寸則單點×1、雙點×2。Abdah 與 Bazdah 永遠忽略關閉雙點。內部編碼不公開顯示。</div></section>${h.number>=13?`<section class="section"><article class="card special"><h3>裁決結構角色</h3><p>${esc(ROLE[h.number]||'')}</p></article></section>`:''}`;$('#search').addEventListener('submit',ev=>{ev.preventDefault();location.href=`./placement.html?figure=${encodeURIComponent($('#sf').value)}&house=${encodeURIComponent($('#sh').value)}`})}
async function load(){try{const q=new URLSearchParams(location.search),fid=q.get('figure'),hid=q.get('house');if(!fid||!hid)throw new Error('缺少卦象或宮位參數');const [ir,hr,fr,hdr,p,cfg]=await Promise.all([fetch('./data/figures/index.json',{cache:'no-store'}),fetch('./data/houses/index.json',{cache:'no-store'}),fetch(`./data/figures/${encodeURIComponent(fid)}.json`,{cache:'no-store'}),fetch(`./data/houses/${encodeURIComponent(hid)}.json`,{cache:'no-store'}),optional(`./data/placements/${encodeURIComponent(fid)}/${encodeURIComponent(hid)}.json`),optional('./data/figures/numeric-systems.json')]);if(!ir.ok||!hr.ok||!fr.ok||!hdr.ok)throw new Error('資料讀取失敗');const [figures,houses,f,h]=await Promise.all([ir.json(),hr.json(),fr.json(),hdr.json()]);render({f,h,fi:figures.find(x=>x.id===fid)||{},figures,houses,p:p||fallback(f,h),specific:!!p,cfg:cfg||DEF})}catch(e){$('#app').innerHTML=`<div class="loading">讀取失敗：${esc(e.message||e)}</div>`}}load();
</script>
</body></html>
