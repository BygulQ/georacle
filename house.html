<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>宮位詳解｜沙占起來</title>
<style>
:root{--bg:#EAE8E3;--paper:#FDFBF7;--panel:#F8F3EA;--ink:#4f473f;--muted:#827A73;--line:#D0C9C0;--line2:#E6E3DC;--rose:#B4766E;--rose2:#9E6961;--gold:#C5A87C;--shadow:0 12px 34px #00000016;--shadow2:0 22px 70px #00000024}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:radial-gradient(circle at 50% -15%,#fff7e8 0,#eee8dd 48%,#d9d2c4 100%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;line-height:1.75}a{color:inherit;text-decoration:none}.wrap{max-width:1280px;margin:auto;padding:26px 26px 76px}.app{background:#f7f3eb;border:1px solid var(--line);border-radius:34px;overflow:hidden;box-shadow:0 18px 52px #4a332117}.topbar{position:sticky;top:0;z-index:30;display:flex;justify-content:space-between;gap:16px;align-items:center;padding:15px 22px;background:#fdfbf7ed;border-bottom:1px solid var(--line2);backdrop-filter:blur(10px)}.brand{font-weight:1000;letter-spacing:.16em;color:var(--rose2)}.nav,.actions,.tags{display:flex;gap:8px;flex-wrap:wrap}.nav{justify-content:flex-end}.pill{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;font-weight:900;font-size:13px;color:var(--muted)}.pill.primary{background:var(--rose);border-color:var(--rose);color:#fff}main{padding:38px}.overline{display:inline-flex;border:1px solid #d7c6a5;background:#fff8e8;color:#8f744d;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:1000;letter-spacing:.14em}.scene{position:relative;min-height:360px;margin-top:22px;border-radius:30px;overflow:hidden;border:1px solid #ccb58c;box-shadow:var(--shadow2);background:#211710}.scene img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:saturate(.92) contrast(1.02) brightness(.84)}.scene:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,#1c130d08 25%,#160e08c9 100%)}.sceneText{position:absolute;left:28px;right:28px;bottom:24px;z-index:2;color:#fff8ea;text-shadow:0 2px 16px #000}.sceneText small{font-weight:1000;letter-spacing:.14em;color:#e8d0a5}.sceneText b{display:block;margin-top:5px;font-size:34px;letter-spacing:.08em;line-height:1.25}.sceneText span{display:block;margin-top:6px;color:#eadcc0;font-weight:850;max-width:880px}.sceneNav{position:absolute;right:22px;top:20px;z-index:3}.sceneNav .pill{background:#fffaf0e8}.hero{display:grid;grid-template-columns:310px minmax(0,1fr);gap:24px;margin-top:24px}.houseCard,.summary,.section,.research{background:#fffdf7;border:1px solid var(--line);border-radius:30px;box-shadow:var(--shadow)}.houseCard{min-height:390px;padding:26px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:linear-gradient(180deg,#fffdf7,#f4ead8)}.roman{font-family:Georgia,serif;font-size:82px;line-height:1;color:#9f7f49;font-weight:900}.houseCard h1{margin:20px 0 4px;font-size:36px;letter-spacing:.14em}.tag{display:inline-flex;border:1px solid #d8c6a5;background:#fff8e8;border-radius:999px;padding:5px 9px;color:#7d684a;font-size:12px;font-weight:1000}.tags{justify-content:center;margin-top:18px}.generation{width:100%;margin-top:16px;padding:13px 14px;border-radius:18px;background:linear-gradient(135deg,#2f2a27,#574738);color:#fff6e7;text-align:left}.generation b{display:block;color:#eed19a}.generation .formula{font-family:Georgia,serif;font-size:20px;font-weight:900;margin-top:4px}.summary{padding:28px}.summary h2{margin:14px 0 10px;font-size:40px;letter-spacing:.1em}.lead{font-size:18px;color:#6d5f52;font-weight:900;line-height:1.85}.keywords{display:flex;gap:8px;flex-wrap:wrap}.quickGrid,.cards,.grid2,.grid3{display:grid;gap:12px}.quickGrid,.cards,.grid2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid3{grid-template-columns:repeat(3,minmax(0,1fr))}.quickGrid{margin-top:18px}.quick,.box,.item{background:#fffaf0;border:1px solid #e0d1b4;border-radius:18px;padding:13px 14px}.quick b,.box b{display:block;color:var(--rose2);font-size:12px;letter-spacing:.1em}.quick span{display:block;margin-top:3px;font-weight:950;color:#5e4f3b}.section{margin-top:24px;padding:26px}.sectionHead{display:flex;justify-content:space-between;gap:14px;align-items:end;margin-bottom:14px}.section h2{margin:0;font-size:26px;letter-spacing:.08em}.hint{color:#9a9186;font-size:13px;font-weight:850}.box p,.item p{margin:4px 0 0;color:#76664f;font-weight:820}.box ul{margin:5px 0 0;padding-left:1.2em;color:#6f655a;font-weight:820}.wide{grid-column:1/-1}.item .meta{display:inline-flex;border:1px solid #dec69d;background:#fff8e8;border-radius:999px;padding:3px 8px;font-size:11px;color:#8a6b43;font-weight:1000}.item h3{margin:8px 0 4px;font-size:17px}.engine{margin-top:8px;padding:8px 10px;border-radius:10px;background:#2f2a27;color:#eadcc0;font-size:12px;overflow-wrap:anywhere}.research{margin-top:24px;overflow:hidden}.research>summary{cursor:pointer;list-style:none;padding:20px 24px;background:#f7f1e7;color:#6e5c47;font-size:17px;font-weight:1000;letter-spacing:.06em}.research>summary small{display:block;margin-top:3px;color:#9a9186;font-size:12px;font-weight:800}.researchBody{padding:6px 24px 24px}.group{padding-top:16px;margin-top:16px;border-top:1px solid var(--line2)}.group:first-child{border-top:0}.group h3{margin:0 0 10px;font-size:18px}.rawName{background:#fffaf2;border:1px solid #e3d9c9;border-radius:16px;padding:12px}.rawName b{display:block}.rawName small{display:block;color:#948779}.rawName details{margin-top:7px}.rawScript{margin-top:7px;padding:7px 9px;border-radius:10px;background:#2f2a27;color:#eadcc0;overflow-wrap:anywhere}.quiet{background:#fffaf0;border:1px solid #e0d1b4;border-radius:18px;margin:9px 0;overflow:hidden}.quiet summary{cursor:pointer;padding:13px 15px;font-weight:1000;color:#7d684a}.quietBody{padding:0 15px 15px;color:#6f655a;font-weight:820}.footerNav{display:grid;grid-template-columns:1fr 1fr;gap:12px}.footerNav a{border:1px solid #e0d1b4;background:#fffaf0;border-radius:18px;padding:13px 15px;font-weight:950}.footerNav a:last-child{text-align:right}.notice{padding:12px 14px;border:1px solid #e0d1b4;background:#fff8e8;border-radius:16px;color:#8b7354;font-weight:900}footer{padding:24px;text-align:center;color:#9a9186;font-weight:800;border-top:1px solid var(--line2)}@media(max-width:900px){.hero{grid-template-columns:1fr}.quickGrid,.cards,.grid2,.grid3{grid-template-columns:1fr}.houseCard{min-height:300px}.wide{grid-column:auto}}@media(max-width:560px){.wrap{padding:0}.app{border-radius:0}.topbar{align-items:flex-start;padding:14px}.nav{gap:5px}.pill{font-size:12px;padding:7px 9px}main{padding:18px 14px}.scene{min-height:300px;border-radius:22px}.sceneText{left:18px;right:18px}.sceneText b{font-size:24px}.summary,.section,.houseCard{padding:20px;border-radius:22px}.summary h2{font-size:30px}.roman{font-size:64px}.sectionHead{display:block}.hint{margin-top:4px}}
</style>
</head>
<body><div class="wrap"><div class="app">
<div class="topbar"><div class="brand">宮位之書</div><div class="nav"><a class="pill" href="./dictionary.html">字典首頁</a><a class="pill" href="./figures.html">卦象之書</a><a class="pill" href="./houses.html">宮位地圖</a><a class="pill primary" href="./index.html">返回主盤</a></div></div>
<main id="app"><div class="notice">正在讀取宮位資料……</div></main><footer>沙盤城市配置・Taskin al-Mudun</footer>
</div></div>
<script>
const $=s=>document.querySelector(s),arr=v=>Array.isArray(v)?v:(v==null||v===''?[]:[v]);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const roman=n=>['','Ⅰ','Ⅱ','Ⅲ','Ⅳ','Ⅴ','Ⅵ','Ⅶ','Ⅷ','Ⅸ','Ⅹ','Ⅺ','Ⅻ','ⅩⅢ','ⅩⅣ','ⅩⅤ','ⅩⅥ'][+n]||String(n);
const ordinalName=n=>({1:'第一宮',2:'第二宮',3:'第三宮',4:'第四宮',5:'第五宮',6:'第六宮',7:'第七宮',8:'第八宮',9:'第九宮',10:'第十宮',11:'第十一宮',12:'第十二宮'}[+n]||'');
function clean(v){let s=String(v??'');s=s.replace(/\s*[（(][^（）()]*[\u0590-\u08FF\u0900-\u0D7F][^（）()]*[）)]/g,'').replace(/[\u0590-\u08FF\u0900-\u0D7F]+/g,'').replace(/（\s*）|\(\s*\)/g,'').replace(/\s{2,}/g,' ');return s.trim()}
const raw=v=>Array.isArray(v)?v.join('、'):(v&&typeof v==='object'?JSON.stringify(v):String(v??''));
const text=v=>clean(Array.isArray(v)?v.join('、'):(v&&typeof v==='object'?JSON.stringify(v):String(v??'')));
function id(){const q=new URLSearchParams(location.search).get('id')||'house-01';if(/^house-\d{2}$/.test(q))return q;const n=+q;return n>=1&&n<=16?`house-${String(n).padStart(2,'0')}`:'house-01'}
async function json(u){const r=await fetch(u,{cache:'no-store'});if(!r.ok)throw Error(`${r.status} ${u}`);return r.json()}
function list(v,{r=false}={}){const xs=arr(v).filter(Boolean),f=r?raw:text;return xs.length?`<ul>${xs.map(x=>`<li>${esc(f(typeof x==='string'?x:(x.value||x.title||JSON.stringify(x))))}</li>`).join('')}</ul>`:'<p>—</p>'}
function value(v,o={}){if(Array.isArray(v))return list(v,o);if(v&&typeof v==='object')return `<div class="engine">${esc(JSON.stringify(v))}</div>`;return `<p>${esc((o.r?raw(v):text(v))||'—')}</p>`}
function box(k,v,w=false,o={}){return `<div class="box ${w?'wide':''}"><b>${esc(k)}</b>${value(v,o)}</div>`}
function quick(k,v){return `<div class="quick"><b>${esc(k)}</b><span>${esc(text(v)||'—')}</span></div>`}
function modeLabel(v){return ({Nadhar:'觀望Nadhar',Nutq:'發聲Nutq',Ittisal:'連結Ittisal',Infisal:'分離Infisal'}[String(v??'')]||v)}
function structureLabel(v){return String(v??'').replace(/Nadhar/g,'觀望Nadhar').replace(/Nutq/g,'發聲Nutq').replace(/Ittisal/g,'連結Ittisal').replace(/Infisal/g,'分離Infisal')}
function originPanel(h){const o=h.origin||{};if(!o.label)return'';if(o.type==='generation'){const from=(o.from||h.structure?.generation?.from||[]).map(x=>`<a href="./house.html?id=${encodeURIComponent(x)}">${esc(x)}</a>`).join(' + ');return `<div class="generation"><b>${esc(text(o.label||'生成公式'))}</b><div class="formula">${from} → ${esc(h.id)}</div></div>`}return `<div class="generation"><b>${esc(text(o.label||'來源方式'))}</b><div style="margin-top:4px;font-weight:850;line-height:1.6">${esc(text(o.summary||'—'))}</div></div>`}
function item(q,type='query'){const meta=type==='rule'?(q.type||'rule'):(q.category||'其他'),title=q.title||q.label||'',body=q.interpretation||q.content||q.summary||q.rule||'';return `<article class="item"><span class="meta">${esc(text(meta))}</span><h3>${esc(text(title))}</h3><p>${esc(text(body))}</p>${q.engine?`<div class="engine">ENGINE · ${esc(JSON.stringify(q.engine))}</div>`:''}</article>`}
function relation(r){return `<article class="item"><h3>${r.with?`<a href="./house.html?id=${encodeURIComponent(r.with)}">${esc(text(r.label||r.with))} ↗</a>`:esc(text(r.label||'宮位關係'))}</h3><p>${esc(text(r.rule||''))}</p></article>`}
function dynamicPanel(h){const d=h.dynamicFunction||{};if(!d.summary)return '<div class="notice">尚無動態作用資料。</div>';return `<article class="item"><span class="meta">${esc(text(d.label||modeLabel(d.mode)||'動態作用'))}</span><h3>此宮如何作用</h3><p>${esc(text(d.summary))}</p></article>`}
function render(h){const c=h.core||{},card=h.card||{},b=h.basic||{},m=h.medical||{},s=h.space||{},cl=h.cityLayer||{},cm=h.classMeta||{},measure=h.measure||{},timing=measure.timing||{},elem=typeof card.element==='object'?card.element.primary:card.element,displayName=ordinalName(h.number)||h.zhName;document.title=`${displayName}｜宮位之書`;$('#app').innerHTML=`
<span class="overline">House Book・${esc(text(cm.zh||h.houseClass||'宮位詳解'))}</span>
<section class="scene"><img src="${esc(h.display?.heroImage||h.image||'')}" alt="${esc(text(h.imageAlt||'宮位場景圖'))}"><div class="sceneNav actions"><a class="pill" href="${esc(h.links?.previous||'#')}">← 上一宮</a><a class="pill" href="${esc(h.links?.next||'#')}">下一宮 →</a></div><div class="sceneText"><small>${esc(text(cl.zone||'Taskin al-Mudun'))} · HOUSE ${h.number}</small><b>${esc(text(cl.role||card.cityRole||h.zhName))}</b><span>${esc(text(cl.citySummary||''))}</span></div></section>
<section class="hero"><aside class="houseCard"><div class="roman">${roman(h.number)}</div><h1>${esc(displayName)}</h1><div class="tags"><span class="tag">${esc(text(elem||'—'))}</span><span class="tag">${esc(text(card.direction||'—'))}</span><span class="tag">${esc(text(cm.zh||h.houseClass||'—'))}</span></div>${originPanel(h)}</aside><section class="summary"><span class="overline">第 ${h.number} 宮 · 宮位詳解</span><h2>${esc(displayName)}</h2><p class="lead">${esc(text(c.oneLine||h.identity?.oneLine||''))}</p><div class="keywords">${(c.keywords||card.keywords||[]).map(k=>`<span class="tag">${esc(text(k))}</span>`).join('')}</div><div class="quickGrid">${quick('核心主題',c.theme||h.identity?.coreTheme)}${quick('結構地位',structureLabel(card.structure))}${quick('城市身份',cl.role||card.cityRole)}${quick('方位',s.direction?.primary||card.direction)}${quick('宮族位階',measure.familyScale?.value)}${quick('累加階值',measure.cumulative?.value)}${quick('時間單位',timing.unit)}${quick('應期',timing.display)}</div><div class="actions" style="margin-top:18px"><a class="pill primary" href="./houses.html#house-${h.number}">← 返回城市街景</a></div></section></section>
<section class="section"><div class="sectionHead"><h2>核心掌管</h2><span class="hint">直接用於解盤的主題、人物與定位</span></div><div class="cards">${box('掌管事務',b.domains)}${box('人物角色',b.roles)}${box('城市定位提示',cl.locatingHint,true)}</div></section>
<section class="section"><div class="sectionHead"><h2>實務占卜情境</h2><span class="hint">問題類型與判讀入口</span></div><div class="grid2">${(h.queries||[]).map(q=>item(q)).join('')||'<div class="notice">尚無獨立占卜情境。</div>'}</div></section>
<section class="section"><div class="sectionHead"><h2>人體與醫療</h2><span class="hint">身體部位、體液與病理傾向</span></div><div class="cards">${box('人體部位',m.bodyParts)}${box('體液傾向',m.humors)}${box('病理傾向',m.pathology,true)}</div></section>
<section class="section"><div class="sectionHead"><h2>空間與城市定位</h2><span class="hint">尋物定位與城市配置</span></div><div class="cards">${box('微觀空間',s.microLocations)}${box('方位',s.direction?.primary||card.direction)}${box('城市配置',s.city)}${box('街景層定位',cl.citySummary,true)}</div></section>
<section class="section"><div class="sectionHead"><h2>盤面結構與宮位互動</h2><span class="hint">從靜態宮義進入動態解盤</span></div><div class="grid3">${box('譜系',h.structure?.lineage)}${box('結構動力',modeLabel(h.structure?.modality))}${box('時間角色',h.structure?.temporalRole)}</div><div class="grid2" style="margin-top:12px">${(h.relations||[]).map(relation).join('')||'<div class="notice">尚無宮位關係資料。</div>'}</div></section>
<section class="section"><div class="sectionHead"><h2>動態規則</h2><span class="hint">四態作用與此宮在盤中的作用方式</span></div><div class="grid2">${dynamicPanel(h)}</div></section>
<section class="section"><div class="footerNav"><a href="${esc(h.links?.previous||'#')}">← 上一宮</a><a href="${esc(h.links?.next||'#')}">下一宮 →</a></div></section>`}
const houseId=id(),houseNo=Number(houseId.slice(-2)),shard=Math.ceil(houseNo/4);json(`./data/houses/v2/public-${shard}.json`).then(d=>{const h=(d.records||[]).find(x=>x.id===houseId);if(!h)throw Error(`找不到 ${houseId}`);render(h)}).catch(e=>{$('#app').innerHTML=`<div class="section"><h2>讀取失敗</h2><p>${esc(e.message)}</p><a class="pill primary" href="./houses.html">返回宮位地圖</a></div>`});
</script></body></html>
