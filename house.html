<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>宮位詳解｜沙占起來</title>
  <style>
    :root{
      --bg:#EAE8E3; --paper:#FDFBF7; --panel:#F8F3EA; --ink:#4f473f; --muted:#827A73;
      --line:#D0C9C0; --line2:#E6E3DC; --rose:#B4766E; --rose2:#9E6961;
      --gold:#C5A87C; --gold2:#9f7f49; --sand:#eadcc0; --night:#2f2a27;
      --shadow:0 12px 34px #00000016; --shadow2:0 22px 70px #00000024;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;background:radial-gradient(circle at 50% -15%,#fff7e8 0,#eee8dd 48%,#d9d2c4 100%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",Segoe UI,sans-serif;line-height:1.75}
    a{color:inherit;text-decoration:none} button{font:inherit}
    .wrap{max-width:1240px;margin:0 auto;padding:26px 26px 78px}
    .app{background:#f7f3eb;border:1px solid var(--line);border-radius:34px;overflow:hidden;box-shadow:0 18px 52px #4a332117}
    .topbar{position:sticky;top:0;z-index:80;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:16px 24px;background:#fdfbf7ed;border-bottom:1px solid var(--line2);backdrop-filter:blur(10px)}
    .brand{font-weight:1000;letter-spacing:.18em;color:var(--rose2);white-space:nowrap}.nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .pill{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:white;border-radius:999px;padding:8px 13px;font-weight:950;font-size:13px;color:var(--muted);cursor:pointer;box-shadow:0 2px 8px #00000008;transition:.18s}.pill.primary{background:var(--rose);border-color:var(--rose);color:white}.pill:hover{transform:translateY(-1px);border-color:var(--gold)}
    main{padding:42px}.overline{display:inline-flex;align-items:center;gap:10px;border:1px solid #d7c6a5;background:#fff8e8;color:#8f744d;border-radius:999px;padding:7px 13px;font-size:12px;font-weight:1000;letter-spacing:.2em;text-transform:uppercase}
    .hero{display:grid;grid-template-columns:330px minmax(0,1fr);gap:26px;align-items:stretch;margin-top:24px}.houseCard{min-height:420px;background:linear-gradient(180deg,#fffdf7,#f4ead8);border:1px solid #d2bea0;border-radius:32px;padding:28px;box-shadow:var(--shadow2);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden}.houseCard:before{content:"";position:absolute;inset:18px;border:1px solid #e3cfa8;border-radius:24px;pointer-events:none}.roman{font-family:Georgia,serif;font-size:86px;line-height:1;color:#9f7f49;font-weight:900;text-shadow:0 2px 0 #fff}.houseCard h1{margin:22px 0 4px;font-size:38px;letter-spacing:.16em}.houseCard .latin{color:#7d684a;font-weight:950;letter-spacing:.08em}.cardTags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:22px}.tag{display:inline-flex;border:1px solid #d8c6a5;background:#fff8e8;border-radius:999px;padding:5px 9px;color:#7d684a;font-size:12px;font-weight:1000}
    .summary{background:#fffdf7;border:1px solid var(--line);border-radius:32px;padding:30px;box-shadow:var(--shadow2)}.summary h2{margin:14px 0 12px;font-size:44px;letter-spacing:.12em;line-height:1.2}.summary .lead{font-size:19px;color:#6d5f52;font-weight:900;line-height:1.85;margin:0 0 18px}.keywords{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}.quickGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:20px}.quickItem{background:#fffaf0;border:1px solid #e0d1b4;border-radius:18px;padding:12px 14px}.quickItem b{display:block;color:#9E6961;font-size:12px;letter-spacing:.12em}.quickItem span{display:block;margin-top:3px;color:#5e4f3b;font-weight:950}
    .section{margin-top:24px;background:#fffdf7;border:1px solid var(--line);border-radius:32px;padding:28px;box-shadow:var(--shadow)}.section h2{margin:0 0 16px;font-size:28px;letter-spacing:.12em;color:#5f5248}.cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.infoBox{background:#fffaf0;border:1px solid #e0d1b4;border-radius:20px;padding:15px 16px}.infoBox b{display:block;color:#9E6961;letter-spacing:.08em;margin-bottom:5px}.infoBox p{margin:0;color:#76664f;font-weight:820;line-height:1.78}
    details{background:#fffaf0;border:1px solid #e0d1b4;border-radius:20px;margin:10px 0;overflow:hidden}summary{cursor:pointer;list-style:none;padding:15px 17px;font-weight:1000;color:#9E6961;letter-spacing:.08em}summary::-webkit-details-marker{display:none}.detailBody{padding:0 17px 17px;color:#6f655a;font-weight:820}.detailBody p{margin:0}.table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden}.table th,.table td{border:1px solid #eee3d2;padding:10px 12px;text-align:left;vertical-align:top}.table th{background:#fff8e8;color:#7d684a}.list{margin:0;padding-left:1.3em}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}.notice{margin-top:16px;padding:12px 14px;border:1px solid #e0d1b4;background:#fff8e8;border-radius:18px;color:#8b7354;font-weight:900}
    footer{padding:26px 38px 42px;color:#9a9186;font-weight:850;text-align:center;border-top:1px solid var(--line2)}
    @media(max-width:900px){.hero{grid-template-columns:1fr}.houseCard{min-height:320px}.quickGrid,.cards{grid-template-columns:1fr}.summary h2{font-size:34px}}
    @media(max-width:560px){.wrap{padding:0}.app{border-radius:0;border-left:0;border-right:0}.topbar{align-items:flex-start;padding:14px}.brand{letter-spacing:.08em}.nav{gap:6px}.pill{font-size:12px;padding:7px 10px}main{padding:18px 14px}.houseCard,.summary,.section{border-radius:24px;padding:20px}.roman{font-size:66px}.houseCard h1{font-size:30px}.summary .lead{font-size:16px}.section h2{font-size:23px}.table th,.table td{padding:8px 9px;font-size:14px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="app">
      <div class="topbar">
        <div class="brand">宮位之書</div>
        <div class="nav">
          <a class="pill" href="./dictionary.html">字典首頁</a>
          <a class="pill" href="./figures.html">卦象之書</a>
          <a class="pill" href="./houses.html">宮位地圖</a>
          <a class="pill" href="./placements.html">落宮之書</a>
          <a class="pill primary" href="./index.html">返回主盤</a>
        </div>
      </div>
      <main id="app"><div class="notice">正在讀取宮位資料……</div></main>
      <footer>沙盤城市配置・Taskin al-Mudun</footer>
    </div>
  </div>
<script>
const $ = s => document.querySelector(s);
const escapeHTML = s => String(s ?? '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
const roman = n => ['', 'Ⅰ','Ⅱ','Ⅲ','Ⅳ','Ⅴ','Ⅵ','Ⅶ','Ⅷ','Ⅸ','Ⅹ','Ⅺ','Ⅻ','ⅩⅢ','ⅩⅣ','ⅩⅤ','ⅩⅥ'][Number(n)] || String(n);
function getHouseId(){
  const raw = new URLSearchParams(location.search).get('id') || 'house-01';
  if(/^house-\d{2}$/.test(raw)) return raw;
  const n = Number(raw);
  if(Number.isFinite(n) && n >= 1 && n <= 16) return `house-${String(n).padStart(2,'0')}`;
  return 'house-01';
}
async function fetchJSON(url){
  const res = await fetch(url, {cache:'no-store'});
  if(!res.ok) throw new Error(url);
  return res.json();
}
async function loadHouse(id){
  try { return await fetchJSON(`./data/houses/${id}.json`); }
  catch(err){
    const index = await fetchJSON('./data/houses/index.json');
    const item = index.find(h => h.id === id) || index[0];
    return indexFallback(item);
  }
}
function indexFallback(item){
  return {
    id:item.id,
    number:item.number,
    zhName:item.zhName || item.commonName,
    commonName:item.commonName,
    latinName:'',
    core:{
      theme:item.core || item.traditional,
      oneLine:item.traditional || '此宮深度資料尚未整理，先顯示城市入口資料。',
      keywords:item.tags || []
    },
    mainCard:{
      element:'待整理',
      direction:item.direction || '待整理',
      planet:'待整理',
      zodiac:'待整理',
      structure:item.structure || '待整理',
      cityRole:item.cityRole || '待整理',
      oppositeHouse:'待整理'
    },
    basic:{
      domains:item.traditional,
      people:'待整理',
      body:'待整理',
      health:'待整理',
      lostObject:item.locating,
      relationship:'待整理',
      practice:item.city
    },
    advanced:[
      {title:'目前狀態', type:'text', content:'此宮完整深度資料尚未整理。現在顯示的是 houses.html 入口資料與城市配置摘要。'}
    ],
    links:{backToHouses:'./houses.html', placements:`./placements.html?house=${item.number}`},
    placeholder:true
  };
}
function renderTable(rows){
  return `<table class="table"><tbody>${(rows || []).map(r=>`<tr><th>${escapeHTML(r[0])}</th><td>${escapeHTML(r[1])}</td></tr>`).join('')}</tbody></table>`;
}
function renderAdvanced(item){
  const body = item.type === 'table'
    ? renderTable(item.rows)
    : item.type === 'list'
      ? `<ul class="list">${(item.items || []).map(x=>`<li>${escapeHTML(x)}</li>`).join('')}</ul>`
      : `<p>${escapeHTML(item.content || '')}</p>`;
  return `<details><summary>${escapeHTML(item.title)}</summary><div class="detailBody">${body}</div></details>`;
}
function basicBox(label, value){
  return `<div class="infoBox"><b>${escapeHTML(label)}</b><p>${escapeHTML(value || '待整理')}</p></div>`;
}
function quick(label, value){
  return `<div class="quickItem"><b>${escapeHTML(label)}</b><span>${escapeHTML(value || '待整理')}</span></div>`;
}
function render(h){
  const m = h.mainCard || {};
  const c = h.core || {};
  const b = h.basic || {};
  const keywords = c.keywords || [];
  document.title = `${h.commonName || ''}｜${h.zhName || ''}｜宮位之書`;
  $('#app').innerHTML = `
    <span class="overline">House Book・宮位詳解</span>
    <section class="hero">
      <aside class="houseCard">
        <div class="roman">${roman(h.number)}</div>
        <h1>${escapeHTML(h.zhName || h.commonName)}</h1>
        <div class="latin">${escapeHTML(h.latinName || h.commonName || '')}</div>
        <div class="cardTags">
          <span class="tag">${escapeHTML(m.element)}</span>
          <span class="tag">${escapeHTML(m.direction)}</span>
          <span class="tag">${escapeHTML(m.cityRole)}</span>
        </div>
      </aside>
      <section class="summary">
        <span class="overline">第 ${escapeHTML(h.number)} 宮</span>
        <h2>${escapeHTML(h.commonName)}｜${escapeHTML(h.zhName)}</h2>
        <p class="lead">${escapeHTML(c.oneLine)}</p>
        <div class="keywords">${keywords.map(k=>`<span class="tag">${escapeHTML(k)}</span>`).join('')}</div>
        <div class="quickGrid">
          ${quick('核心主題', c.theme)}
          ${quick('結構地位', m.structure)}
          ${quick('星體／星座', `${m.planet || '待整理'}／${m.zodiac || '待整理'}`)}
          ${quick('對宮', m.oppositeHouse)}
        </div>
        ${h.placeholder ? '<div class="notice">此宮完整 JSON 尚未建立，目前顯示索引資料。</div>' : ''}
        <div class="actions">
          <a class="pill" href="${escapeHTML((h.links && h.links.backToHouses) || './houses.html')}">← 返回宮位地圖</a>
          <a class="pill primary" href="${escapeHTML((h.links && h.links.placements) || `./placements.html?house=${h.number}`)}">查看此宮落宮解釋 →</a>
        </div>
      </section>
    </section>
    <section class="section">
      <h2>基礎閱讀</h2>
      <div class="cards">
        ${basicBox('掌管事務', b.domains)}
        ${basicBox('人物角色', b.people)}
        ${basicBox('人體部位', b.body)}
        ${basicBox('疾病占斷', b.health)}
        ${basicBox('尋物／定位', b.lostObject)}
        ${basicBox('關係與對宮', b.relationship)}
        ${basicBox('實務判讀', b.practice)}
      </div>
    </section>
    <section class="section">
      <h2>進階閱讀</h2>
      ${(h.advanced || []).map(renderAdvanced).join('')}
    </section>
  `;
}
loadHouse(getHouseId()).then(render).catch(err => {
  $('#app').innerHTML = `<div class="section"><h2>讀取失敗</h2><p>找不到宮位資料。請確認 data/houses/index.json 與對應 house-XX.json 已上傳。</p><div class="actions"><a class="pill primary" href="./houses.html">返回宮位地圖</a></div></div>`;
});
</script>
</body>
</html>
