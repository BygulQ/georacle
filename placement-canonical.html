<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>落宮結果｜沙占起來</title><style>:root{--bg:#EAE8E3;--panel:#F7F6F2;--paper:#FDFBF7;--ink:#5A534D;--muted:#827A73;--line:#D0C9C0;--line2:#E6E3DC;--rose:#B4766E;--gold:#C5A87C;--good:#6F9477;--bad:#A65F5F}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;line-height:1.7}a{color:inherit;text-decoration:none}.wrap{max-width:1180px;margin:auto;padding:24px}.app{min-height:calc(100vh - 48px);background:var(--panel);border:1px solid var(--line);border-radius:30px;overflow:hidden}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:14px 22px;background:#fdfbf7e8;border-bottom:1px solid var(--line2)}.brand{font-weight:1000;letter-spacing:.16em;color:#9E6961}.nav{display:flex;gap:7px;flex-wrap:wrap}.pill{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:900}.pill.primary{background:var(--rose);border-color:var(--rose);color:#fff}main{padding:28px}.search{display:grid;grid-template-columns:1fr 36px 1fr auto;gap:9px;align-items:center;margin-bottom:20px;padding:11px;background:#fff;border:1px solid var(--line2);border-radius:20px}.search select{width:100%;border:1px solid var(--line);background:var(--paper);border-radius:13px;padding:10px;color:var(--ink);font-weight:850}.times{text-align:center;color:var(--gold);font-size:28px}.go{border:0;background:var(--rose);color:#fff;border-radius:13px;padding:11px 16px;font-weight:1000}.hero{text-align:center;padding:42px 22px;border:1px solid #d9cbb8;border-radius:30px;background:radial-gradient(circle at 50% 0,#fff8e8,#fffdf7 55%,#f1ece3)}.eyebrow{font-size:12px;font-weight:1000;letter-spacing:.2em;color:#9E6961}h1{margin:10px 0 0;font-size:clamp(34px,6vw,60px)}.sub{margin-top:8px;color:var(--muted);font-weight:850}.summary{max-width:820px;margin:17px auto 0;font-size:18px;font-weight:850}.badge{display:inline-flex;margin-top:15px;border:1px solid #d6c5aa;background:#fff8e8;border-radius:999px;padding:6px 11px;color:#8b714e;font-size:12px;font-weight:1000}.section{margin-top:22px}.section h2{margin:0 0 11px;font-size:26px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:15px}.card,.box{background:#fff;border:1px solid var(--line2);border-radius:22px;padding:18px}.good{border-top:4px solid var(--good)}.bad{border-top:4px solid var(--bad)}.tags{display:flex;gap:7px;flex-wrap:wrap}.tag{border:1px solid #dfd4c5;background:#fffaf0;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900}.formula{display:grid;grid-template-columns:1fr 34px 1fr 34px 1fr;gap:9px;align-items:stretch}.box span{display:block;margin-top:7px;color:var(--muted);font-weight:760}.op{display:grid;place-items:center;color:var(--gold);font-size:28px}.muted{color:var(--muted);font-weight:760}.loading{padding:50px;text-align:center;color:var(--muted);font-weight:900}@media(max-width:760px){.wrap{padding:0}.app{border-radius:0;min-height:100vh}main{padding:18px 14px 42px}.top{align-items:flex-start}.search,.grid2,.formula{grid-template-columns:1fr}.times,.op{height:28px}}</style></head><body><div class="wrap"><div class="app"><header class="top"><div class="brand">落宮之書</div><nav class="nav"><a class="pill" href="./placements.html">← 重新搜尋</a><a class="pill" href="./figures.html">卦象之書</a><a class="pill" href="./houses.html">宮位之書</a><a class="pill primary" href="./index.html">返回主盤</a></nav></header><main id="app"><div class="loading">正在讀取正式 256 格落宮資料……</div></main></div></div><script>const $=s=>document.querySelector(s),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),arr=v=>Array.isArray(v)?v:(v==null?[]:[v]);const FIELD={1:'本人狀態、身體、意圖與事情開端',2:'資源、財物、持有與交易',3:'消息、近人、交流與短程移動',4:'家宅、土地、父母與根基',5:'子女、懷孕、情愛、喜悅與延續',6:'疾病、受困、服務與失物',7:'伴侶、合作、對手與他者',8:'危機、遺產與他人資源',9:'遠行、信仰、學習與夢境',10:'權威、職位、事業與名聲',11:'希望、朋友、盟友與援助',12:'長期壓力、受限與隱性困局',13:'問卜者一側的見證、目的與現況',14:'被問者、目標或他方一側的見證',15:'兩側見證的衡量、平衡與裁決',16:'裁決之後的最終落點'};const ROLE={13:'問卜者見證：讀問卜者一側的狀態、目的、現況與內在證詞。',14:'被問者見證：讀目標、客體、他方或所問之事一側的狀態與證詞。',15:'平衡宮：衡量兩側見證，形成裁決與定調。',16:'最終終局：讀裁決之後的最終落點與結果之結果。'};function tags(v,t){const a=arr(v).filter(Boolean);return a.length?`<div class="tags">${a.map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div>`:`<p class="muted">${esc(t)}</p>`}function ev(s){return s==='page-verified-contextual-inference'?['脈絡推論','缺少直接逐宮記載，採用已核實的同系統脈絡作保守推讀。']:['逐頁核實','由已逐頁核實的直接記載或結構限制整理。']}async function load(){try{const q=new URLSearchParams(location.search),fid=q.get('figure'),hid=q.get('house');if(!fid||!hid)throw Error('缺少卦象或宮位參數');const[fr,cr]=await Promise.all([fetch('./data/figures/index.json',{cache:'no-store'}),fetch('./data/placements/v2/canonical-256-v1.json',{cache:'no-store'})]);if(!fr.ok||!cr.ok)throw Error('正式資料讀取失敗');const[figs,c]=await Promise.all([fr.json(),cr.json()]);if(!c.canonical||c.coverage.total!==256)throw Error('256 格母檔驗證失敗');const f=figs.find(x=>x.id===fid),h=c.houses.find(x=>x.id===hid||String(x.number)===hid.replace(/\D/g,''));if(!f||!h)throw Error('找不到卦象或宮位');const sr=await fetch(h.shard,{cache:'no-store'});if(!sr.ok)throw Error('宮位分片讀取失敗');const sh=await sr.json(),p=arr(sh.records).find(x=>x.f===fid&&Number(x.h)===Number(h.number));if(!p)throw Error('正式 256 格中找不到此組合');const e=ev(p.status),label=h.publicLabel||`第${h.number}宮`,nature=arr(f.minimalCore).join('、')||f.zhName,field=FIELD[h.number]||h.role||label;document.title=`${f.zhName} × ${label}｜落宮之書`;$('#app').innerHTML=`<form class="search" id="search"><select id="sf">${figs.map(x=>`<option value="${esc(x.id)}" ${x.id===f.id?'selected':''}>${esc(x.zhName)} · ${esc(x.latinName)} · ${esc(x.dotCode)}</option>`).join('')}</select><div class="times">×</div><select id="sh">${c.houses.map(x=>`<option value="${esc(x.id)}" ${x.id===h.id?'selected':''}>${esc(x.publicLabel)}</option>`).join('')}</select><button class="go">搜尋</button></form><section class="hero"><div class="eyebrow">CANONICAL PLACEMENT RESULT</div><h1>${esc(f.zhName)} × ${esc(label)}</h1><div class="sub">${esc(f.latinName)} · ${esc(f.dotCode)} × ${esc(h.element)}</div><p class="summary">${esc(p.core)}</p><span class="badge">正式 256 格 · ${esc(e[0])}</span></section><section class="section"><h2>表現方向</h2><div class="grid2"><article class="card good"><h3>有利表現</h3>${tags(p.fav,'本格沒有獨立有利標註')}</article><article class="card bad"><h3>不利／風險表現</h3>${tags(p.unfav,'本格沒有獨立風險標註')}</article></div></section><section class="section"><h2>為什麼這樣讀</h2><div class="formula"><div class="box"><b>${esc(f.zhName)}</b><span>${esc(nature)}</span></div><div class="op">×</div><div class="box"><b>${esc(label)}</b><span>${esc(field)}</span></div><div class="op">=</div><div class="box"><b>${esc(h.interactionType)}</b><span>${esc(p.core)}</span></div></div></section><section class="section"><div class="grid2"><article class="card"><h3>證據層級</h3><p class="muted">${esc(e[1])}</p></article><article class="card"><h3>落宮結構</h3><p class="muted">${esc(h.number>=13?(ROLE[h.number]||field):`${label}以「${field}」作為主要事件場域。`)}</p></article></div></section>`;$('#search').addEventListener('submit',x=>{x.preventDefault();location.href=`./placement.html?figure=${encodeURIComponent($('#sf').value)}&house=${encodeURIComponent($('#sh').value)}`})}catch(e){$('#app').innerHTML=`<div class="loading">讀取失敗：${esc(e.message||e)}</div>`}}load();</script></body></html>
