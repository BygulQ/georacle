<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>卦象之書 v2｜沙占起來</title>
<style>
:root{--bg:#EAE8E3;--panel:#F7F6F2;--paper:#FDFBF7;--white:#fff;--ink:#5A534D;--muted:#827A73;--soft:#99928A;--line:#D0C9C0;--line2:#E6E3DC;--rose:#B4766E;--rose2:#9E6961;--gold:#C5A87C;--fire:#D65245;--air:#B8874A;--water:#4F90C8;--earth:#8A9A86;--shadow:0 8px 26px #00000012;--shadow2:0 18px 50px #0000001a}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",Segoe UI,sans-serif;line-height:1.75}.wrap{max-width:1420px;margin:auto;padding:28px 28px 84px}.app{background:var(--panel);border:1px solid var(--line);border-radius:30px;overflow:hidden;box-shadow:0 12px 34px #00000012}.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:16px 24px;background:#fdfbf7ea;border-bottom:1px solid var(--line2);backdrop-filter:blur(10px)}.brand{font-weight:1000;letter-spacing:.18em;color:var(--rose2)}.nav{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.pill{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;font-weight:900;font-size:13px;color:var(--muted);text-decoration:none}.pill.primary{background:var(--rose);border-color:var(--rose);color:#fff}main{padding:38px}.hero{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:26px;align-items:end;padding:26px 28px;background:linear-gradient(135deg,#fffdf8,#f4eee5);border:1px solid var(--line2);border-radius:28px}.hero h1{margin:0;font-size:46px;letter-spacing:.18em}.hero p{margin:10px 0 0;color:var(--muted);font-weight:760;max-width:820px}.anchorTag{padding:12px 16px;border:1px solid #d7c6a5;border-radius:20px;background:#fff8e8;color:#7d6849;font-weight:900;white-space:nowrap}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:22px 0}.search{flex:1;min-width:230px;border:1px solid var(--line);background:#fff;border-radius:18px;padding:12px 14px;font:inherit;font-weight:800;color:var(--ink)}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:18px}.card{position:relative;background:#fff;border:1px solid var(--line2);border-radius:28px;padding:20px 18px;box-shadow:var(--shadow);text-decoration:none;color:inherit;display:flex;flex-direction:column;align-items:center;text-align:center;min-height:330px;transition:.18s}.card:hover{transform:translateY(-3px);border-color:var(--rose);box-shadow:var(--shadow2)}.pos{position:absolute;top:14px;left:14px;width:38px;height:38px;border-radius:13px;background:var(--rose);color:#fff;display:grid;place-items:center;font-weight:1000}.moved{position:absolute;top:14px;right:14px;border:1px solid #d7c6a5;background:#fff8e8;color:#8f744d;border-radius:999px;padding:5px 8px;font-size:11px;font-weight:1000}.fig{width:92px;min-height:126px;background:var(--paper);border:1px solid var(--line2);border-radius:22px;padding:14px;display:grid;place-items:center;margin:22px 0 12px}.dots{display:flex;flex-direction:column;gap:8px}.lineDot{height:13px;display:flex;align-items:center;justify-content:center;gap:13px}.dot{width:10px;height:10px;transform:rotate(45deg);border-radius:2px;background:currentColor}.fire{color:var(--fire)}.air{color:var(--air)}.water{color:var(--water)}.earth{color:var(--earth)}h2{margin:0;font-size:26px;letter-spacing:.12em}.latin{font-size:12px;color:#8f744d;font-weight:1000;letter-spacing:.13em;text-transform:uppercase}.core{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:13px 0}.chip{border:1px solid var(--line2);background:var(--panel);border-radius:999px;padding:5px 8px;font-size:12px;font-weight:900;color:var(--muted)}.polarity{margin-top:auto;font-size:12px;font-weight:1000;color:var(--rose2)}.empty{padding:30px;text-align:center;color:var(--muted);font-weight:900}@media(max-width:1100px){.grid{grid-template-columns:repeat(3,minmax(0,1fr))}}@media(max-width:820px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.hero{grid-template-columns:1fr}.anchorTag{white-space:normal}.wrap{padding:18px}main{padding:24px}.hero h1{font-size:36px}}@media(max-width:540px){.grid{gap:12px}.card{min-height:260px;padding:15px 10px}.fig{width:72px;min-height:100px;margin-top:30px}h2{font-size:21px}.core{display:none}.nav{display:none}}
</style>
</head>
<body><div class="wrap"><div class="app"><div class="topbar"><div class="brand">卦象之書 v2</div><div class="nav"><a class="pill" href="./dictionary.html">字典首頁</a><a class="pill" href="./houses.html">宮位之書</a><a class="pill" href="./placements.html">落宮之書</a><a class="pill primary" href="./index.html">返回主盤</a></div></div><main><section class="hero"><div><h1>卦象之書</h1><p>以扎納提圓環本位為預設座標。主卡只保留會改變判讀的核心資訊；Bazdah 原位作母體參照，不與主位平權。</p></div><div class="anchorTag">主錨｜Zanati Circle · 16 位</div></section><div class="toolbar"><input id="q" class="search" placeholder="搜尋中文、拉丁名、核心詞…"/></div><div id="grid" class="grid"></div></main></div></div>
<script>
const CLS=['fire','air','water','earth'];
const POL={benefic:'吉',malefic:'凶',mixed:'混合','mixed-benefic':'混合偏吉','mixed-malefic':'混合偏凶','context-dependent-mixed':'情境依附型混合'};
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function dots(code){return '<div class="dots">'+String(code).split('').map((d,i)=>'<div class="lineDot '+CLS[i]+'">'+(d==='1'?'<span class="dot"></span>':'<span class="dot"></span><span class="dot"></span>')+'</div>').join('')+'</div>'}
function pol(r){return r.polarityLabel||'未定'}
function render(records,query=''){const q=query.trim().toLowerCase();const list=records.filter(r=>{const hay=[r.zhName,r.latinName,r.arabicName,...(r.core||[])].join(' ').toLowerCase();return !q||hay.includes(q)});document.getElementById('grid').innerHTML=list.length?list.map(r=>`<a class="card" href="./figure.html?id=${encodeURIComponent(r.id)}"><span class="pos">${r.position}</span>${r.moved?`<span class="moved">Bazdah ${r.parentBazdahPosition}→${r.position}</span>`:''}<div class="fig">${dots(r.dotCode)}</div><h2>${esc(r.zhName)}</h2><div class="latin">${esc(r.latinName)}</div><div class="core">${(r.core||[]).slice(0,4).map(x=>`<span class="chip">${esc(x)}</span>`).join('')}</div><div class="polarity">${esc(pol(r))}</div></a>`).join(''):'<div class="empty">找不到相符卦象。</div>'}
async function main(){try{const res=await fetch('./data/figures/v2/index.json');if(!res.ok)throw new Error('load');const data=await res.json();const rs=[...(data.records||[])].sort((a,b)=>a.position-b.position);render(rs);document.getElementById('q').addEventListener('input',e=>render(rs,e.target.value))}catch(e){document.getElementById('grid').innerHTML='<div class="empty">卦象資料讀取失敗。</div>'}}main();
</script></body></html>
