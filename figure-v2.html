<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>卦象詳情｜卦象之書 v2</title><style>:root{--bg:#EAE8E3;--paper:#FDFBF7;--ink:#5A534D;--muted:#827A73;--line:#D0C9C0;--line2:#E6E3DC;--rose:#B4766E;--gold:#C5A87C;--fire:#D65245;--air:#B8874A;--water:#4F90C8;--earth:#8A9A86}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;line-height:1.75}.wrap{max-width:1200px;margin:auto;padding:24px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px}.btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;text-decoration:none;color:var(--muted);font-weight:900}.hero,.sec{background:#fff;border:1px solid var(--line2);border-radius:28px;padding:24px;margin-top:18px}.hero{display:grid;grid-template-columns:220px 1fr;gap:24px;align-items:center}.glyph{display:grid;place-items:center;min-height:250px;background:var(--paper);border-radius:22px}.dots{display:flex;flex-direction:column;gap:9px}.line{height:14px;display:flex;justify-content:center;gap:14px}.dot{width:11px;height:11px;transform:rotate(45deg);border-radius:2px;background:currentColor}.fire{color:var(--fire)}.air{color:var(--air)}.water{color:var(--water)}.earth{color:var(--earth)}h1{margin:0;font-size:42px;letter-spacing:.14em}.latin{color:#8f744d;font-weight:1000;letter-spacing:.14em}.badges,.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.badge,.chip{border:1px solid var(--line2);background:var(--paper);border-radius:999px;padding:6px 10px;font-weight:900}.badge.anchor{background:#fff8e8;border-color:#d7c6a5;color:#8f744d}.persona{color:var(--muted);font-weight:760;margin-top:16px}.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}.item{background:var(--paper);border:1px solid var(--line2);border-radius:18px;padding:14px}.item h3{margin:0 0 6px;color:#9E6961}.item p{margin:0;color:var(--muted);font-weight:720}table{width:100%;border-collapse:collapse;margin-top:14px}td{border-bottom:1px solid var(--line2);padding:9px}td:first-child{width:34%;color:var(--muted);font-weight:900}@media(max-width:760px){.hero{grid-template-columns:1fr}.g4{grid-template-columns:1fr 1fr}.wrap{padding:16px}}@media(max-width:500px){.g4{grid-template-columns:1fr}h1{font-size:34px}}</style></head><body><div class="wrap"><div class="top"><strong>卦象之書 v2</strong><a class="btn" href="./figures.html">返回卦象卡片</a></div><main id="app">讀取中…</main></div><script>const C=['fire','air','water','earth'],E=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));function D(c){return '<div class="dots">'+String(c).split('').map((d,i)=>'<div class="line '+C[i]+'">'+(d==='1'?'<i class="dot"></i>':'<i class="dot"></i><i class="dot"></i>')+'</div>').join('')+'</div>'}function G(o){return '<div class="g4">'+[['fire','火類宮'],['air','風類宮'],['water','水類宮'],['earth','土類宮']].map(([k,t])=>'<div class="item"><h3>'+t+'</h3><p>'+E(o?.[k]||'—')+'</p></div>').join('')+'</div>'}function T(rows){return '<table>'+rows.map(r=>'<tr><td>'+E(r[0])+'</td><td>'+E(r[1]??'—')+'</td></tr>').join('')+'</table>'}async function M(){const id=new URLSearchParams(location.search).get('id')||'puer';try{const[a,b]=await Promise.all([fetch('./data/figures/v2/index.json'),fetch('./data/figures/v2/records/'+id+'.json')]);if(!a.ok||!b.ok)throw 0;const x=await a.json(),r=await b.json(),i=x.records.find(v=>v.id===id),c=r.sameSystemChapterDoctrine||{},s=r.structuredCorrespondences?.values||{},p=r.projectAnchor||{};document.title=i.zhName+'｜卦象之書 v2';document.getElementById('app').innerHTML='<section class="hero"><div class="glyph">'+D(i.dotCode)+'</div><div><div class="latin">'+E(i.latinName)+'</div><h1>'+E(i.zhName)+'</h1><div class="badges"><span class="badge anchor">扎納提本位 '+E(i.position)+'</span>'+(i.moved?'<span class="badge">Bazdah '+E(i.parentBazdahPosition)+' → '+E(i.position)+'</span>':'<span class="badge">Bazdah 原位 '+E(i.parentBazdahPosition)+'</span>')+'<span class="badge">'+E(i.polarityLabel)+'</span></div><div class="chips">'+(i.core||[]).map(v=>'<span class="chip">'+E(v)+'</span>').join('')+'</div><p class="persona">'+E(c.persona?.summary||'')+'</p></div></section><section class="sec"><h2>元素宮反應</h2>'+G(c.elementalHouseResponses?.responses||{})+'</section><section class="sec"><h2>重複效應</h2>'+G(c.repetitionEffects?.responses||{})+'</section><section class="sec"><h2>結構對應</h2>'+T([['元素',s.element],['發聲／沉默',s.speech],['動靜情態',s.motionAffect],['輕重',s.weight],['外在主星',s.outerRuler],['內在主星',s.innerRuler],['身體部位',s.bodyPart],['形狀',s.shape]])+'</section><section class="sec"><h2>本位與數值</h2>'+T([['扎納提圓環本位',p.canonicalPosition],['Bazdah 母體原位',p.parentBazdahPosition],['是否六形改位',p.movedInZanati?'是':'否'],['Ṭarīq al-Taḍāʿuf 數列值',r.numericAxes?.tadaUfSequenceValue]])+'</section>'}catch(e){document.getElementById('app').innerHTML='<section class="sec">找不到卦象資料。</section>'}}M();</script></body></html>
