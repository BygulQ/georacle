<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>落宮結果｜沙占起來</title><style>:root{--bg:#EAE8E3;--panel:#F7F6F2;--paper:#FDFBF7;--ink:#5A534D;--muted:#827A73;--line:#D0C9C0;--line2:#E6E3DC;--rose:#B4766E;--rose2:#9E6961;--gold:#C5A87C;--good:#6F9477;--bad:#A65F5F;--neutral:#9A8568}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;line-height:1.75}a{color:inherit;text-decoration:none}button,select{font:inherit}.wrap{max-width:1240px;margin:auto;padding:24px}.app{min-height:calc(100vh - 48px);background:var(--panel);border:1px solid var(--line);border-radius:30px;overflow:hidden}.top{display:flex;justify-content:space-between;gap:14px;align-items:center;padding:14px 22px;background:#fdfbf7e8;border-bottom:1px solid var(--line2)}.brand{font-weight:1000;letter-spacing:.18em;color:var(--rose2)}.nav{display:flex;gap:7px;flex-wrap:wrap}.pill{display:inline-flex;border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:900;color:var(--muted)}.pill.primary{background:var(--rose);border-color:var(--rose);color:#fff}main{padding:30px}.search{display:grid;grid-template-columns:1fr 42px 1fr auto;gap:9px;align-items:center;margin-bottom:20px;padding:11px;background:#fff;border:1px solid var(--line2);border-radius:20px}.search select{width:100%;min-width:0;border:1px solid var(--line);background:var(--paper);border-radius:13px;padding:10px;color:var(--ink);font-weight:850}.times{text-align:center;color:var(--gold);font:700 28px Georgia,serif}.go{border:0;background:var(--rose);color:#fff;border-radius:13px;padding:11px 16px;font-weight:1000}.hero{position:relative;overflow:hidden;text-align:center;padding:44px 22px;border:1px solid #d9cbb8;border-radius:30px;background:radial-gradient(circle at 50% 0,#fff8e8,#fffdf7 55%,#f1ece3)}.hero:before{content:"";position:absolute;inset:0;opacity:.42;background-image:repeating-linear-gradient(45deg,var(--line2) 0,var(--line2) 1px,transparent 1px,transparent 42px),repeating-linear-gradient(-45deg,var(--line2) 0,var(--line2) 1px,transparent 1px,transparent 42px)}.hero>*{position:relative}.eyebrow{font-size:12px;font-weight:1000;letter-spacing:.22em;color:var(--rose2)}h1{margin:10px 0 0;font-size:clamp(34px,6vw,62px);letter-spacing:.08em}.sub{margin-top:8px;color:var(--muted);font-weight:850}.summary{max-width:820px;margin:17px auto 0;font-size:18px;font-weight:850;color:#6d5f54}.badge{display:inline-flex;margin-top:15px;border:1px solid #d6c5aa;background:#fff8e8;border-radius:999px;padding:6px 11px;color:#8b714e;font-size:12px;font-weight:1000}.section{margin-top:22px}.section h2{margin:0 0 11px;font-size:27px;letter-spacing:.07em}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:15px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}.card{background:#fff;border:1px solid var(--line2);border-radius:23px;padding:18px}.card h3{margin:0 0 8px}.card p{margin:0;color:var(--muted);font-weight:760}.tags{display:flex;gap:7px;flex-wrap:wrap}.tag{border:1px solid #dfd4c5;background:#fffaf0;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900}.good{border-top:4px solid var(--good)}.conditional{border-top:4px solid var(--neutral)}.shadow{border-top:4px solid var(--bad)}.formula{display:grid;grid-template-columns:1fr 38px 1fr 38px 1fr;gap:9px}.box{background:#fff;border:1px solid var(--line2);border-radius:21px;padding:17px;min-height:130px}.box span{display:block;margin-top:7px;color:var(--muted);font-weight:760}.op{display:grid;place-items:center;color:var(--gold);font:700 30px Georgia,serif}.numbers{display:grid;grid-template-columns:repeat(5,1fr);gap:11px}.num{background:#fff;border:1px solid var(--line2);border-radius:19px;padding:14px;text-align:center}.num b{display:block;font-size:23px;color:#775f43}.num span{display:block;margin-top:3px;color:var(--muted);font-size:11px;font-weight:900}.abjad>b{font-size:15px}.modes{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}.mode{padding:7px 4px;border:1px solid #e4d8c5;border-radius:12px;background:#fffaf0}.mode strong{display:block;font-size:20px}.mode small{font-size:9px;line-height:1.3;color:var(--muted);font-weight:900}.method,.note{margin-top:11px;padding:13px 15px;border-radius:17px;font-size:13px;font-weight:800}.method{background:#fff;border:1px solid var(--line2);color:var(--muted)}.note{background:#fff8e8;border:1px solid #d9cbb8;color:#7d6849}.loading,.empty{padding:50px;text-align:center;color:var(--muted);font-weight:900}.special{background:linear-gradient(135deg,#fffdf7,#f7efdf)}.scorecard{display:grid;grid-template-columns:140px 1fr;gap:18px;align-items:center}.evidence-wrap{width:120px;height:120px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--rose) 0 270deg,#eadfce 270deg 360deg)}.evidence-core{width:90px;height:90px;border-radius:50%;background:#fff;border:1px solid var(--line2);display:grid;place-items:center;text-align:center;padding:8px}.evidence-core strong{font-size:18px;color:#775f43}.evidence-core small{display:block;font-size:10px;line-height:1.25;color:var(--muted);font-weight:1000}.core-lead h3{margin:0 0 8px}.core-lead p{margin:0;color:var(--muted);font-weight:760}.core-lead .mini{display:inline-flex;margin-top:10px;border:1px solid #dfd4c5;background:#fffaf0;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900;color:#8b714e}.question-card p+p{margin-top:8px}.question-focus{color:var(--ink)!important;font-weight:850!important}.meta-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.meta-chip{border:1px solid #dfd4c5;background:#fffaf0;border-radius:999px;padding:5px 9px;font-size:11px;font-weight:900;color:#8b714e}@media(max-width:760px){.wrap{padding:0}.app{border-radius:0;min-height:100vh}main{padding:18px 14px 42px}.top{align-items:flex-start;padding:14px}.nav{gap:5px}.pill{font-size:12px;padding:7px 9px}.search,.grid2,.grid3,.formula{grid-template-columns:1fr}.times,.op{height:30px}.numbers{grid-template-columns:repeat(2,1fr)}.scorecard{grid-template-columns:1fr;justify-items:center;text-align:center}}</style></head><body><div class="wrap"><div class="app"><header class="top"><div class="brand">落宮之書</div><nav class="nav"><a class="pill" href="./placements.html">← 重新搜尋</a><a class="pill" href="./figures.html">卦象之書</a><a class="pill" href="./houses.html">宮位之書</a><a class="pill primary" href="./index.html">返回主盤</a></nav></header><main id="app"><div class="loading">正在讀取正式 256 格落宮資料……</div></main></div></div><script>const DEF={elementOrder:['fire','air','water','earth'],systems:{abjad:{baseValues:{fire:1,air:2,water:3,earth:4}},abdah:{baseValues:{fire:1,air:2,water:4,earth:8}},bazdah:{baseValues:{fire:2,air:7,water:4,earth:8}}}};const FIELD={1:'本人狀態、身體、意圖與事情開端',2:'資源、財物、持有與交易',3:'消息、近人、交流與短程移動',4:'家宅、土地、父母、根基與隱藏事物',5:'子女、懷孕、情愛、喜悅與延續',6:'疾病、受困、服務、失物與隱密問題',7:'伴侶、合作、對手、爭端與被問及的他者',8:'危機、恐懼、遺產與他人資源',9:'遠行、信仰、學習、夢境與遷移',10:'權威、職位、事業、名聲與外在顯化',11:'希望、朋友、盟友、援助與未來利益',12:'隱藏敵對、監禁、慢性壓力、重債與長期困厄',13:'問卜者一側的見證、目的、現況與內在秘密',14:'被問者、目標、客體或他方一側的見證',15:'兩側見證的衡量、平衡與裁決定調',16:'裁決之後的最終落點與結果之結果'};const ROLE={13:'問卜者見證：讀問卜者一側的狀態、目的、現況與內在證詞。',14:'被問者見證：讀目標、客體、他方或所問之事一側的狀態與證詞。',15:'平衡宮：衡量兩側見證，形成裁決與定調。',16:'最終終局：讀裁決之後的最終落點與結果之結果。'};const QMAP={1:['本人狀態','事情開端'],2:['財務與交易','資源是否留得住'],3:['消息與溝通','近人／手足互動'],4:['家宅與土地','根基是否穩定'],5:['情愛與喜悅','子女／懷孕議題'],6:['健康與受困','工作服務／失物'],7:['伴侶與合作','對手與爭端'],8:['危機與風險','遺產／他人資源'],9:['遠行與遷移','學習／信仰／夢境'],10:['事業與職位','名聲／權威關係'],11:['希望能否實現','朋友／盟友援助'],12:['隱藏敵對','長期壓力與受限'],13:['問卜者真正狀態','問卜者內在目的'],14:['被問者／目標狀態','他方隱藏傾向'],15:['兩側如何定調','裁決傾向'],16:['最後會落在哪裡','結果之結果']};const $=s=>document.querySelector(s),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),arr=v=>Array.isArray(v)?v:(v==null?[]:[v]);function clean(v){return String(v??'').replace(/\s{2,}/g,' ').trim()}function tags(v,empty='目前沒有獨立標註'){const a=arr(v).filter(Boolean);return a.length?`<div class="tags">${a.map(x=>`<span class="tag">${esc(clean(x))}</span>`).join('')}</div>`:`<div class="empty">${esc(empty)}</div>`}function calc(code,cfg=DEF){const d=String(code||'').split('').map(Number);if(d.length!==4)return{};const o=cfg.elementOrder||DEF.elementOrder,s=cfg.systems||DEF.systems,b=n=>s[n]?.baseValues||DEF.systems[n].baseValues,open=n=>o.reduce((a,e,i)=>a+(d[i]===1?Number(b(n)[e]||0):0),0),weighted=n=>o.reduce((a,e,i)=>a+Number(b(n)[e]||0)*(d[i]===2?2:1),0);return{ao:open('abjad'),aw:weighted('abjad'),ad:open('abdah'),bz:open('bazdah'),pd:d.reduce((a,x)=>a+x,0)}}function value(f,k){const v=f?.numbers?.[k];return v&&typeof v==='object'?(v.value??'—'):(v??'—')}function evidence(p){const structural=arr(p.refs).some(x=>x?.supportType==='direct-structural-constraint');if(p.status==='page-verified-contextual-inference')return{key:'推論',label:'脈絡推論',reason:'缺少直接逐宮記載，採用已逐頁核實的同系統脈絡作保守推讀。'};if(structural)return{key:'結構',label:'結構直載',reason:'來源直接記載的是生成／結構限制，不把不出現自行翻成吉凶。'};return{key:'直載',label:'逐頁核實',reason:'由已逐頁核實的直接逐宮或特殊宮位記載整理。'}}function conditionTags(p,h){const structural=arr(p.refs).some(x=>x?.supportType==='direct-structural-constraint'),both=arr(p.fav).length&&arr(p.unfav).length;if(structural)return['結構限制','不直接判凶',h.interactionType];if(p.status==='page-verified-contextual-inference')return['脈絡推論','保守讀取',h.interactionType];if(both)return['正負並存','需結合全盤',h.interactionType];if(arr(p.fav).length)return['偏向有利','仍需結合全盤',h.interactionType];if(arr(p.unfav).length)return['風險偏重','檢查全盤支援',h.interactionType];return[h.interactionType,'不預設吉凶']}function publicNotes(p,h){const out=[],structural=arr(p.refs).some(x=>x?.supportType==='direct-structural-constraint');if(p.status==='page-verified-contextual-inference')out.push('此格目前沒有直接逐宮記載，只作保守脈絡推讀。');if(structural)out.push('此條屬生成／結構限制，不應直接翻成吉凶。');if(arr(p.fav).length&&arr(p.unfav).length)out.push('本格有利與風險訊號並存，需結合全盤條件判讀。');if(h.number>=13)out.push(ROLE[h.number]);return out}function questionHTML(p,h){const q=QMAP[h.number]||['此事目前如何發展','應優先注意什麼'],fav=arr(p.fav),bad=arr(p.unfav),focus=fav[0]||bad[0]||h.interactionType,risk=bad[0]||'目前沒有獨立風險標註';return `<article class="card question-card"><h3>${esc(q[0])}</h3><p class="question-focus">${esc(clean(p.core))}</p><p>優先觀察：${esc(focus)}</p></article><article class="card question-card"><h3>${esc(q[1])}</h3><p class="question-focus">${esc(risk)}</p><p>判讀方式：${esc(h.interactionType)}，並與全盤其他位置交叉確認。</p></article>`}function render({f,h,figures,houses,p,cfg}){const hl=h.publicLabel||`第${h.number}宮`,n=calc(f.dotCode,cfg),ev=evidence(p),nature=arr(f.minimalCore).join('、')||f.zhName,field=FIELD[h.number]||h.role||hl,notes=publicNotes(p,h),home=Number(f.zanatiPosition||0),moved=!!f.movedInZanati;document.title=`${clean(f.zhName)} × ${hl}｜落宮之書`;$('#app').innerHTML=`<form class="search" id="search"><select id="sf">${figures.map(x=>`<option value="${esc(x.id)}" ${x.id===f.id?'selected':''}>${esc(x.zhName)} · ${esc(x.latinName||'')} · ${esc(x.dotCode||'')}</option>`).join('')}</select><div class="times">×</div><select id="sh">${houses.map(x=>`<option value="${esc(x.id)}" ${x.id===h.id?'selected':''}>${esc(x.publicLabel||`第${x.number}宮`)}</option>`).join('')}</select><button class="go">搜尋</button></form><section class="hero"><div class="eyebrow">PLACEMENT RESULT</div><h1>${esc(clean(f.zhName))} × ${esc(hl)}</h1><div class="sub">${esc(f.latinName||'')} · ${esc(f.dotCode||'')} × ${esc(h.element||'')}</div><p class="summary">${esc(clean(p.core||''))}</p><span class="badge">正式 256 格 · ${esc(ev.label)}</span></section><section class="section"><h2>核心判讀</h2><div class="grid2"><article class="card"><div class="scorecard"><div class="evidence-wrap"><div class="evidence-core"><div><strong>${esc(ev.key)}</strong><small>${esc(ev.label)}</small></div></div></div><div class="core-lead"><h3>${esc(h.interactionType||'情境轉化')}</h3><p>${esc(ev.reason)}</p><span class="mini">${esc(p.status==='page-verified-contextual-inference'?'保守推讀':'正式內容')}</span><div class="meta-row"><span class="meta-chip">al-Zanati 位 ${esc(String(home||'—'))}</span>${moved?'<span class="meta-chip">位移卦</span>':''}</div></div></div></article><article class="card"><h3>直接表現</h3>${tags(arr(f.minimalCore),'目前沒有獨立卦象標籤')}</article></div></section><section class="section"><h2>表現方向</h2><div class="grid3"><article class="card good"><h3>有利表現</h3>${tags(p.fav,'本格沒有獨立有利標註')}</article><article class="card conditional"><h3>條件表現</h3>${tags(conditionTags(p,h),'需結合全盤')}</article><article class="card shadow"><h3>陰影表現</h3>${tags(p.unfav,'本格沒有獨立風險標註')}</article></div></section><section class="section"><h2>為什麼這樣讀</h2><div class="formula"><div class="box"><b>${esc(f.zhName)}</b><span>${esc(nature)}</span></div><div class="op">×</div><div class="box"><b>${esc(hl)}</b><span>${esc(field)}</span></div><div class="op">=</div><div class="box"><b>${esc(h.interactionType||'情境轉化')}</b><span>${esc(clean(p.core||''))}</span></div></div></section><section class="section"><h2>實務問題入口</h2><div class="grid2">${questionHTML(p,h)}</div></section><section class="section"><h2>數值層</h2><div class="numbers"><div class="num"><b>${esc(String(value(f,'triangular')))}</b><span>三角數</span></div><div class="num abjad"><b>Abjad</b><div class="modes"><div class="mode"><strong>${esc(String(n.ao??'—'))}</strong><small>時間／應期<br>只算單點</small></div><div class="mode"><strong>${esc(String(n.aw??'—'))}</strong><small>空間／尺寸<br>雙點×2</small></div></div></div><div class="num"><b>${esc(String(n.ad??'—'))}</b><span>Abdah<br>只算單點</span></div><div class="num"><b>${esc(String(n.bz??'—'))}</b><span>Bazdah<br>只算單點</span></div><div class="num"><b>${esc(String(n.pd??'—'))}</b><span>實點數</span></div></div><div class="method"><b>運算分流：</b>Abjad 時間／應期只取開放單點；物理空間／尺寸採單點×1、雙點×2。Abdah 與 Bazdah 忽略關閉雙點。落宮判讀只讀正式 canonical 256 內容，不使用舊 generated matrix 或舊 specific override。</div></section>${h.number>=13?`<section class="section"><article class="card special"><h3>裁決結構角色</h3><p>${esc(ROLE[h.number]||'')}</p></article></section>`:''}${notes.length?`<section class="section"><article class="card"><h3>判讀註記</h3>${notes.map(x=>`<p>${esc(clean(x))}</p>`).join('')}</article></section>`:''}`;$('#search').addEventListener('submit',ev=>{ev.preventDefault();location.href=`./placement.html?figure=${encodeURIComponent($('#sf').value)}&house=${encodeURIComponent($('#sh').value)}`})}async function load(){try{const q=new URLSearchParams(location.search),fid=q.get('figure'),hid=q.get('house');if(!fid||!hid)throw new Error('缺少卦象或宮位參數');const[fr,cr,cfgR]=await Promise.all([fetch('./data/figures/index.json',{cache:'no-store'}),fetch('./data/placements/v2/canonical-256-v1.json',{cache:'no-store'}),fetch('./data/figures/numeric-systems.json',{cache:'no-store'}).catch(()=>null)]);if(!fr.ok||!cr.ok)throw new Error('正式資料讀取失敗');const[figures,c]=await Promise.all([fr.json(),cr.json()]);if(!c?.canonical||c?.coverage?.total!==256)throw new Error('256 格母檔驗證失敗');const f=figures.find(x=>x.id===fid),h=c.houses.find(x=>x.id===hid||String(x.number)===String(hid).replace(/\D/g,''));if(!f||!h)throw new Error('找不到卦象或宮位');const sr=await fetch(h.shard,{cache:'no-store'});if(!sr.ok)throw new Error(`宮位分片讀取失敗：${sr.status}`);const shard=await sr.json(),p=arr(shard.records).find(x=>x.f===fid&&Number(x.h)===Number(h.number));if(!p)throw new Error('正式 256 格中找不到此組合');let cfg=DEF;if(cfgR?.ok){try{cfg=await cfgR.json()}catch{}}render({f,h,figures,houses:c.houses,p,cfg})}catch(e){$('#app').innerHTML=`<div class="loading">讀取失敗：${esc(e.message||e)}</div>`}}load();</script></body></html>
