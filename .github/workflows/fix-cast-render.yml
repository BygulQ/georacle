name: Fix cast render
on:
  push:
    paths:
      - '.github/workflows/fix-cast-render.yml'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch residual saveRow references
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          marker = "    html=html.replace('four elements, four states, AI prompt, diary','four elements, four states, AI prompt');\n"
          patch = "    html=html.replace(/\\$\\(\"saveRow\"\\)\\.style\\.display\\s*=\\s*[\"'](?:none|block)[\"'];/g,'');\n"
          if patch not in s:
              if marker not in s:
                  raise SystemExit('patch marker missing')
              s = s.replace(marker, marker + patch)
          p.write_text(s, encoding='utf-8')
          Path('.github/workflows/fix-cast-render.yml').unlink()
          PY
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/fix-cast-render.yml
          git commit -m "修正起卦後盤面未立即重繪"
          git push
