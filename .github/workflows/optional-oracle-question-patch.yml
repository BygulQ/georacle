name: Optional oracle question one-time patch

on:
  push:
    paths:
      - .github/workflows/optional-oracle-question-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Allow prompt generation without a question
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index-core.html')
          text = path.read_text(encoding='utf-8')
          old = '''  const q=$("question").value.trim();
  if(!q){alert("先輸入問題。");return}
'''
          new = '''  const q=$("question").value.trim()||"未提供（請依盤面進行一般性判讀）";
'''
          if old not in text:
              raise SystemExit('oracle question validation target not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index-core.html
          git commit -m "允許無問題生成 AI 神諭提示詞"
          git push
