name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Remove backend-only UI from public artifact
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          p = Path('placement-final-core.html')
          s = p.read_text(encoding='utf-8')
          s = s.replace('<span class="badge">正式 256 格 · ${esc(ev.label)}</span>', '')
          s = re.sub(r'<article class="card"><div class="scorecard">.*?</article>(?=<article class="card"><h3>直接表現)', '', s, flags=re.S)
          s = re.sub(r'<article class="card conditional">.*?</article>', '', s, flags=re.S)
          s = re.sub(r'<section class="section"><h2>數值層</h2>.*?</section>(?=\$\{h\.number>=13\?)', '', s, flags=re.S)
          s = s.replace("${esc(h.interactionType||'情境轉化')}", '落宮表現')
          p.write_text(s, encoding='utf-8')

          q = Path('figure.html')
          t = q.read_text(encoding='utf-8').replace('${numbersHTML(data,cfg)}', '')
          q.write_text(t, encoding='utf-8')
          PY

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
