name: Deploy Public GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-public
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5

      - name: Build public placement projection
        run: |
          python scripts/build_public_placements.py
          jq '{houses:[.houses[]|{id,number,publicLabel,element,shard:("./data/placements/public/h" + ((.number|tostring) as $n | if ($n|length)==1 then "0"+$n else $n end) + "-content-v1.json")}]}' data/placements/v2/canonical-256-v1.json > data/placements/public/manifest.json

      - name: Package public-only site
        run: |
          mkdir -p _site
          rsync -a --exclude '_site' ./ _site/
          rm -rf _site/.git _site/.github _site/scripts
          rm -rf _site/data/placements/v2 _site/data/sources
          rm -f _site/data/figures/numeric-systems.json _site/data/figures/numeric-values.json
          rm -f _site/placement-final-core.html _site/placement-public.html _site/placement-public.css
          sed -i 's#./data/placements/v2/canonical-256-v1.json#./data/placements/public/manifest.json#g' _site/placements.html
          sed -i 's/讀取正式 256 格落宮內容。/查看落宮判讀。/g' _site/placements.html
          sed -i 's/正在讀取正式落宮索引……/正在讀取落宮索引……/g' _site/placements.html
          sed -i "s/if(!c?.canonical||c?.coverage?.total!==256)/if(!Array.isArray(c?.houses)||c.houses.length!==16)/g" _site/placements.html
          sed -i 's/ · ${esc(x.interactionType||'"'"'')}//g' _site/placements.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
