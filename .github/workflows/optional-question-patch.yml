name: Optional question one-time patch

on:
  push:
    paths:
      - .github/workflows/optional-question-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Allow empty question when casting
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index-core.html')
          text = path.read_text(encoding='utf-8')
          old = '''  if(!q){alert("請先輸入問題。"); input?.focus(); return;}\n'''
          if old not in text:
              raise SystemExit('target validation line not found')
          path.write_text(text.replace(old, '', 1), encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index-core.html
          git commit -m "允許不輸入問題直接起盤"
          git push
