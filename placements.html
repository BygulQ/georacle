<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>落宮之書｜沙占起來</title>
<style>
:root{--bg:#EAE8E3;--panel:#F7F6F2;--paper:#FDFBF7;--ink:#5A534D;--muted:#827A73;--soft:#99928A;--line:#D0C9C0;--line2:#E6E3DC;--rose:#B4766E;--rose2:#9E6961;--gold:#C5A87C}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif}a{color:inherit;text-decoration:none}button,input{font:inherit}.wrap{min-height:100vh;padding:24px}.app{min-height:calc(100vh - 48px);background:var(--panel);border:1px solid var(--line);border-radius:30px;overflow:hidden}.topbar{display:flex;justify-content:space-between;gap:18px;align-items:center;padding:16px 24px;background:#fdfbf7e8;border-bottom:1px solid var(--line2)}.brand{font-weight:1000;letter-spacing:.18em;color:var(--rose2)}.nav{display:flex;gap:8px;flex-wrap:wrap}.pill{display:inline-flex;border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:900;color:var(--muted)}.pill.primary{background:var(--rose);border-color:var(--rose);color:#fff}.stage{position:relative;min-height:calc(100vh - 130px);display:grid;place-items:center;padding:56px 28px 96px;background:radial-gradient(circle at 50% 12%,#fffaf4 0,#f7f6f2 48%,#ece9e3 100%)}.stage:before{content:"";position:absolute;inset:0;opacity:.52;background-image:repeating-linear-gradient(45deg,var(--line2) 0,var(--line2) 1px,transparent 1px,transparent 42px),repeating-linear-gradient(-45deg,var(--line2) 0,var(--line2) 1px,transparent 1px,transparent 42px);-webkit-mask-image:radial-gradient(ellipse at 50% 34%,#000 0 18%,transparent 69%);mask-image:radial-gradient(ellipse at 50% 34%,#000 0 18%,transparent 69%)}.engine{position:relative;z-index:2;width:min(1120px,100%);text-align:center}.eyebrow{font-size:12px;font-weight:1000;letter-spacing:.28em;color:var(--rose2)}h1{margin:14px 0 0;font-size:clamp(38px,6vw,72px);letter-spacing:.2em}.lead{margin:18px auto 36px;color:var(--muted);font-weight:800}.formula{display:grid;grid-template-columns:minmax(0,1fr) 72px minmax(0,1fr);gap:10px;align-items:start}.combo{position:relative;text-align:left}.field{display:flex;align-items:center;min-height:76px;background:#fff;border:1px solid var(--line);border-radius:24px}.field:focus-within{border-color:var(--gold);box-shadow:0 0 0 4px #c5a87c20}.icon{width:46px;height:46px;margin-left:13px;border-radius:15px;display:grid;place-items:center;background:var(--panel);border:1px solid var(--line2);color:var(--rose2);font-weight:1000}.field input{width:100%;min-width:0;border:0;outline:0;background:transparent;padding:18px 14px;color:var(--ink);font-size:19px;font-weight:900}.times{height:76px;display:grid;place-items:center;color:var(--gold);font:700 38px Georgia,serif}.dropdown{position:absolute;left:0;right:0;top:calc(100% + 10px);z-index:20;display:none;max-height:390px;overflow:auto;background:#fffdf9;border:1px solid #d8cbb9;border-radius:22px;padding:8px;box-shadow:0 24px 60px #3d2d1e26}.dropdown.open{display:block}.option{width:100%;display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;border:0;background:transparent;border-radius:16px;padding:12px 13px;text-align:left;color:var(--ink);cursor:pointer}.option:hover{background:#f7efe1}.title{font-weight:1000;font-size:16px}.meta{display:block;margin-top:2px;color:var(--soft);font-size:12px;font-weight:850}.code{color:#9a7b4f;font-size:12px;font-weight:1000}.actions{display:flex;gap:10px;justify-content:center;margin-top:26px}.searchBtn,.resetBtn{border-radius:999px;padding:13px 22px;font-weight:1000}.searchBtn{border:1px solid var(--rose);background:var(--rose);color:#fff}.searchBtn:disabled{opacity:.38}.resetBtn{border:1px solid var(--line);background:#fff;color:var(--muted)}.status{min-height:28px;margin-top:17px;color:var(--muted);font-size:13px;font-weight:800}.hintRow{display:flex;justify-content:center;gap:9px;flex-wrap:wrap;margin-top:24px}.hint{border:1px solid #ded4c6;background:#fffaf0;border-radius:999px;padding:6px 10px;color:#8f806f;font-size:12px;font-weight:850}@media(max-width:820px){.wrap{padding:0}.app{border-radius:0;min-height:100vh}.topbar{align-items:flex-start;padding:14px}.stage{min-height:calc(100vh - 108px);padding:44px 16px 82px}.formula{grid-template-columns:1fr}.times{height:44px}.nav{gap:5px}.pill{font-size:12px;padding:7px 9px}}
</style>
</head>
<body><div class="wrap"><div class="app"><header class="topbar"><div class="brand">落宮之書</div><nav class="nav"><a class="pill" href="./dictionary.html">字典首頁</a><a class="pill" href="./figures.html">卦象之書</a><a class="pill" href="./houses.html">宮位之書</a><a class="pill primary" href="./index.html">返回主盤</a></nav></header><main class="stage"><section class="engine"><div class="eyebrow">PLACEMENT SEARCH ENGINE</div><h1>落宮之書</h1><p class="lead">搜尋一個卦象與一個宮位，讀取正式 256 格落宮內容。</p><div class="formula"><div class="combo" id="fc"><div class="field"><span class="icon">卦</span><input id="fi" placeholder="輸入或選擇卦象" autocomplete="off"></div><div class="dropdown" id="fl"></div></div><div class="times">×</div><div class="combo" id="hc"><div class="field"><span class="icon">宮</span><input id="hi" placeholder="輸入或選擇宮位" autocomplete="off"></div><div class="dropdown" id="hl"></div></div></div><div class="actions"><button id="go" class="searchBtn" disabled>搜尋落宮</button><button id="reset" class="resetBtn">清除</button></div><div id="status" class="status">正在讀取正式落宮索引……</div><div class="hintRow"><span class="hint">卦象可搜尋中文</span><span class="hint">Latin</span><span class="hint">點碼</span><span class="hint">宮位僅顯示編號與裁決角色</span></div></section></main></div></div>
<script>
const state={f:[],h:[],sf:null,sh:null};
const $=s=>document.querySelector(s),norm=v=>String(v??'').toLowerCase().normalize('NFKC').replace(/\s+/g,''),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const ROMAN={1:'Ⅰ',2:'Ⅱ',3:'Ⅲ',4:'Ⅳ',5:'Ⅴ',6:'Ⅵ',7:'Ⅶ',8:'Ⅷ',9:'Ⅸ',10:'Ⅹ',11:'Ⅺ',12:'Ⅻ',13:'XIII',14:'XIV',15:'XV',16:'XVI'};
const label=h=>h.publicLabel||`第${h.number}宮`;
function ftext(x){return norm([x.zhName,x.latinName,x.id,x.dotCode,x.element,x.planet,x.zodiac].join(' '))}
function htext(x){return norm([label(x),x.number,`第${x.number}宮`,x.role,x.interactionType,x.element].join(' '))}
function render(type){const input=$(type==='f'?'#fi':'#hi'),list=$(type==='f'?'#fl':'#hl'),data=type==='f'?state.f:state.h,q=norm(input.value),items=data.filter(x=>x._s.includes(q)).slice(0,10);list.innerHTML=items.length?items.map(x=>type==='f'?`<button class="option" data-type="f" data-id="${esc(x.id)}"><span><span class="title">${esc(x.zhName)}</span><span class="meta">${esc(x.latinName||'')} · ${esc(x.element||'')}</span></span><span class="code">${esc(x.dotCode||'')}</span></button>`:`<button class="option" data-type="h" data-id="${esc(x.id)}"><span><span class="title">${esc(label(x))}</span><span class="meta">${esc(x.element||'')} · ${esc(x.interactionType||'')}</span></span><span class="code">${esc(ROMAN[x.number]||'')}</span></button>`).join(''):'<div class="status">找不到符合項目</div>';list.classList.add('open')}
function select(type,id){if(type==='f'){state.sf=state.f.find(x=>x.id===id);$('#fi').value=`${state.sf.zhName} · ${state.sf.latinName}`;$('#fl').classList.remove('open')}else{state.sh=state.h.find(x=>x.id===id);$('#hi').value=label(state.sh);$('#hl').classList.remove('open')}ready()}
function ready(){const ok=state.sf&&state.sh;$('#go').disabled=!ok;$('#status').textContent=ok?`${state.sf.zhName} × ${label(state.sh)}`:'請選擇一個卦象與一個宮位'}
async function load(){try{const[fr,cr]=await Promise.all([fetch('./data/figures/index.json',{cache:'no-store'}),fetch('./data/placements/v2/canonical-256-v1.json',{cache:'no-store'})]);if(!fr.ok||!cr.ok)throw new Error('正式索引讀取失敗');const[f,c]=await Promise.all([fr.json(),cr.json()]);if(!c?.canonical||c?.coverage?.total!==256)throw new Error('256 格母檔驗證失敗');state.f=f.map(x=>({...x,_s:ftext(x)}));state.h=c.houses.map(x=>({...x,_s:htext(x)}));ready()}catch(e){$('#status').textContent=`載入失敗：${e.message}`}}
$('#fi').addEventListener('focus',()=>render('f'));$('#hi').addEventListener('focus',()=>render('h'));$('#fi').addEventListener('input',()=>{state.sf=null;render('f');ready()});$('#hi').addEventListener('input',()=>{state.sh=null;render('h');ready()});document.addEventListener('click',e=>{const o=e.target.closest('.option');if(o)select(o.dataset.type,o.dataset.id);if(!e.target.closest('#fc'))$('#fl').classList.remove('open');if(!e.target.closest('#hc'))$('#hl').classList.remove('open')});$('#go').addEventListener('click',()=>{if(state.sf&&state.sh)location.href=`./placement.html?figure=${encodeURIComponent(state.sf.id)}&house=${encodeURIComponent(state.sh.id)}`});$('#reset').addEventListener('click',()=>{state.sf=state.sh=null;$('#fi').value='';$('#hi').value='';ready()});load();
</script></body></html>
