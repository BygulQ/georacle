<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>落宮之書｜沙占起來</title>
<style>
:root{
  --bg:#EAE8E3;--panel:#F7F6F2;--paper:#FDFBF7;--white:#fff;
  --ink:#5A534D;--muted:#827A73;--soft:#99928A;--line:#D0C9C0;--line2:#E6E3DC;
  --rose:#B4766E;--rose2:#9E6961;--gold:#C5A87C;--shadow:0 18px 60px #3d2d1e17;
}
*{box-sizing:border-box}html{scroll-behavior:smooth}
body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",Segoe UI,sans-serif}
a{color:inherit;text-decoration:none}button,input{font:inherit}
.wrap{min-height:100vh;padding:24px}.app{min-height:calc(100vh - 48px);background:var(--panel);border:1px solid var(--line);border-radius:30px;overflow:hidden;box-shadow:0 10px 30px #00000010}
.topbar{position:relative;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:16px 24px;background:#fdfbf7e8;border-bottom:1px solid var(--line2);backdrop-filter:blur(10px)}
.brand{font-weight:1000;letter-spacing:.18em;color:var(--rose2);white-space:nowrap}.nav{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.pill{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:900;color:var(--muted)}.pill.primary{background:var(--rose);border-color:var(--rose);color:#fff}
.searchStage{position:relative;min-height:calc(100vh - 130px);display:grid;place-items:center;padding:56px 28px 96px;overflow:visible;background:radial-gradient(circle at 50% 12%,#fffaf4 0,#f7f6f2 48%,#ece9e3 100%)}
.searchStage:before{content:"";position:absolute;inset:0;opacity:.52;pointer-events:none;background-image:repeating-linear-gradient(45deg,var(--line2) 0,var(--line2) 1px,transparent 1px,transparent 42px),repeating-linear-gradient(-45deg,var(--line2) 0,var(--line2) 1px,transparent 1px,transparent 42px);-webkit-mask-image:radial-gradient(ellipse at 50% 34%,#000 0 18%,transparent 69%);mask-image:radial-gradient(ellipse at 50% 34%,#000 0 18%,transparent 69%)}
.engine{position:relative;z-index:2;width:min(1160px,100%);text-align:center}.eyebrow{font-size:12px;font-weight:1000;letter-spacing:.28em;color:var(--rose2);text-transform:uppercase}.engine h1{margin:14px 0 0;font-size:clamp(38px,6vw,72px);line-height:1.08;letter-spacing:.2em;font-family:"Noto Serif TC","Songti TC",serif}.lead{margin:18px auto 36px;max-width:700px;color:var(--muted);font-weight:780;letter-spacing:.08em;line-height:1.9}
.searchFormula{display:grid;grid-template-columns:minmax(0,1fr) 72px minmax(0,1fr);align-items:start;gap:10px;width:100%;max-width:1080px;margin:0 auto}
.combo{position:relative;text-align:left}.field{position:relative;display:flex;align-items:center;min-height:76px;background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:0 10px 28px #0000000d;transition:.18s}.field:focus-within{border-color:var(--gold);box-shadow:0 0 0 4px #c5a87c20,0 16px 40px #00000012}.field.selected{border-color:#c9ad7f;background:#fffdf8}
.fieldIcon{flex:0 0 auto;width:46px;height:46px;margin-left:13px;border-radius:15px;display:grid;place-items:center;background:var(--panel);border:1px solid var(--line2);color:var(--rose2);font-weight:1000}.field input{width:100%;min-width:0;border:0;outline:0;background:transparent;padding:18px 52px 18px 14px;color:var(--ink);font-size:19px;font-weight:900}.field input::placeholder{color:#aaa39b;font-weight:800}.clearBtn{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:34px;height:34px;border:0;border-radius:50%;background:transparent;color:var(--soft);cursor:pointer;font-size:18px}.clearBtn:hover{background:var(--panel);color:var(--ink)}
.times{height:76px;display:grid;place-items:center;font-family:Georgia,serif;font-size:38px;color:var(--gold);font-weight:700;user-select:none}
.dropdown{position:absolute;left:0;right:0;top:calc(100% + 10px);z-index:30;display:none;max-height:390px;overflow:auto;background:#fffdf9;border:1px solid #d8cbb9;border-radius:22px;padding:8px;box-shadow:0 24px 60px #3d2d1e26}.dropdown.open{display:block}.option{width:100%;display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;border:0;background:transparent;border-radius:16px;padding:12px 13px;text-align:left;cursor:pointer;color:var(--ink)}.option:hover,.option.active{background:#f7efe1}.optionMain{min-width:0}.optionTitle{font-weight:1000;font-size:16px;letter-spacing:.04em}.optionMeta{margin-top:2px;color:var(--soft);font-size:12px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.optionCode{color:#9a7b4f;font-size:12px;font-weight:1000;letter-spacing:.08em}.empty{padding:18px;color:var(--muted);font-weight:800;text-align:center}
.actions{display:flex;gap:10px;justify-content:center;align-items:center;margin-top:26px}.searchBtn{min-width:160px;border:1px solid var(--rose);background:var(--rose);color:#fff;border-radius:999px;padding:13px 24px;font-weight:1000;letter-spacing:.12em;cursor:pointer;box-shadow:0 8px 22px #b4766e30;transition:.18s}.searchBtn:hover:not(:disabled){transform:translateY(-1px);background:var(--rose2)}.searchBtn:disabled{opacity:.38;cursor:not-allowed;box-shadow:none}.resetBtn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:13px 18px;color:var(--muted);font-weight:900;cursor:pointer}.status{min-height:28px;margin-top:17px;color:var(--muted);font-size:13px;font-weight:800;letter-spacing:.06em}.status.ready{color:var(--rose2)}
.hintRow{display:flex;justify-content:center;gap:9px;flex-wrap:wrap;margin-top:24px}.hint{border:1px solid #ded4c6;background:#fffaf0;border-radius:999px;padding:6px 10px;color:#8f806f;font-size:12px;font-weight:850}
@media(max-width:820px){.wrap{padding:0}.app{min-height:100vh;border-radius:0;border-left:0;border-right:0}.topbar{align-items:flex-start;padding:14px}.brand{letter-spacing:.08em}.searchStage{min-height:calc(100vh - 108px);padding:44px 16px 82px}.searchFormula{grid-template-columns:1fr}.times{height:44px}.field{min-height:70px}.field input{font-size:17px}.dropdown{max-height:310px}.lead{margin-bottom:28px}.nav{gap:5px}.pill{font-size:12px;padding:7px 9px}}
@media(max-width:520px){.engine h1{letter-spacing:.14em}.lead{font-size:14px}.fieldIcon{width:42px;height:42px}.actions{flex-direction:column}.searchBtn,.resetBtn{width:100%;max-width:360px}}
</style>
</head>
<body>
<div class="wrap"><div class="app">
  <header class="topbar">
    <div class="brand">落宮之書</div>
    <nav class="nav" aria-label="主要導覽">
      <a class="pill" href="./dictionary.html">字典首頁</a>
      <a class="pill" href="./figures.html">卦象之書</a>
      <a class="pill" href="./houses.html">宮位之書</a>
      <a class="pill primary" href="./index.html">返回主盤</a>
    </nav>
  </header>

  <main class="searchStage">
    <section class="engine" aria-labelledby="pageTitle">
      <div class="eyebrow">Placement Search Engine</div>
      <h1 id="pageTitle">落宮之書</h1>
      <p class="lead">搜尋一個卦象與一個宮位，建立它們的落宮組合。</p>

      <form id="searchForm" class="searchFormula" autocomplete="off">
        <div class="combo" id="figureCombo">
          <div class="field" id="figureField">
            <span class="fieldIcon" aria-hidden="true">卦</span>
            <input id="figureInput" type="text" placeholder="輸入或選擇卦象" role="combobox" aria-expanded="false" aria-controls="figureList" aria-autocomplete="list">
            <button class="clearBtn" type="button" data-clear="figure" aria-label="清除卦象">×</button>
          </div>
          <div class="dropdown" id="figureList" role="listbox"></div>
        </div>

        <div class="times" aria-hidden="true">×</div>

        <div class="combo" id="houseCombo">
          <div class="field" id="houseField">
            <span class="fieldIcon" aria-hidden="true">宮</span>
            <input id="houseInput" type="text" placeholder="輸入或選擇宮位" role="combobox" aria-expanded="false" aria-controls="houseList" aria-autocomplete="list">
            <button class="clearBtn" type="button" data-clear="house" aria-label="清除宮位">×</button>
          </div>
          <div class="dropdown" id="houseList" role="listbox"></div>
        </div>
      </form>

      <div class="actions">
        <button id="searchBtn" class="searchBtn" type="button" disabled>搜尋落宮</button>
        <button id="resetBtn" class="resetBtn" type="button">清除</button>
      </div>
      <div id="status" class="status">正在讀取卦象與宮位索引……</div>
      <div class="hintRow" aria-label="搜尋提示">
        <span class="hint">卦象可搜尋中文</span><span class="hint">Latin</span><span class="hint">點碼</span><span class="hint">宮位可搜尋數字與舊稱</span>
      </div>
    </section>
  </main>
</div></div>
<script>
const ORDINAL={1:'第一宮',2:'第二宮',3:'第三宮',4:'第四宮',5:'第五宮',6:'第六宮',7:'第七宮',8:'第八宮',9:'第九宮',10:'第十宮',11:'第十一宮',12:'第十二宮'};
const SPECIAL={13:'第十三宮 · 右證人',14:'第十四宮 · 左證人',15:'第十五宮 · 法官',16:'第十六宮 · 最終結局'};
const HOUSE_ALIASES={
  1:['命宮','本命宮','ascendant'],2:['財帛宮','財宮','wealth'],3:['兄弟宮','手足宮','siblings'],4:['田宅宮','家宅宮','foundations'],
  5:['子女宮','男女宮','children'],6:['疾厄宮','奴僕宮','illness','servants'],7:['伴侶宮','夫妻宮','spouses','opponents'],8:['死亡宮','疾厄宮','death'],
  9:['遷移宮','長途旅行宮','journey','religion'],10:['官祿宮','事業宮','career','authority'],11:['福德宮','朋友宮','friends','hopes'],12:['相貌宮','玄秘宮','隱敵宮','hidden enemies'],
  13:['右證人','右見證','right witness'],14:['左證人','左見證','left witness'],15:['法官','平衡宮','judge'],16:['最終判決','最終結局','結果的結果','ultimate outcome']
};
const state={figures:[],houses:[],selectedFigure:null,selectedHouse:null,figureActive:-1,houseActive:-1};
const $=s=>document.querySelector(s);
const norm=v=>String(v??'').trim().toLowerCase().normalize('NFKC').replace(/\s+/g,'');
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function houseLabel(h){return ORDINAL[h.number]||SPECIAL[h.number]||`第${h.number}宮`}
function houseSearchText(h){const n=h.number;return [houseLabel(h),h.zhName,h.latinName,h.core,h.oneLine,String(n),`第${n}宮`,`第${n}宫`,...(HOUSE_ALIASES[n]||[])].join(' ')}
function figureSearchText(f){return [f.zhName,f.latinName,f.id,f.dotCode,f.binaryCode,f.element,f.planet,f.zodiac].join(' ')}
function enrich(){
  state.figures=state.figures.map(f=>({...f,_search:norm(figureSearchText(f))}));
  state.houses=state.houses.map(h=>({...h,_search:norm(houseSearchText(h))}));
}
function figureMeta(f){return [f.latinName,f.element,f.planet].filter(Boolean).join(' · ')}
function houseMeta(h){return [h.zhName!==houseLabel(h)?h.zhName:'',h.zone,h.classMeta?.zh].filter(Boolean).join(' · ')}
function filtered(type,q){const list=type==='figure'?state.figures:state.houses;const needle=norm(q);if(!needle)return list;return list.filter(x=>x._search.includes(needle))}
function renderList(type,forceOpen=true){
  const input=$(type==='figure'?'#figureInput':'#houseInput');
  const listEl=$(type==='figure'?'#figureList':'#houseList');
  const activeKey=type==='figure'?'figureActive':'houseActive';
  const items=filtered(type,input.value).slice(0,10);
  if(!items.length){listEl.innerHTML='<div class="empty">找不到符合項目</div>';state[activeKey]=-1}
  else{
    if(state[activeKey]>=items.length)state[activeKey]=items.length-1;
    listEl.innerHTML=items.map((x,i)=>type==='figure'
      ?`<button type="button" class="option ${i===state[activeKey]?'active':''}" role="option" data-type="figure" data-id="${esc(x.id)}"><span class="optionMain"><span class="optionTitle">${esc(x.zhName)}</span><span class="optionMeta">${esc(figureMeta(x))}</span></span><span class="optionCode">${esc(x.dotCode||'')}</span></button>`
      :`<button type="button" class="option ${i===state[activeKey]?'active':''}" role="option" data-type="house" data-id="${esc(x.id)}"><span class="optionMain"><span class="optionTitle">${esc(houseLabel(x))}</span><span class="optionMeta">${esc(houseMeta(x))}</span></span><span class="optionCode">${esc(x.roman||'')}</span></button>`
    ).join('')
  }
  if(forceOpen){listEl.classList.add('open');input.setAttribute('aria-expanded','true')}
}
function selectItem(type,id){
  if(type==='figure'){
    const x=state.figures.find(v=>v.id===id);if(!x)return;state.selectedFigure=x;$('#figureInput').value=`${x.zhName} · ${x.latinName}`;$('#figureField').classList.add('selected');closeList('figure')
  }else{
    const x=state.houses.find(v=>v.id===id);if(!x)return;state.selectedHouse=x;$('#houseInput').value=houseLabel(x);$('#houseField').classList.add('selected');closeList('house')
  }
  updateReady()
}
function clearType(type){
  if(type==='figure'){state.selectedFigure=null;state.figureActive=-1;$('#figureInput').value='';$('#figureField').classList.remove('selected')}
  else{state.selectedHouse=null;state.houseActive=-1;$('#houseInput').value='';$('#houseField').classList.remove('selected')}
  updateReady()
}
function closeList(type){const input=$(type==='figure'?'#figureInput':'#houseInput'),list=$(type==='figure'?'#figureList':'#houseList');list.classList.remove('open');input.setAttribute('aria-expanded','false')}
function updateReady(){
  const ok=!!(state.selectedFigure&&state.selectedHouse);$('#searchBtn').disabled=!ok;
  const status=$('#status');if(ok){status.className='status ready';status.textContent=`${state.selectedFigure.zhName} × ${houseLabel(state.selectedHouse)}`}
  else{status.className='status';status.textContent='請選擇一個卦象與一個宮位'}
}
function onInput(type){
  if(type==='figure'){state.selectedFigure=null;state.figureActive=-1;$('#figureField').classList.remove('selected')}
  else{state.selectedHouse=null;state.houseActive=-1;$('#houseField').classList.remove('selected')}
  renderList(type,true);updateReady()
}
function onKey(type,e){
  const input=e.currentTarget,items=filtered(type,input.value).slice(0,10),key=type==='figure'?'figureActive':'houseActive';
  if(e.key==='ArrowDown'){e.preventDefault();state[key]=Math.min(state[key]+1,items.length-1);renderList(type,true)}
  else if(e.key==='ArrowUp'){e.preventDefault();state[key]=Math.max(state[key]-1,0);renderList(type,true)}
  else if(e.key==='Enter'){
    e.preventDefault();if(items.length){const idx=state[key]>=0?state[key]:0;selectItem(type,items[idx].id)}else if(state.selectedFigure&&state.selectedHouse)goSearch()
  }else if(e.key==='Escape')closeList(type)
}
function goSearch(){
  if(!(state.selectedFigure&&state.selectedHouse))return;
  const q=new URLSearchParams({figure:state.selectedFigure.id,house:state.selectedHouse.id});
  location.href=`./placement.html?${q.toString()}`
}
async function load(){
  try{
    const [fr,hr]=await Promise.all([fetch('./data/figures/index.json',{cache:'no-store'}),fetch('./data/houses/index.json',{cache:'no-store'})]);
    if(!fr.ok||!hr.ok)throw new Error(`資料讀取失敗 ${fr.status}/${hr.status}`);
    state.figures=await fr.json();state.houses=await hr.json();enrich();updateReady();
    const q=new URLSearchParams(location.search),fid=q.get('figure'),hid=q.get('house');if(fid)selectItem('figure',fid);if(hid)selectItem('house',hid)
  }catch(err){$('#status').textContent=`載入失敗：${err.message}`;$('#status').className='status'}
}
$('#figureInput').addEventListener('input',()=>onInput('figure'));$('#houseInput').addEventListener('input',()=>onInput('house'));
$('#figureInput').addEventListener('focus',()=>renderList('figure',true));$('#houseInput').addEventListener('focus',()=>renderList('house',true));
$('#figureInput').addEventListener('keydown',e=>onKey('figure',e));$('#houseInput').addEventListener('keydown',e=>onKey('house',e));
document.addEventListener('click',e=>{
  const opt=e.target.closest('.option');if(opt){selectItem(opt.dataset.type,opt.dataset.id);return}
  const clr=e.target.closest('[data-clear]');if(clr){clearType(clr.dataset.clear);$(clr.dataset.clear==='figure'?'#figureInput':'#houseInput').focus();return}
  if(!e.target.closest('#figureCombo'))closeList('figure');if(!e.target.closest('#houseCombo'))closeList('house')
});
$('#searchBtn').addEventListener('click',goSearch);$('#resetBtn').addEventListener('click',()=>{clearType('figure');clearType('house');closeList('figure');closeList('house');$('#figureInput').focus()});
$('#searchForm').addEventListener('submit',e=>{e.preventDefault();goSearch()});
load();
</script>
</body>
</html>
