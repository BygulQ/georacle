      ['第四宮','第4宮'],['四宮','第4宮'],['第三宮','第3宮'],['三宮','第3宮'],
      ['第二宮','第2宮'],['二宮','第2宮'],['第一宮','第1宮'],['一宮','第1宮']

    houseNumberFixes.forEach(([from,to])=>{html=html.split(from).join(to);});

    // Main-board contextual navigation only: add three precise book links for the current selection.
    const contextualBookLinks=`const FIGURE_BOOK_ID_BY_CODE={
  "1121":"puer","1222":"laetitia","2111":"caput-draconis","2212":"albus",
  "1211":"puella","1112":"cauda-draconis","2122":"rubeus","2221":"tristitia",
  "1122":"fortuna-minor","1221":"carcer","2112":"conjunctio","2211":"fortuna-major",
  "1111":"via","1212":"amissio","2222":"populus","2121":"acquisitio"
};
function contextualBookLinksHTML(idx,fig){
  const figureId=FIGURE_BOOK_ID_BY_CODE[fig];
  const houseId=\`house-\${String(idx+1).padStart(2,'0')}\`;
  if(!figureId) return '';

}`;
    html=replaceRequiredRegex(html,/function renderSide\(\)\{/,contextualBookLinks+'\nfunction renderSide(){','contextualBookLinks');
    html=replaceRequired(
      html,
      '    <div class="infoBox"><b style="color:var(--rose)">卦象補充</b><p>${figureProfileBodyHTML(f)}</p></div>`;',
      '    <div class="infoBox"><b style="color:var(--rose)">卦象補充</b><p>${figureProfileBodyHTML(f)}</p></div>\n    ${contextualBookLinksHTML(state.selected,f)}`;',
      'renderSide contextual book links'

    // Split timing and quantity out of the domain selector into optional prompt modes.
    html=replaceRequired(

      html,

      '        <div id="quantModes" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px;padding:10px 12px;background:var(--panel);border:1px solid var(--line2);border-radius:16px"><b style="font-size:12px;color:var(--soft);letter-spacing:.1em">附加判讀</b><label style="display:inline-flex;align-items:center;gap:6px;font-weight:900"><input id="timingMode" type="checkbox" style="width:auto">⏳ 應期</label><label style="display:inline-flex;align-items:center;gap:6px;font-weight:900"><input id="quantityMode" type="checkbox" style="width:auto"># 數量</label></div>\n        <div class="result" id="reading" style="display:none"></div>',
      'optional timing quantity controls'

    const quantitativePromptPatch=`const QUANT_PROMPT_MODE={timing:false,quantity:false};
function quantitativeFocusIndices(){
  const rule=selectedDomainRule();
  const layers=ensurePromptLayers();
  const raw=[14,15];
  if(layers.intent && Number.isInteger(layers.intent.sourceIndex)) raw.push(layers.intent.sourceIndex);
  raw.push(state.selected);
  (rule.focusHouses||[]).forEach(n=>raw.push(Number(n)-1));
  return [...new Set(raw.filter(i=>Number.isInteger(i)&&i>=0&&i<16))].slice(0,5);
}
function quantitativeFigureValues(fig){
  const digits=String(fig||'').split('').map(Number);
  const abjad=[1,2,3,4], abdah=[1,2,4,8], bazdah=[2,7,4,8];
  const open=b=>digits.reduce((s,d,i)=>s+(d===1?b[i]:0),0);
  const weighted=b=>digits.reduce((s,d,i)=>s+b[i]*(d===2?2:1),0);
  return 'Abjad開'+open(abjad)+'/加權'+weighted(abjad)+'/Abdah'+open(abdah)+'/Bazdah'+open(bazdah)+'/點數'+digits.reduce((a,b)=>a+b,0);
}
function quantitativeFocusLines(){
  return quantitativeFocusIndices().map(i=>'H'+(i+1)+' '+figName(state.chart[i])+'｜'+quantitativeFigureValues(state.chart[i])).join('\\n');
}
function quantitativeQuestionScaleHints(question){
  const q=String(question||'').trim();
  const hints=[];
  if(!q) return '';
  if(/今天|今日|今晚|明天|明日|幾小時|多久回|何時回|回覆|消息|聯絡/.test(q)) hints.push('題意偏短期：優先比較小時／日；除非盤面強烈否定，不得任意擴張到月／年。');
  if(/這週|本週|下週|幾週|約會|見面|短期/.test(q)) hints.push('題意偏日／週尺度：優先比較日與週。');
  if(/這個月|本月|下個月|幾個月|三個月|半年|求職|專案|合作|感情發展/.test(q)) hints.push('題意偏週／月尺度：優先比較週與月；若題目已限定月份，應期不得無故擴張到年。');
  if(/今年|明年|幾年|婚姻|結婚|搬遷|長期|事業|重大計畫/.test(q)) hints.push('題意偏月／年尺度：優先比較月與年。');
  if(/多少錢|金額|收入|薪水|薪資|營收|價格|費用|資產|預算/.test(q)) hints.push('計數對象為金額：先依題意與現實級距判倍率，再比較×100／×1,000／×10,000或更高；不得把裸數值直接當金額。');
  if(/幾個人|多少人|人數|幾人/.test(q)) hints.push('計數對象為人數：通常優先×1或×10，除非題意明示大型群體。');
  if(/幾個|幾件|幾次|多少次|件數|次數/.test(q)) hints.push('計數對象為個體／件數／次數：通常優先×1或×10，再依現實上限排除不合理倍率。');
  if(/一萬|十萬|百萬|千萬|萬/.test(q)) hints.push('題目含明確萬位級線索：優先在×10,000及相鄰倍率中判定，不得退回個位級。');
  if(/一千|幾千|千/.test(q)) hints.push('題目含明確千位級線索：優先在×1,000及相鄰倍率中判定。');
  if(/一百|幾百|百/.test(q)) hints.push('題目含明確百位級線索：優先在×100及相鄰倍率中判定。');
  return hints.length?'【本題尺度限制】\\n'+[...new Set(hints)].join('\\n'):'';
}
function quantitativePromptSections(){
  const parts=[];
  if(QUANT_PROMPT_MODE.timing) parts.push('【應期判讀規則】\\n先判斷事件是否成立，再判時間；若事件本身不成立，不得強行給日期。\\n\\n一、成立性判定\\n以本題取用宮、H15平衡宮、H16最終終局交叉判定：事件是否可成、是否延遲、是否阻斷、是否為條件成立後才發生。\\n\\n二、時間單位判定\\n必須先選時間尺度，再套用數值；不得把數值直接當日期。\\n- 小時／日：即時消息、回覆、聯絡、當日事件、極短期行動。\\n- 日／週：約會、見面、短程行動、小型交易、短期進展。\\n- 週／月：求職、感情發展、專案、合作、一般交易、中期變化。\\n- 月／年：婚姻、搬遷、長期事業、大型計畫、重大人生變動。\\n- 問題已指定期限時，優先在該期限內選尺度，不得無故擴張。\\n- 題意不足時，保留最可能尺度與次可能尺度，不得假裝唯一確定。\\n\\n三、數值使用\\n焦點數值只是候選時間值，不是直接日期。例：主值7在日尺度約7日、週尺度約7週、月尺度約7個月、年尺度約7年。必須先說明選哪個尺度，再套值。\\n\\n四、交叉校驗\\n用本題取用宮、H15、H16、盤中位置與結果卦判斷提前、接近候選值、延後、不穩定或條件成立後才開始計時。\\n\\n五、輸出格式\\n必須回答：1事件是否可成；2最可能時間單位；3主候選時間；4合理區間；5次可能尺度；6成立條件；7不確定性。\\n禁止直接把單一數字當日期、無依據指定某月某日、事件不成立仍硬給應期。');
  if(QUANT_PROMPT_MODE.quantity) parts.push('【數量判讀規則】\\n先確認計數對象，再判倍率，最後套用數值；不得直接把卦象數值當最終答案。\\n\\n一、確認計數對象\\n先判斷本題是在計算人數、件數、次數、金額、距離、面積、比例、數量級或其他量值。\\n\\n二、倍率判定\\n必須先選數量級，再套用候選值。可用倍率：×1、×10、×100、×1,000、×10,000，必要時更高。\\n\\n三、依問題現實尺度判倍率\\n- 個體級×1：幾個人、幾件物品、幾次、小型件數。\\n- 十位級×10：小群體、小批量、期間累積次數、小型銷量。\\n- 百位級×100：中型銷量、小型金額級距、中型件數或群體。\\n- 千位級×1,000：薪資、一般價格、中大型交易、大型件數、營收級距。\\n- 萬位級×10,000：大型金額、資產、高額交易、大型人口或數量級。\\n- 題目已有明確上下限時，必須優先在該範圍內選倍率，不得跳出現實限制。\\n\\n四、數值使用\\n先依數值優先規則選主值，再用其他數值校驗。例：主值7可形成7、70、700、7,000、70,000；不得全部列完後任意挑一個，必須依問題現實尺度排除不合理倍率。\\n\\n五、交叉校驗\\n以本題取用宮、H15、H16、單複數傾向、現實上下限與盤面支持程度判斷偏小、接近主值、偏大、區間型或無法精確。\\n\\n六、輸出格式\\n必須回答：1計數對象；2判定倍率；3主候選值；4合理區間；5次可能倍率；6排除其他倍率的理由；7不確定性。\\n禁止直接照抄卦象數值、不判倍率、把人數金額件數用同一尺度、給假精確數字。');
  if(QUANT_PROMPT_MODE.timing&&QUANT_PROMPT_MODE.quantity) parts.push('【應期與數量共同規則】\\n應期與數量必須分開判定，不得共用同一尺度。時間先判小時／日／週／月／年；數量先判×1／×10／×100／×1,000／×10,000。同一候選值可因問題不同產生不同結果。例：主值7，應期可能是7日或7週；數量可能是70、700或7,000。必須分別說明：1為何選該時間單位；2為何選該數量倍率；3哪些盤面證據支持；4哪些替代尺度被排除。');
  if(parts.length) {
    const hint=quantitativeQuestionScaleHints(typeof questionInputValue==='function'?questionInputValue():(document.getElementById('question')?.value||''));
    if(hint) parts.push(hint);
