<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>今天想要問什麼｜阿拉伯沙占盤 playable conditional intent</title>
  <style>
    :root{
      --bg:#EAE8E3; --panel:#F7F6F2; --paper:#FDFBF7; --white:#fff;
      --ink:#5A534D; --muted:#827A73; --soft:#99928A; --line:#D0C9C0;
      --line2:#E6E3DC; --rose:#B4766E; --rose2:#9E6961;
      --gold:#C5A87C; --blue:#7C8F99; --green:#8A9A86; --orange:#D97757;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",Segoe UI,sans-serif;}
    button,input,select{font:inherit}
    .wrap{max-width:1160px;margin:12px auto;padding:0 10px}
    .app{background:var(--panel);border:1px solid var(--line);border-radius:30px;overflow:hidden;box-shadow:0 10px 28px #0001}
    header{padding:26px 16px;text-align:center;background:#ffffff88;border-bottom:1px solid var(--line2)}
    h1{margin:0;font-size:28px;letter-spacing:.16em}
    .sub{margin-top:8px;color:var(--soft);font-size:12px;font-weight:700;letter-spacing:.25em}
    main{padding:18px}
    .controls{display:flex;flex-direction:column;align-items:center;gap:14px;padding-bottom:20px;border-bottom:1px solid var(--line2);margin-bottom:22px}
    .toggle,.buttons{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
    .toggle{background:white;border:1px solid var(--line);border-radius:18px;padding:6px}
    button{border:1px solid var(--line);background:white;color:var(--ink);border-radius:16px;padding:10px 14px;font-weight:800;cursor:pointer;box-shadow:0 2px 8px #00000008}
    button.primary{background:var(--rose);border-color:var(--rose);color:white}
    button.primary:hover{background:var(--rose2)}
    button.active{background:var(--ink);border-color:var(--ink);color:white}
    button.blueActive{background:var(--blue);border-color:var(--blue);color:white}
    button:active{transform:scale(.98)}
    .toolDrawerBtn{min-width:96px}
    .drawerOverlay{position:fixed;inset:0;background:#5a534d73;z-index:110;opacity:0;pointer-events:none;transition:.22s;backdrop-filter:blur(3px)}
    .drawerOverlay.open{opacity:1;pointer-events:auto}
    .toolDrawer{position:fixed;top:0;right:0;z-index:111;width:min(360px,calc(100vw - 34px));height:100vh;background:var(--panel);border-left:1px solid var(--line);box-shadow:-18px 0 48px #0003;transform:translateX(104%);transition:.28s cubic-bezier(.2,.8,.2,1);padding:18px;display:flex;flex-direction:column;gap:14px;overflow:auto}
    .toolDrawer.open{transform:translateX(0)}
    .drawerHead{display:flex;align-items:center;justify-content:space-between;gap:12px;padding-bottom:12px;border-bottom:1px solid var(--line2)}
    .drawerHead h2{margin:0;font-size:20px;letter-spacing:.08em}
    .drawerClose{width:42px;height:42px;border-radius:14px;padding:0;font-size:20px}
    .toolSection{background:white;border:1px solid var(--line2);border-radius:22px;padding:14px;box-shadow:0 3px 12px #00000008}
    .toolSectionTitle{font-size:12px;font-weight:1000;color:var(--soft);letter-spacing:.16em;margin:0 0 10px}
    .toolGrid{display:grid;grid-template-columns:1fr;gap:10px}
    .toolGrid button{width:100%;text-align:left;display:flex;align-items:center;justify-content:flex-start;gap:8px;min-height:44px}
    @media(max-width:760px){.toolDrawer{width:min(340px,calc(100vw - 20px));padding:14px}.toolGrid button{min-height:48px}}
    .layout{display:grid;grid-template-columns:1fr;gap:18px;align-items:start}
    .side{width:100%}
    @media(max-width:900px){h1{font-size:22px} main{padding:12px}}
    @media(min-width:901px){header{padding:34px 16px 30px} h1{font-size:40px;letter-spacing:.24em;line-height:1.25}.sub{margin-top:12px;letter-spacing:.32em}}
    .card{background:white;border:1px solid var(--line2);border-radius:26px;padding:18px;box-shadow:0 3px 14px #00000008}
    .chartCard{background:var(--paper);min-height:540px;overflow:auto}
    .hint{text-align:center;color:var(--rose);font-size:12px;font-weight:800;letter-spacing:.12em;margin-bottom:18px}
    .shield{min-width:900px;display:flex;flex-direction:column;align-items:center;padding:22px 12px 30px}
    .row{display:flex;align-items:center;justify-content:center;gap:8px}
    .shieldTop{margin-bottom:26px}
    .shieldNephews{width:760px;justify-content:space-between;margin-bottom:42px}
    .shieldWitnesses{width:470px;justify-content:space-between;margin-bottom:38px}
    .shieldJudge{margin-bottom:30px}
    .shieldFinal{margin-bottom:0}
    .gapdots{display:flex;flex-direction:column;gap:5px;margin:0 16px}
    .gapdots i{width:6px;height:6px;background:var(--rose);border-radius:50%;display:block}
    .fig{width:82px;min-height:132px;background:white;border:1px solid var(--line2);border-radius:18px;padding:8px 6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:.2s;position:relative}
    .fig:hover{background:#F2EFE9}
    .fig.sel{border-color:var(--rose);box-shadow:0 0 0 2px #b4766e33;transform:scale(1.04)}
    .fig.target{border-color:var(--green);box-shadow:0 0 0 4px #8a9a8644;transform:scale(1.08)}
    .fig.darbSel{border-color:var(--blue);box-shadow:0 0 0 2px #7c8f9944}
    .fig.darbTarget{border-color:var(--orange);box-shadow:0 0 0 4px #d9775744;transform:scale(1.08)}
    .fig .house{font-size:13px;font-weight:900;margin-bottom:4px}
    .fig .role{font-size:10px;color:var(--soft);font-weight:800;margin-top:5px;white-space:nowrap}
    .fig .name{font-size:13px;font-weight:900;margin-top:2px;white-space:nowrap}
    .dots{display:flex;flex-direction:column;gap:8px;margin:4px 0}
    .line{height:12px;display:flex;align-items:center;justify-content:center;gap:13px}
    .dot{width:10px;height:10px;transform:rotate(45deg);border-radius:2px;background:currentColor}
    .fire{color:var(--rose)} .air{color:var(--gold)} .water{color:var(--blue)} .earth{color:var(--green)}
    .connector{height:1px;width:14px;background:var(--line)}
    .squareWrap{position:relative;width:min(680px,100%);aspect-ratio:1/1;margin:auto;background:white;border-radius:20px;overflow:hidden}
    svg{position:absolute;inset:0;width:100%;height:100%}
    polygon{fill:transparent;stroke:var(--line);stroke-width:.45;cursor:pointer;transition:.2s}
    polygon:hover{fill:#f2efe980}
    polygon.sel{fill:#EDEAE1;stroke:var(--rose);stroke-width:1.5}
    polygon.target{fill:#8a9a8622;stroke:var(--green);stroke-width:2}
    polygon.darbSel{fill:#7c8f9920;stroke:var(--blue);stroke-width:2}
    polygon.darbTarget{fill:#d9775726;stroke:var(--orange);stroke-width:2}
    .sqLabel{position:absolute;transform:translate(-50%,-50%);pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .sqLabel .sqTitle{font-size:11px;font-weight:900;color:var(--soft);margin-bottom:2px}
    .sqLabel .dots{gap:2px;margin:0}
    .sqLabel .line{height:16px;gap:8px}
    .sqLabel .dot{width:8px;height:8px}
    .side h2,.panel h3{margin:0 0 14px;padding-bottom:12px;border-bottom:1px solid var(--line2)}
    .infoBox{background:var(--panel);border:1px solid var(--line2);border-radius:18px;padding:14px;margin-bottom:14px}
    .bigName{text-align:center;background:var(--panel);border:1px solid var(--line2);border-radius:20px;padding:24px 10px;margin-bottom:14px}
    .bigName .zh{font-size:36px;font-weight:1000;letter-spacing:.16em}
    .bigName .latin{font-size:14px;color:var(--green);font-weight:900;letter-spacing:.16em;text-transform:uppercase}
    .meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .meta div{background:white;border:1px solid var(--line2);border-radius:16px;padding:12px;text-align:center}
    .meta small{display:block;color:var(--soft);font-weight:900}
    .meta b{font-size:20px}
    .panels{display:flex;flex-direction:column;gap:18px;margin-top:18px}
    .misaaha{display:grid;grid-template-columns:1fr 2fr;gap:14px}
    @media(max-width:800px){.misaaha{grid-template-columns:1fr}}
    .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    @media(max-width:700px){.grid4{grid-template-columns:repeat(2,1fr)}}
    .elementCard{border:1px solid var(--line2);border-radius:18px;padding:12px;text-align:center;background:var(--paper)}
    .stateGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    @media(max-width:700px){.stateGrid{grid-template-columns:1fr}}
    .state{border:1px solid var(--line2);border-radius:18px;padding:12px;background:var(--paper);display:flex;gap:12px;align-items:center;cursor:pointer;transition:.18s;position:relative}
    .state:hover{background:#F2EFE9;transform:translateY(-1px)}
    .state:active{transform:scale(.99)}
    .miniFig{width:54px;background:white;border:1px solid var(--line2);border-radius:14px;padding:8px}
    .houseChips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .houseChip{border:1px solid var(--line);background:white;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900;color:var(--muted)}
    .houseChip.current{background:var(--rose);border-color:var(--rose);color:white}
    .oracle{margin-top:18px}
    .oracleRow{display:grid;grid-template-columns:170px 1fr auto auto;gap:10px}
    @media(max-width:760px){.oracleRow{grid-template-columns:1fr}}
    select,input{width:100%;border:1px solid var(--line2);border-radius:16px;padding:12px 14px;background:var(--panel);font-size:16px;color:var(--ink);font-weight:700}
    .result{margin-top:14px;background:var(--panel);border:1px solid var(--line2);border-radius:20px;padding:18px;white-space:pre-wrap;line-height:1.8;font-weight:600}
    .badge{display:inline-flex;align-items:center;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;border:1px solid var(--line);background:white;color:var(--muted);margin:2px}
    .diaryList{display:none;margin-top:14px}
    .diaryList.open{display:block}
    .entry{background:white;border:1px solid var(--line2);border-radius:18px;padding:14px;margin-top:10px}
    .entry .date{font-size:12px;color:var(--soft);font-weight:900}
    .modal{position:fixed;inset:0;background:#5a534dcc;display:none;align-items:center;justify-content:center;z-index:99;padding:16px}
    .modal.open{display:flex}
    .modalBox{background:var(--panel);border:2px solid var(--line2);border-radius:26px;max-width:680px;width:100%;padding:18px;box-shadow:0 20px 60px #0005}
    .manualGrid{display:flex;gap:10px;justify-content:space-between;margin:18px 0}
    .manualMother{flex:1;background:white;border:1px solid var(--line2);border-radius:18px;padding:12px;text-align:center}
    .manualMother .line{height:28px;cursor:pointer}
    .footerNote{text-align:center;color:var(--soft);font-size:12px;margin:20px 0 4px;font-weight:700}

    /* --- Motion Layer：意圖提取 / 合卦 / 長按解析卡片 --- */
    .motionOverlay{position:fixed;inset:0;z-index:120;display:none;align-items:center;justify-content:center;background:#5a534d66;backdrop-filter:blur(6px);padding:16px}
    .motionOverlay.open{display:flex;animation:fadeIn .18s ease-out both}
    .motionBox{width:min(720px,100%);background:var(--paper);border:1px solid var(--line);border-radius:28px;box-shadow:0 24px 70px #0005;padding:20px;overflow:hidden}
    .motionTitle{font-size:13px;color:var(--soft);font-weight:1000;letter-spacing:.22em;text-align:center;margin-bottom:14px}
    .marquee{position:relative;overflow:hidden;border-radius:18px;background:white;border:1px solid var(--line2);height:86px;display:flex;align-items:center}
    .marqueeTrack{display:flex;gap:14px;white-space:nowrap;animation:marqueeRun 2.4s linear infinite;padding-left:100%}
    .marqueeChip{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line2);background:var(--panel);border-radius:999px;padding:9px 14px;font-weight:1000;color:var(--ink)}
    .motionFormula{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;margin:14px 0 6px}
    .motionFigure{min-width:96px;background:white;border:1px solid var(--line2);border-radius:20px;padding:10px;text-align:center;box-shadow:0 6px 16px #0000000d;opacity:0;animation:popIn .42s cubic-bezier(.2,1.4,.3,1) both}
    .motionFigure.a{animation-delay:.08s}.motionFigure.b{animation-delay:.46s}.motionFigure.c{animation-delay:1.26s;border-color:var(--orange);box-shadow:0 0 0 4px #d9775733,0 10px 26px #00000012}
    .motionOp{font-size:24px;font-weight:1000;color:var(--rose);opacity:0;animation:popIn .3s ease-out both}
    .motionOp.plus{animation-delay:.34s}.motionOp.arrow{animation-delay:1.02s}
    .motionResultText{text-align:center;font-weight:900;color:var(--muted);margin-top:10px;line-height:1.65}
    .pulseGlow{animation:pulseGlow .9s ease-in-out 2}
    .analysisModal{position:fixed;right:16px;bottom:16px;background:transparent;display:none;align-items:flex-end;justify-content:flex-end;z-index:130;padding:0;pointer-events:none}
    .analysisModal.open{display:flex;animation:fadeIn .16s ease-out both}
    .analysisCard{background:var(--panel);border:1px solid var(--line);border-radius:28px;max-width:460px;width:min(460px,calc(100vw - 32px));max-height:calc(100vh - 32px);overflow:auto;padding:18px;box-shadow:0 20px 60px #0005;pointer-events:auto}
    @media(max-width:760px){.analysisModal{left:12px;right:12px;bottom:12px}.analysisCard{width:100%;max-width:none}}
    .analysisTop{display:flex;gap:14px;align-items:center;margin-bottom:14px}
    .analysisFig{width:82px;flex:0 0 auto;background:white;border:1px solid var(--line2);border-radius:18px;padding:10px;text-align:center}
    .analysisTitle{flex:1}.analysisTitle small{display:block;color:var(--soft);font-weight:900;letter-spacing:.12em}.analysisTitle b{font-size:28px;letter-spacing:.08em}
    .analysisBody{background:white;border:1px solid var(--line2);border-radius:20px;padding:14px;line-height:1.75;color:var(--ink);font-weight:650}
    .analysisActions{display:flex;justify-content:flex-end;margin-top:14px}

    .chartCard{position:relative}
    .boardToast{position:absolute;left:50%;top:14px;transform:translateX(-50%);z-index:30;pointer-events:none;background:#fdfbf7f2;border:1px solid var(--line);border-radius:999px;padding:12px 22px;box-shadow:0 8px 22px #0002;color:var(--ink);font-size:18px;line-height:1.25;font-weight:1000;letter-spacing:.08em;opacity:0;transition:.18s;white-space:nowrap}
    .boardToast.open{opacity:1;transform:translateX(-50%) translateY(0)}
    .fig.timelineOrigin{border-color:var(--rose);background:#fff4f2;box-shadow:0 0 0 4px #b4766e35,0 0 22px #b4766e77;transform:scale(1.06)}
    .fig.timelineDevelop{border-color:var(--gold);background:#fffaf0;box-shadow:0 0 0 4px #c5a87c35,0 0 22px #c5a87c77;transform:scale(1.06)}
    .fig.timelineProcess{border-color:var(--blue);background:#f1f7fa;box-shadow:0 0 0 4px #7c8f9935,0 0 22px #7c8f9977;transform:scale(1.06)}
    .fig.timelineVerdict{border-color:var(--green);background:#f4f8f2;box-shadow:0 0 0 4px #8a9a8635,0 0 22px #8a9a8677;transform:scale(1.06)}
    polygon.timelineOrigin{fill:#b4766e28;stroke:var(--rose);stroke-width:2.4;filter:drop-shadow(0 0 2px #b4766e)}
    polygon.timelineDevelop{fill:#c5a87c28;stroke:var(--gold);stroke-width:2.4;filter:drop-shadow(0 0 2px #c5a87c)}
    polygon.timelineProcess{fill:#7c8f9928;stroke:var(--blue);stroke-width:2.4;filter:drop-shadow(0 0 2px #7c8f99)}
    polygon.timelineVerdict{fill:#8a9a8628;stroke:var(--green);stroke-width:2.4;filter:drop-shadow(0 0 2px #8a9a86)}
    .fig.timelinePulse, polygon.timelinePulse{animation:birthPop .55s cubic-bezier(.2,1.45,.28,1) both}
    .fig.figureMatch{border-color:var(--gold);background:#fffaf0;box-shadow:0 0 0 3px #c5a87c35,0 0 18px #c5a87c77;transform:scale(1.06)}
    .fig.figureMatch.sel{border-color:var(--rose);box-shadow:0 0 0 3px #b4766e45,0 0 22px #c5a87c88;transform:scale(1.1)}
    polygon.figureMatch{fill:#c5a87c26;stroke:var(--gold);stroke-width:2.2;filter:drop-shadow(0 0 2px #c5a87c)}
    polygon.figureMatch.sel{fill:#b4766e22;stroke:var(--rose);stroke-width:2.7;filter:drop-shadow(0 0 3px #b4766e)}
    .fig.stateLampNadhar{border-color:var(--rose);background:#fff4f2;box-shadow:0 0 0 3px #b4766e30,0 0 18px #b4766e66;transform:scale(1.04)}
    .fig.stateLampNutq{border-color:var(--gold);background:#fffaf0;box-shadow:0 0 0 3px #c5a87c30,0 0 18px #c5a87c66;transform:scale(1.04)}
    .fig.stateLampIttisal{border-color:var(--blue);background:#f1f7fa;box-shadow:0 0 0 3px #7c8f9930,0 0 18px #7c8f9966;transform:scale(1.04)}
    .fig.stateLampInfisal{border-color:var(--green);background:#f4f8f2;box-shadow:0 0 0 3px #8a9a8630,0 0 18px #8a9a8666;transform:scale(1.04)}
    polygon.stateLampNadhar{fill:#b4766e26;stroke:var(--rose);stroke-width:2.2;filter:drop-shadow(0 0 2px #b4766e)}
    polygon.stateLampNutq{fill:#c5a87c26;stroke:var(--gold);stroke-width:2.2;filter:drop-shadow(0 0 2px #c5a87c)}
    polygon.stateLampIttisal{fill:#7c8f9926;stroke:var(--blue);stroke-width:2.2;filter:drop-shadow(0 0 2px #7c8f99)}
    polygon.stateLampInfisal{fill:#8a9a8626;stroke:var(--green);stroke-width:2.2;filter:drop-shadow(0 0 2px #8a9a86)}
    .fig.intentLamp{border-color:var(--gold);background:#fff8e7;box-shadow:0 0 0 4px #c5a87c40,0 0 22px #c5a87c88;transform:scale(1.08)}
    .fig.intentSource{border-color:var(--rose);background:#fff3f1;box-shadow:0 0 0 4px #b4766e44,0 0 24px #b4766e88;transform:scale(1.1)}
    .fig.intentJudge{border-color:var(--blue);background:#eef4f6;box-shadow:0 0 0 4px #7c8f9944,0 0 24px #7c8f9988;transform:scale(1.1)}
    .fig.intentBirth{animation:birthPop .55s cubic-bezier(.2,1.45,.28,1) both}
    .fig.intentResult{border-color:var(--green);background:#f0f6ee;box-shadow:0 0 0 5px #8a9a8648,0 0 30px #8a9a8688;transform:scale(1.12)}
    polygon.intentLamp{fill:#c5a87c30;stroke:var(--gold);stroke-width:2.4;filter:drop-shadow(0 0 2px #c5a87c)}
    polygon.intentSource{fill:#b4766e30;stroke:var(--rose);stroke-width:2.7;filter:drop-shadow(0 0 2px #b4766e)}
    polygon.intentJudge{fill:#7c8f9930;stroke:var(--blue);stroke-width:2.7;filter:drop-shadow(0 0 2px #7c8f99)}
    polygon.intentBirth{animation:birthPop .55s cubic-bezier(.2,1.45,.28,1) both}
    polygon.intentResult{fill:#8a9a8635;stroke:var(--green);stroke-width:3;filter:drop-shadow(0 0 3px #8a9a86)}
    .fig.sourceLamp{border-color:var(--gold);background:#fff8e7;box-shadow:0 0 0 4px #c5a87c40,0 0 22px #c5a87c88;transform:scale(1.08)}
    .fig.sourceBridge{border-color:var(--orange);background:#fff4ee;box-shadow:0 0 0 4px #d9775740,0 0 22px #d9775788;transform:scale(1.08)}
    .fig.sourceJudge{border-color:var(--blue);background:#eef4f6;box-shadow:0 0 0 4px #7c8f9944,0 0 24px #7c8f9988;transform:scale(1.1)}
    .fig.sourceSource{border-color:var(--rose);background:#fff3f1;box-shadow:0 0 0 4px #b4766e44,0 0 24px #b4766e88;transform:scale(1.1)}
    .fig.sourceBirth{animation:birthPop .55s cubic-bezier(.2,1.45,.28,1) both}
    .fig.sourceResult{border-color:var(--green);background:#f0f6ee;box-shadow:0 0 0 5px #8a9a8648,0 0 30px #8a9a8688;transform:scale(1.12)}
    polygon.sourceLamp{fill:#c5a87c30;stroke:var(--gold);stroke-width:2.4;filter:drop-shadow(0 0 2px #c5a87c)}
    polygon.sourceBridge{fill:#d9775728;stroke:var(--orange);stroke-width:2.4;filter:drop-shadow(0 0 2px #d97757)}
    polygon.sourceJudge{fill:#7c8f9930;stroke:var(--blue);stroke-width:2.7;filter:drop-shadow(0 0 2px #7c8f99)}
    polygon.sourceSource{fill:#b4766e30;stroke:var(--rose);stroke-width:2.7;filter:drop-shadow(0 0 2px #b4766e)}
    polygon.sourceBirth{animation:birthPop .55s cubic-bezier(.2,1.45,.28,1) both}
    polygon.sourceResult{fill:#8a9a8635;stroke:var(--green);stroke-width:3;filter:drop-shadow(0 0 3px #8a9a86)}
    .fig.fortuneGreat{border-color:var(--gold);background:#fff8dc;box-shadow:0 0 0 5px #c5a87c55,0 0 30px #c5a87c99;transform:scale(1.08)}
    .fig.fortuneGood{border-color:var(--green);background:#f1f8ee;box-shadow:0 0 0 4px #8a9a8645,0 0 22px #8a9a8677;transform:scale(1.05)}
    .fig.fortuneSmall{border-color:#d8bf8f;background:#fffaf0;box-shadow:0 0 0 3px #c5a87c38,0 0 16px #c5a87c66;transform:scale(1.03)}
    .fig.fortuneNeutral{background:#f7f6f2;border-color:var(--line);opacity:.72;filter:saturate(.72)}

function attachLongPress(el,{onTap,onLong,delay=620}={}){

  const cancel=()=>{clearTimeout(timer)};
  el.addEventListener("pointerdown",start);
  el.addEventListener("pointerup",e=>{cancel(); if(!longPressed && onTap) onTap(e);});

function intentExtractionRule(){

const ELEMENT_NAMES=["火","風","水","土"];
const JUDGE_SOURCE_PARENTS={14:[12,13],12:[8,9],13:[10,11],8:[0,1],9:[2,3],10:[4,5],11:[6,7]};
function housePathText(path){return path.map(i=>`${i+1}宮`).join("→")}
function traceOpenElementSource(lineIndex){
  let node=14, path=[14];
  while(JUDGE_SOURCE_PARENTS[node]){
    const [a,b]=JUDGE_SOURCE_PARENTS[node];
    const av=state.chart[a][lineIndex], bv=state.chart[b][lineIndex];
    let next=null;
    if(av==='1' && bv!=='1') next=a;
    else if(bv==='1' && av!=='1') next=b;
    else if(av==='1' && bv==='1') next=a;
    else next=a;
    node=next; path.push(node);
    if(node<8) break;
  }
  return {lineIndex,element:ELEMENT_NAMES[lineIndex],sourceIndex:node,sourceFigure:state.chart[node],path};
}
function calculateJudgeSourceIntent(){
  const judgeFig=state.chart[14];
  if(judgeFig==='1111') return {disabled:true,reason:'第15宮為道路，四元素全開，源頭分散，無法使用⚖️平衡宮尋源。'};
  if(judgeFig==='2222') return {disabled:true,reason:'第15宮為群眾，四元素全閉，沒有開啟元素，無法使用⚖️平衡宮尋源。'};
  const openLines=judgeFig.split('').map((d,i)=>d==='1'?i:null).filter(i=>i!==null);
  if(!openLines.length) return {disabled:true,reason:'第15宮沒有開啟元素，無法使用⚖️平衡宮尋源。'};
  const traces=openLines.map(traceOpenElementSource);
  const sourceHouses=[];
  traces.forEach(t=>{if(!sourceHouses.includes(t.sourceIndex)) sourceHouses.push(t.sourceIndex)});
  if(!sourceHouses.length) return {disabled:true,reason:'沒有追到1–8宮源頭。'};
  const sourceFigures=sourceHouses.map(i=>state.chart[i]);
  const combined=sourceFigures.reduce((acc,fig)=>acc?addFigures(acc,fig):fig,'');
  const houses=[]; state.chart.forEach((f,i)=>{if(f===combined) houses.push(i)});
  return {disabled:false,methodLabel:'⚖️平衡宮尋源',judgeFigure:judgeFig,openLines,openElements:openLines.map(i=>ELEMENT_NAMES[i]),traces,sourceHouses,sourceFigures,combinedFigure:combined,targetHouses:houses,isKharij:houses.length===0};
}
function sourceIntentText(src){
  if(!src) return '';
  const traceText=src.traces.map(t=>`${t.element}：${housePathText(t.path)}（第${t.sourceIndex+1}宮 ${figName(t.sourceFigure)}）`).join('；');
  const sourceText=src.sourceHouses.map(i=>`第${i+1}宮 ${figName(state.chart[i])}`).join('、');
  return `⚖️平衡宮尋源：第15宮法官 ${figName(src.judgeFigure)} 開啟 ${src.openElements.join('、')}；追源路徑：${traceText}。尋到源頭卦象：${sourceText}；合相成尋源意圖 → ${figName(src.combinedFigure)}；${src.isKharij?'出局':`入局第${src.targetHouses.map(i=>i+1).join('、')}宮`}。`;
}
function showJudgeSourceAnimation(src){
  clearBoardMotion();
  state.sourceTargetsRevealed=false;
  const resultName=figName(src.combinedFigure);
  const targets=src.targetHouses.map(i=>i+1);
  const targetText=src.isKharij?'出局':`入局第 ${targets.join('、')} 宮`;
  let t=0;
  addHouseMotion(14,'sourceJudge');
  boardToast(`⚖️平衡宮尋源：從第15宮法官 ${figName(src.judgeFigure)} 開始`);
  t+=520;

  const maxSteps=Math.max(...src.traces.map(trace=>trace.path.length-1));
  const traceLabels=src.traces.map(trace=>trace.element).join('、');

  queueBoardStep(()=>{
    document.querySelectorAll('.sourceLamp').forEach(el=>el.classList.remove('sourceLamp'));
    addHouseMotion(14,'sourceJudge');
    boardToast(`同步追尋${traceLabels}線：從15宮同時往上回溯`);
  },t);
  t+=320;

  for(let stepIndex=0; stepIndex<maxSteps; stepIndex++){
    queueBoardStep(()=>{
      document.querySelectorAll('.sourceLamp').forEach(el=>el.classList.remove('sourceLamp'));
      const stepTexts=[];
      src.traces.forEach(trace=>{
        const idx=trace.path[stepIndex+1];
        if(idx===undefined) return;
        const isFinal=idx===trace.sourceIndex;
        addHouseMotion(idx,'sourceLamp');
        if(!isFinal) addHouseMotion(idx,'sourceBridge');
        stepTexts.push(`${trace.element}→第${idx+1}宮`);
      });
      boardToast(`同步回溯第 ${stepIndex+1} 層：${stepTexts.join('｜')}`);
    },t);
    t+=360;
  }

  queueBoardStep(()=>{
    document.querySelectorAll('.sourceLamp').forEach(el=>el.classList.remove('sourceLamp'));
    const seen=[];
    src.traces.forEach(trace=>{
      addHouseMotion(trace.sourceIndex,'sourceSource');
      addHouseMotion(trace.sourceIndex,'sourceBirth');
      if(!seen.includes(trace.sourceIndex)) seen.push(trace.sourceIndex);
    });
    addHouseMotion(14,'sourceJudge');
    boardToast(`同步尋到源頭：${seen.map(i=>'第 '+(i+1)+' 宮 '+figName(state.chart[i])).join('、')}`);
  },t);
  t+=720;

  queueBoardStep(()=>{
    addHouseMotion(14,'sourceBirth');
    src.sourceHouses.forEach(idx=>addHouseMotion(idx,'sourceBirth'));
    boardToast(`源頭卦象合相 → ${resultName}`);
  },t);
  t+=720;

  if(src.isKharij){
    queueBoardStep(()=>{
      boardToast(`${resultName}｜出局，尋源意圖沒有落到盤中宮位`);
    },t);
    t+=620;
  }else{
    src.targetHouses.forEach((idx,n)=>{
      queueBoardStep(()=>{
        addHouseMotion(idx,'sourceResult');
        addHouseMotion(idx,'sourceBirth');
        boardToast(`${resultName} 跑出新宮位：第 ${idx+1} 宮`);
      },t+n*280);
    });
    t+=Math.max(1,src.targetHouses.length)*280+520;
  }

  queueBoardStep(()=>{
    document.querySelectorAll('.sourceBirth').forEach(el=>el.classList.remove('sourceBirth'));
    state.sourceTargetsRevealed=true;
    render();
    boardToast(`⚖️平衡宮尋源完成：${resultName}｜${targetText}`);
  },t);
}

    parts.push(timelinePromptText());
  }
  return parts.length?parts.join("\n"):"未啟用意圖提取、合卦或飛宮燈。請以主題宮、第15宮、第16宮為主。";
}
function buildOraclePrompt(question){
  const rule=selectedDomainRule();
  const selectedFig=state.chart[state.selected];
  const selectedData=FIGURE_DATA[selectedFig];
  const method = rule.method.map((m,i)=>`${i+1}. ${m}`).join("\n");
  return `你是一位熟悉阿拉伯沙占（ʿIlm al-Raml）的解析者。請依照下列盤面資料與題型規則，用繁體中文做完整占斷。\n\n【問題類型】\n${rule.label}\n\n【求問】\n${question}\n\n【本題取用宮位】\n${housesText(rule.focusHouses)}\n\n【本題解析法】\n${rule.methodTitle}\n${method}\n\n【盤面資料：16宮】\n${chartLinesForPrompt()}\n\n【元素測量】\n${elementLinesForPrompt()}\n\n【目前選取宮位與四態動態】\n目前選取：第${state.selected+1}宮 ${HOUSE_DATA[state.selected].name}｜${selectedData.nameZh}｜${selectedData.nature}｜${selectedData.element}\n${stateLinesForPrompt(state.selected)}\n\n【特殊推演資料】\n${specialFocusForPrompt()}\n\n【回答格式】\n1. 先給一句明確結論。\n2. 用「組合」方式讀盤，不要逐卦單獨背牌義。\n3. 必須引用本題取用宮位，說明每個重點宮位如何互相支持或衝突。\n4. 說明第1宮、第15宮、第16宮在此題中的作用。\n5. 若有入局／出局，請說明力量是否落入現實場域。\n6. 若盤面矛盾，請明說矛盾點，不要硬判。\n7. 健康題不得替代醫療診斷；應期題請用區間與條件語氣。\n8. 最後給出可執行的提醒，但不要過度靈性化。`;
}
function copyOraclePrompt(){
  const text=$("oraclePrompt").value;
  if(!text){alert("目前還沒有提示詞。請先祈求神諭。");return}
  const done=()=>boardToast("AI 神諭提示詞已複製");
  if(navigator.clipboard && navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(done).catch(()=>{fallbackCopy(text);done()});}
  else {fallbackCopy(text);done()}
}
function fallbackCopy(text){
  const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
}

function localOracle(){
  const q=$("question").value.trim();
  if(!q){alert("先輸入問題。");return}
  if(state.isBase){alert("請先隨機起卦或手動起卦。");return}
  if(!state.hiddenIntent && !state.sourceIntent){alert("請先按「意圖提取」或「⚖️平衡宮尋源」，完成後才能祈求神諭。");return}
  const domain=$("domain").selectedOptions[0].textContent;
  const rule=selectedDomainRule();
  const one=FIGURE_DATA[state.chart[0]], judge=FIGURE_DATA[state.chart[14]], outcome=FIGURE_DATA[state.chart[15]];
  let focus="";
  if(state.darbResult){
    const r=state.darbResult, f=FIGURE_DATA[r.combinedFigure];
    focus=`你選擇第 ${r.idxA+1} 宮「${figName(r.figA)}」與第 ${r.idxB+1} 宮「${figName(r.figB)}」相擊，繁衍出「${f.nameZh}」。${r.isKharij?'此卦出局，表示條件尚未落入現實場域。':'此卦入局於第 '+r.targetHouses.map(i=>i+1).join('、')+' 宮，表示力量已經找到具體場域。'}`;
  } else if(state.hiddenIntent){
    const h=state.hiddenIntent, f=FIGURE_DATA[h.combinedFigure];
    focus=`${h.methodLabel||'意圖提取'}因「${h.trigger||'條件觸發'}」啟動，取 ${h.lineNames?h.lineNames.join('＋'):'火＋土'} 總點數 ${h.dots||''}，從第 ${h.sourceIndex+1} 宮「${figName(h.sourceFigure)}」出發，與法官「${figName(h.judgeFigure)}」相擊，得出「${f.nameZh}」。${h.isKharij?'它出局，代表這股隱藏力量尚未進入明面。':'它入局於第 '+h.targetHouses.map(i=>i+1).join('、')+' 宮，代表這股隱藏力量會透過這些宮位顯形。'}`;
  } else {
    focus=`本題先依「${rule.methodTitle}」判斷，若意圖提取出局，仍以主題宮、第十五宮法官與第十六宮結果輔助判斷。`;
  }
  if(state.sourceIntent){
    focus += `

${sourceIntentText(state.sourceIntent)}`;
  }
  const tone = outcome.nature.includes("吉") ? "整體結果偏向可成，但需要順著盤面節奏走。" : outcome.nature.includes("凶") ? "整體結果帶阻力，宜保守處理，不要急著硬推。" : "整體結果偏中性，成敗高度取決於你後續如何介入。";
  const methodText=rule.method.map(x=>`・${x}`).join("\n");
  const text=`【${domain}】\n你問：「${q}」\n\n卷首判斷：${tone}\n\n本題取用宮位：${housesText(rule.focusHouses)}\n解析法：${rule.methodTitle}\n${methodText}\n\n一宮為「${one.nameZh}」，顯示求問者當下的姿態是：${one.meaning}\n法官為「${judge.nameZh}」，盤面的核心裁決是：${judge.meaning}\n最終判決為「${outcome.nameZh}」，事情收束時呈現：${outcome.meaning}\n\n${focus}\n\n神諭指引：不要只看單一吉凶，這盤更像在問「力量有沒有進入場域」。若入局，事情會透過對應宮位顯化；若出局，先檢查條件是否不足、訊息是否缺口、或真正目的是否還沒有說清楚。`;
  state.reading=text;
  state.oraclePrompt=buildOraclePrompt(q);
  $("reading").textContent=text; $("reading").style.display="block";
  $("oraclePrompt").value=state.oraclePrompt; $("promptTools").style.display="block";
  $("saveRow").style.display="block";
}
function saveDiary(){
  const list=JSON.parse(localStorage.getItem("geomancyDiary")||"[]");
  list.unshift({date:new Date().toLocaleString("zh-TW",{hour12:false}),question:$("question").value,reading:state.reading,prompt:state.oraclePrompt,chart:[...state.chart]});
  localStorage.setItem("geomancyDiary",JSON.stringify(list));
  renderDiary(true);
}
function renderDiary(forceOpen=false){
  const box=$("diaryList");
  if(forceOpen) box.classList.add("open");
  const list=JSON.parse(localStorage.getItem("geomancyDiary")||"[]");
  if(!list.length){box.innerHTML=`<div class="entry">日記目前是空的。</div>`;return}
  box.innerHTML=list.map((e,i)=>`<div class="entry"><div class="date">${e.date}</div><b>${e.question}</b><p style="white-space:pre-wrap;line-height:1.7">${e.reading}</p><button data-del="${i}">刪除</button></div>`).join('');
  box.querySelectorAll("[data-del]").forEach(btn=>btn.onclick=()=>{const arr=JSON.parse(localStorage.getItem("geomancyDiary")||"[]"); arr.splice(+btn.dataset.del,1); localStorage.setItem("geomancyDiary",JSON.stringify(arr)); renderDiary(true)});
}
function renderManual(){
  $("manualGrid").innerHTML=[3,2,1,0].map(i=>`<div class="manualMother"><b>第 ${i+1} 母</b>${dotHTML(state.manual[i])}<div><b>${figName(state.manual[i])}</b></div></div>`).join('');
  [...$("manualGrid").children].forEach((box,rev)=>{
    const i=3-rev;
    box.querySelectorAll(".line").forEach((ln,lineIdx)=>ln.onclick=()=>{let arr=state.manual[i].split(""); arr[lineIdx]=arr[lineIdx]==='1'?'2':'1'; state.manual[i]=arr.join(''); renderManual()});
  });
}
function setToolDrawer(open){
  const drawer=$("toolDrawer"), overlay=$("toolDrawerOverlay");
  if(!drawer || !overlay) return;
  drawer.classList.toggle("open", open);
  overlay.classList.toggle("open", open);
}
function render(){
  $("viewShield").classList.toggle("active",state.view==="shield");
  $("viewSquare").classList.toggle("active",state.view==="square");
  $("timelineBtn").classList.toggle("blueActive",state.timeline);
  $("darbBtn").classList.toggle("blueActive",state.darbMode);
  $("flightBtn").classList.toggle("blueActive",state.flightMode);
  $("stateLightBtn").classList.toggle("blueActive",state.stateLightMode);
  if($("fortuneLightBtn")) $("fortuneLightBtn").classList.toggle("blueActive",state.fortuneLightMode);
  if($("intentBtn")) $("intentBtn").classList.toggle("blueActive",!!state.hiddenIntent);
  if($("judgeSourceBtn")) $("judgeSourceBtn").classList.toggle("blueActive",!!state.sourceIntent);
  $("hint").textContent=state.isBase?"▲ 點擊「隨機起卦」或「手動起卦」開始 ▲":state.timeline?"▲ 四段時間軸：1–4起源、5–8展開、9–12推演、13–16裁決 ▲":state.darbMode?"▲ 點擊任意兩宮以合出新卦象 ▲":state.flightMode?"▲ 點選宮位顯示同卦飛宮 ▲":state.stateLightMode?"▲ 點選宮位顯示四態入局燈 ▲":state.fortuneLightMode?"▲ 盤面狀態：吉象亮燈、凶象暗燈、中性淡化 ▲":(state.sourceIntent&&state.sourceTargetsRevealed)?"▲ ⚖️平衡宮尋源已啟動：亮起源頭宮與尋源意圖入局宮 ▲":"▲ 選擇宮位查看詳解；神諭區需先按意圖提取或⚖️平衡宮尋源 ▲";
  state.view==="shield"?renderShield():renderSquare();
  renderSide(); renderBadges();
  $("dynamicPanels").style.display=state.isBase?"none":"flex";
  if(!state.isBase){misaaha(); renderStates();}
}
$("randomBtn").onclick=()=>{state.mothers=Array.from({length:4},()=>Array.from({length:4},()=>Math.random()>.5?'1':'2').join('')); state.chart=calcChart(state.mothers); state.isBase=false; resetTimeline(); state.hiddenIntent=null; state.sourceIntent=null; state.intentTargetsRevealed=false; state.sourceTargetsRevealed=false; state.darbMode=false; state.flightMode=false; state.stateLightMode=false; state.fortuneLightMode=false; state.highlightedFigure=null; state.effectAnchor=null; state.darbSelection=[]; state.darbResult=null; resetReading(); render()};
$("resetBtn").onclick=()=>{state.mothers=["1121","1222","2111","2212"]; state.chart=[...BASE_CHART]; state.isBase=true; state.selected=0; resetTimeline(); state.hiddenIntent=null; state.sourceIntent=null; state.intentTargetsRevealed=false; state.sourceTargetsRevealed=false; state.highlightedFigure=null; state.effectAnchor=null; state.darbMode=false; state.flightMode=false; state.stateLightMode=false; state.fortuneLightMode=false; state.darbSelection=[]; state.darbResult=null; resetReading(); render()};
$("viewShield").onclick=()=>{state.view="shield";render()};
$("viewSquare").onclick=()=>{state.view="square";render()};
$("toolDrawerBtn").onclick=()=>setToolDrawer(true);
$("toolDrawerClose").onclick=()=>setToolDrawer(false);
$("toolDrawerOverlay").onclick=()=>setToolDrawer(false);
function closeDrawerForVisualTool(){setToolDrawer(false);}
$("timelineBtn").onclick=()=>{if(!state.isBase) closeDrawerForVisualTool(); toggleTimeline()};
$("intentBtn").onclick=()=>{if(!state.isBase) closeDrawerForVisualTool(); extractIntent()};
$("judgeSourceBtn").onclick=()=>{if(!state.isBase) closeDrawerForVisualTool(); extractJudgeSourceIntent()};
$("darbBtn").onclick=()=>{
  if(state.isBase){alert("請先起卦。");return}
  closeDrawerForVisualTool();
  state.darbMode=!state.darbMode;
  state.flightMode=false; state.stateLightMode=false; state.fortuneLightMode=false; resetTimeline(); state.highlightedFigure=null; state.effectAnchor=null;
  state.hiddenIntent=null; state.sourceIntent=null; state.intentTargetsRevealed=false; state.sourceTargetsRevealed=false; state.darbSelection=[]; state.darbResult=null;
  closeAnalysisCard(); clearBoardMotion(); render();
};
$("flightBtn").onclick=()=>{
  if(state.isBase){alert("請先起卦。");return}
  closeDrawerForVisualTool();
  state.flightMode=!state.flightMode;
  state.darbMode=false; state.stateLightMode=false; state.fortuneLightMode=false; resetTimeline(); state.darbSelection=[]; state.darbResult=null;
  state.hiddenIntent=null; state.sourceIntent=null; state.intentTargetsRevealed=false; state.sourceTargetsRevealed=false;
  state.highlightedFigure=null; state.effectAnchor=null;
  closeAnalysisCard(); clearBoardMotion(); render();
  if(state.flightMode) boardToast(`顯示飛宮：點選宮位後，同卦才會亮起`);
};
$("stateLightBtn").onclick=()=>{
  if(state.isBase){alert("請先起卦。");return}
  closeDrawerForVisualTool();
  state.stateLightMode=!state.stateLightMode;
  state.darbMode=false; state.flightMode=false; state.fortuneLightMode=false; resetTimeline(); state.highlightedFigure=null; state.effectAnchor=null; state.darbSelection=[]; state.darbResult=null;
  state.hiddenIntent=null; state.sourceIntent=null; state.intentTargetsRevealed=false; state.sourceTargetsRevealed=false;
  closeAnalysisCard(); clearBoardMotion(); render();
  if(state.stateLightMode) boardToast(`四態燈：點選宮位後，觀望／發聲／連結／分離的入局宮位才會亮起`);
};
$("fortuneLightBtn").onclick=()=>{
  if(state.isBase){alert("請先起卦。");return}
  closeDrawerForVisualTool();
  state.fortuneLightMode=!state.fortuneLightMode;
  state.darbMode=false; state.flightMode=false; state.stateLightMode=false; resetTimeline(); state.highlightedFigure=null; state.effectAnchor=null; state.darbSelection=[]; state.darbResult=null;
  closeAnalysisCard(); clearBoardMotion(); render();
  if(state.fortuneLightMode) boardToast(fortuneLightSummary());
};
$("oracleBtn").onclick=localOracle;
$("copyPromptBtn").onclick=copyOraclePrompt;
$("saveBtn").onclick=saveDiary;
$("diaryBtn").onclick=()=>{$("diaryList").classList.toggle("open"); renderDiary()};
$("manualBtn").onclick=()=>{state.manual=[...state.mothers]; renderManual(); $("manualModal").classList.add("open")};
$("cancelManual").onclick=()=>$("manualModal").classList.remove("open");
$("manualModal").onclick=e=>{if(e.target.id==="manualModal")$("manualModal").classList.remove("open")};
$("applyManual").onclick=()=>{state.mothers=[...state.manual]; state.chart=calcChart(state.mothers); state.isBase=false; resetTimeline(); state.hiddenIntent=null; state.sourceIntent=null; state.intentTargetsRevealed=false; state.sourceTargetsRevealed=false; state.darbMode=false; state.flightMode=false; state.stateLightMode=false; state.fortuneLightMode=false; state.highlightedFigure=null; state.effectAnchor=null; state.darbSelection=[]; state.darbResult=null; $("manualModal").classList.remove("open"); resetReading(); render()};
$("motionOverlay").onclick=e=>{if(e.target.id==="motionOverlay")$("motionOverlay").classList.remove("open")};
$("closeAnalysis").onclick=()=>$("analysisModal").classList.remove("open");
$("analysisModal").onclick=e=>{if(e.target.id==="analysisModal")$("analysisModal").classList.remove("open")};
render();
// 四態動態推演已修正為元素位開合：觀望=火、發聲=風、連結=水、分離=土。
</script>
