<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>今天想要問什麼｜沙占起來</title>
<style>html,body{margin:0;min-height:100%;background:#EAE8E3}.boot{min-height:100vh;display:grid;place-items:center;color:#7D7469;font:700 14px -apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;letter-spacing:.12em}</style>
</head>
<body><div class="boot">正在載入沙盤……</div>
<script>
(async()=>{
  try{
    const res=await fetch('./index-core.html',{cache:'no-store'});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    let html=await res.text();
    const oldCss=`    .brandLogo{width:64px;height:64px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 10px;box-shadow:0 4px 14px #0002;border:2px solid var(--white)}\n    @media(min-width:901px){.brandLogo{width:80px;height:80px;margin-bottom:14px}}`;
    const newCss=`    .brandSeal{width:64px;height:64px;border-radius:50%;display:block;position:relative;margin:0 auto 10px;border:2px solid var(--white);box-shadow:0 4px 14px #0002;background:\n      radial-gradient(circle at center, transparent 0 16px, var(--line2) 16px 17px, transparent 17px 100%),\n      repeating-linear-gradient(45deg, transparent 0 8px, #d8d3cb 8px 9px, transparent 9px 18px),\n      repeating-linear-gradient(-45deg, transparent 0 8px, #e2ddd5 8px 9px, transparent 9px 18px),\n      linear-gradient(180deg,#fff,#f4f0e8)}\n    .brandSeal::before,.brandSeal::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;pointer-events:none}\n    .brandSeal::before{width:40px;height:40px;border:1.5px solid var(--gold);opacity:.9}\n    .brandSeal::after{width:14px;height:14px;background:linear-gradient(135deg,var(--rose),var(--gold));transform:translate(-50%,-50%) rotate(45deg);border-radius:3px;box-shadow:0 0 0 6px #fff8}\n    @media(min-width:901px){.brandSeal{width:80px;height:80px;margin-bottom:14px}.brandSeal::before{width:52px;height:52px}.brandSeal::after{width:18px;height:18px}}`;
    if(!html.includes(oldCss)) throw new Error('找不到品牌圖片樣式區段');
    html=html.replace(oldCss,newCss);
    const imageRe=/\s*<img class="brandLogo"[\s\S]*?\/>\n/;
    if(!imageRe.test(html)) throw new Error('找不到品牌圖片標籤');
    html=html.replace(imageRe,'\n      <div class="brandSeal" aria-hidden="true"></div>\n');
    document.open();
    document.write(html);
    document.close();
  }catch(err){
    document.body.innerHTML=`<div class="boot">載入失敗：${String(err.message||err)}</div>`;
  }
})();
</script>
</body>
</html>
